<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Crazy Driver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      background: #87ceeb;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    #home-link {
      position: fixed; top: 12px; left: 12px; z-index: 20;
      color: #fff; text-decoration: none; font-size: 0.88rem; font-weight: 700;
      background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 14px; border-radius: 20px; letter-spacing: 1px;
    }
  </style>
  <script>
    // Block pinch-zoom, double-tap zoom, gesture zoom, ctrl+scroll zoom
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    (function() {
      var lt = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lt < 300) e.preventDefault();
        lt = now;
      }, false);
    })();
    document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, false);
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, false);
    window.addEventListener('wheel', function(e) {
      if (e.ctrlKey) e.preventDefault();
    }, { passive: false });
  </script>
</head>
<body>
  <a href="index.html" id="home-link">&#8592; Home</a>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    // ── Layout constants (recalculated on resize) ─────────────────────────
    let W, H, roadTop, roadBot, roadH, lane1, lane2, lane3;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      roadTop = Math.round(H * 0.22);
      roadBot = Math.round(H * 0.85);
      roadH   = roadBot - roadTop;
      lane1   = roadTop + roadH * 0.17;
      lane2   = roadTop + roadH * 0.50;
      lane3   = roadTop + roadH * 0.83;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Game state ────────────────────────────────────────────────────────
    const STATE = { TITLE: 0, PLAYING: 1, DEAD: 2 };
    let state = STATE.TITLE;

    let score, hiScore, lives, speed, frameCount;
    let spawnIn, invincible, shakeFrames;

    // ── Player ────────────────────────────────────────────────────────────
    const P_W = 90, P_H = 42;
    let playerY, targetY;
    const playerX = () => W * 0.18;

    // ── Obstacles ─────────────────────────────────────────────────────────
    const OB_W = 88, OB_H = 40;
    const OB_COLORS = ['#2288ff','#ff9900','#22cc44','#cc44ff','#ff6644','#00bbcc','#ffdd00'];
    let obstacles;

    // ── Scenery (pre-generated, stable across resizes) ────────────────────
    const TREES = Array.from({ length: 14 }, (_, i) => ({
      xRatio: i / 14 + Math.random() * 0.04,
      top:    Math.random() < 0.5,
      trunk:  Math.random() * 6  + 8,
      crown:  Math.random() * 18 + 16,
    }));
    const CLOUDS = Array.from({ length: 6 }, (_, i) => ({
      xRatio: i / 6 + Math.random() * 0.08,
      yRatio: 0.03 + Math.random() * 0.12,
      w:      Math.random() * 90 + 55,
      h:      Math.random() * 28 + 18,
    }));

    let dashOffset  = 0;
    let treeOffset  = 0;
    let cloudOffset = 0;

    hiScore = +(localStorage.getItem('cdHi') || 0);

    // ── Input handling ────────────────────────────────────────────────────
    let pointerActive = false;

    function applyPointer(clientY) {
      const rect   = canvas.getBoundingClientRect();
      const scaleY = H / rect.height;
      const py     = (clientY - rect.top) * scaleY;
      targetY = Math.max(roadTop + P_H / 2 + 4, Math.min(roadBot - P_H / 2 - 4, py));
    }

    function onDown(clientY) {
      pointerActive = true;
      applyPointer(clientY);
      if (state === STATE.TITLE) beginGame();
      else if (state === STATE.DEAD) beginGame();
    }

    canvas.addEventListener('mousedown',  e => onDown(e.clientY));
    canvas.addEventListener('mousemove',  e => { if (pointerActive) applyPointer(e.clientY); });
    canvas.addEventListener('mouseup',    ()  => { pointerActive = false; });
    canvas.addEventListener('mouseleave', ()  => { pointerActive = false; });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientY); },       { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (pointerActive) applyPointer(e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); pointerActive = false; }, { passive: false });

    // ── Game control ──────────────────────────────────────────────────────
    function beginGame() {
      state       = STATE.PLAYING;
      score       = 0;
      lives       = 3;
      speed       = 4.5;
      frameCount  = 0;
      spawnIn     = 80;
      invincible  = 0;
      shakeFrames = 0;
      obstacles   = [];
      playerY     = lane2;
      targetY     = lane2;
    }

    // ── Drawing helpers ───────────────────────────────────────────────────

    // Adjust hex color brightness
    function shade(hex, amt) {
      return '#' + [1, 3, 5].map(i => {
        const v = Math.min(255, Math.max(0, parseInt(hex.slice(i, i + 2), 16) + amt));
        return v.toString(16).padStart(2, '0');
      }).join('');
    }

    // Side-view car: cx/cy = center, dir = 1 (right/player) or -1 (left/enemy)
    function drawCar(cx, cy, cw, ch, color, dir) {
      const bx = cx - cw / 2, by = cy - ch / 2;

      // Drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(cx, by + ch + 4, cw * 0.44, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Car body
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(bx, by, cw, ch, 8);
      ctx.fill();

      // Cabin (roof section) — offset toward front half
      const cabW = cw * 0.50, cabH = ch * 0.55;
      const cabX = dir > 0 ? cx - cw * 0.08 - cabW / 2 : cx + cw * 0.08 - cabW / 2;
      ctx.fillStyle = shade(color, -28);
      ctx.beginPath();
      ctx.roundRect(cabX, by - cabH + ch * 0.18, cabW, cabH, [7, 7, 3, 3]);
      ctx.fill();

      // Window
      ctx.fillStyle = '#cceeff';
      ctx.globalAlpha = 0.88;
      ctx.beginPath();
      ctx.roundRect(cabX + 4, by - cabH + ch * 0.18 + 5, cabW - 8, cabH - 12, [5, 5, 2, 2]);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Wheels
      const wy = by + ch - 2;
      [cx - cw * 0.27, cx + cw * 0.27].forEach(wx => {
        const wr = ch * 0.30;
        ctx.fillStyle = '#151515';
        ctx.beginPath(); ctx.arc(wx, wy, wr, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#666';
        ctx.beginPath(); ctx.arc(wx, wy, wr * 0.52, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ccc';
        ctx.beginPath(); ctx.arc(wx, wy, wr * 0.22, 0, Math.PI * 2); ctx.fill();
      });

      // Headlights (front) and taillights (back)
      const frontX = dir > 0 ? bx + cw - 5 : bx;
      const tailX  = dir > 0 ? bx           : bx + cw - 5;

      ctx.fillStyle = dir > 0 ? '#ffee77' : '#ff2200'; // headlights
      ctx.beginPath(); ctx.roundRect(frontX, by + 4,        5, 8, 2); ctx.fill();
      ctx.beginPath(); ctx.roundRect(frontX, by + ch - 12,  5, 8, 2); ctx.fill();

      ctx.fillStyle = dir > 0 ? '#cc1100' : '#ffee77'; // taillights
      ctx.beginPath(); ctx.roundRect(tailX, by + 4,        5, 8, 2); ctx.fill();
      ctx.beginPath(); ctx.roundRect(tailX, by + ch - 12,  5, 8, 2); ctx.fill();
    }

    // Simple pine tree
    function drawTree(cx, baseY, trunkW, crownR, pointingDown) {
      // Trunk
      ctx.fillStyle = '#7a4e2d';
      const th = crownR * 0.55;
      ctx.fillRect(cx - trunkW / 2, pointingDown ? baseY : baseY - th, trunkW, th);
      // Crown (triangle)
      ctx.fillStyle = '#2a8a2a';
      ctx.beginPath();
      if (pointingDown) {
        ctx.moveTo(cx - crownR, baseY);
        ctx.lineTo(cx + crownR, baseY);
        ctx.lineTo(cx, baseY + crownR * 1.5);
      } else {
        ctx.moveTo(cx - crownR, baseY - th);
        ctx.lineTo(cx + crownR, baseY - th);
        ctx.lineTo(cx, baseY - th - crownR * 1.5);
      }
      ctx.closePath();
      ctx.fill();
    }

    // Puffy cloud
    function drawCloud(cx, cy, w, h) {
      ctx.fillStyle = 'rgba(255,255,255,0.82)';
      ctx.beginPath(); ctx.ellipse(cx, cy, w / 2, h / 2, 0, 0, Math.PI * 2);          ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - w * 0.26, cy + h * 0.08, w * 0.36, h * 0.44, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + w * 0.26, cy + h * 0.08, w * 0.36, h * 0.44, 0, 0, Math.PI * 2); ctx.fill();
    }

    // Heart for lives HUD
    function drawHeart(cx, cy, r, filled) {
      ctx.fillStyle = filled ? '#ff3355' : 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.moveTo(cx, cy + r * 0.4);
      ctx.bezierCurveTo(cx, cy,          cx - r * 1.1, cy,          cx - r * 1.1, cy + r * 0.5);
      ctx.bezierCurveTo(cx - r * 1.1, cy + r * 1.2, cx,          cy + r * 1.6, cx,          cy + r * 1.6);
      ctx.bezierCurveTo(cx,            cy + r * 1.6, cx + r * 1.1, cy + r * 1.2, cx + r * 1.1, cy + r * 0.5);
      ctx.bezierCurveTo(cx + r * 1.1, cy,          cx, cy,          cx, cy + r * 0.4);
      ctx.fill();
    }

    // ── Main loop ─────────────────────────────────────────────────────────
    function loop() {
      requestAnimationFrame(loop);

      // Screen shake
      let shaking = shakeFrames > 0;
      ctx.clearRect(0, 0, W, H);
      if (shaking) {
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 9, (Math.random() - 0.5) * 7);
        shakeFrames--;
      }

      // ── Sky ────────────────────────────────────────────────────────────
      const skyGrad = ctx.createLinearGradient(0, 0, 0, roadTop);
      skyGrad.addColorStop(0, '#5bbaf0');
      skyGrad.addColorStop(1, '#b8dff5');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, roadTop);

      // Clouds
      if (state === STATE.PLAYING) cloudOffset = (cloudOffset + speed * 0.12) % W;
      CLOUDS.forEach(c => {
        const cx = ((c.xRatio * W - cloudOffset % W + W * 2) % (W + c.w + 60)) - c.w / 2;
        drawCloud(cx, c.yRatio * H, c.w, c.h);
      });

      // ── Grass strips ───────────────────────────────────────────────────
      ctx.fillStyle = '#5cc45c';
      ctx.fillRect(0, roadTop - 20, W, 20);
      ctx.fillRect(0, roadBot,      W, H - roadBot);
      ctx.fillStyle = '#3da83d';
      ctx.fillRect(0, roadTop - 20, W, 8);
      ctx.fillRect(0, roadBot,      W, 9);

      // ── Road ───────────────────────────────────────────────────────────
      const roadGrad = ctx.createLinearGradient(0, roadTop, 0, roadBot);
      roadGrad.addColorStop(0, '#686868');
      roadGrad.addColorStop(1, '#525252');
      ctx.fillStyle = roadGrad;
      ctx.fillRect(0, roadTop, W, roadH);

      // Road edge lines
      ctx.strokeStyle = '#ffffbb';
      ctx.lineWidth = 3;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(0, roadTop + 2); ctx.lineTo(W, roadTop + 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, roadBot - 2); ctx.lineTo(W, roadBot - 2); ctx.stroke();

      // Lane dividers (dashed)
      if (state === STATE.PLAYING) dashOffset = (dashOffset + speed) % 80;
      ctx.strokeStyle = 'rgba(255,255,230,0.55)';
      ctx.lineWidth   = 2;
      ctx.setLineDash([38, 42]);
      ctx.lineDashOffset = -dashOffset;
      [roadTop + roadH / 3, roadTop + 2 * roadH / 3].forEach(dy => {
        ctx.beginPath(); ctx.moveTo(0, dy); ctx.lineTo(W, dy); ctx.stroke();
      });
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;

      // ── Roadside trees ─────────────────────────────────────────────────
      if (state === STATE.PLAYING) treeOffset = (treeOffset + speed * 0.85) % (W * 2 / TREES.length);
      TREES.forEach(t => {
        const baseX = ((t.xRatio * W * 2 - treeOffset + W * 4) % (W + 80)) - 40;
        const baseY = t.top ? roadTop - 3 : roadBot + 3;
        drawTree(baseX, baseY, t.trunk, t.crown, t.top);
      });

      // ── Update (playing only) ──────────────────────────────────────────
      if (state === STATE.PLAYING) {
        frameCount++;
        score = Math.floor(frameCount / 6);

        // Gradually ramp speed and tighten spawning
        speed = Math.min(16, 4.5 + Math.floor(frameCount / 360) * 0.7);
        const interval = Math.max(32, 80 - Math.floor(frameCount / 360) * 6);

        // Spawn obstacle
        spawnIn--;
        if (spawnIn <= 0) {
          const lanes = [lane1, lane2, lane3];
          obstacles.push({
            x:     W + OB_W,
            y:     lanes[Math.floor(Math.random() * 3)],
            color: OB_COLORS[Math.floor(Math.random() * OB_COLORS.length)],
          });
          spawnIn = interval + Math.floor(Math.random() * 20);
        }

        // Move obstacles; cull off-screen ones
        obstacles = obstacles.filter(o => { o.x -= speed; return o.x + OB_W > -10; });

        // Smooth player follow
        playerY += (targetY - playerY) * 0.16;

        // Invincibility countdown
        if (invincible > 0) invincible--;

        // Collision detection
        if (invincible === 0) {
          for (const o of obstacles) {
            if (Math.abs(o.x - playerX()) < (P_W + OB_W) / 2 - 10 &&
                Math.abs(o.y - playerY)   < (P_H + OB_H) / 2 - 8) {
              lives--;
              invincible  = 80;
              shakeFrames = 14;
              if (lives <= 0) {
                state = STATE.DEAD;
                if (score > hiScore) {
                  hiScore = score;
                  localStorage.setItem('cdHi', hiScore);
                }
              }
              break;
            }
          }
        }
      }

      // ── Draw obstacle cars ─────────────────────────────────────────────
      obstacles.forEach(o => drawCar(o.x, o.y, OB_W, OB_H, o.color, -1));

      // ── Draw player car ────────────────────────────────────────────────
      const showPlayer = state !== STATE.DEAD &&
                         (invincible === 0 || Math.floor(invincible / 6) % 2 === 0);
      if (showPlayer) {
        drawCar(playerX(), playerY, P_W, P_H, '#e94560', 1);

        // Speed-streak lines at high speed
        if (state === STATE.PLAYING && speed > 9) {
          const alpha = Math.min(0.6, (speed - 9) / 10);
          ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
          ctx.lineWidth = 1.5;
          for (let i = 0; i < 4; i++) {
            const ly  = playerY - 10 + i * 7;
            const len = 18 + Math.random() * 28;
            ctx.beginPath();
            ctx.moveTo(playerX() - P_W / 2 - 8,       ly);
            ctx.lineTo(playerX() - P_W / 2 - 8 - len, ly);
            ctx.stroke();
          }
        }
      }

      // ── Restore shake transform before drawing HUD ─────────────────────
      if (shaking) ctx.restore();

      // ── HUD ────────────────────────────────────────────────────────────
      if (state === STATE.PLAYING || state === STATE.DEAD) {
        // Score
        ctx.textAlign  = 'center';
        ctx.fillStyle  = '#fff';
        ctx.shadowBlur = 5; ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.font = `bold ${Math.min(24, W * 0.045)}px Segoe UI`;
        ctx.fillText(`SCORE  ${score}`, W / 2, 30);
        ctx.font = `${Math.min(14, W * 0.028)}px Segoe UI`;
        ctx.fillText(`BEST  ${hiScore}`, W / 2, 50);
        ctx.shadowBlur = 0;

        // Lives
        const hr = Math.min(11, W * 0.018);
        for (let i = 0; i < 3; i++) {
          drawHeart(W - 22 - (2 - i) * (hr * 2.8), 14, hr, i < lives);
        }
      }

      // ── Title screen ───────────────────────────────────────────────────
      if (state === STATE.TITLE) {
        ctx.fillStyle = 'rgba(0,0,0,0.48)';
        ctx.fillRect(0, 0, W, H);

        ctx.textAlign  = 'center';
        ctx.shadowBlur = 22; ctx.shadowColor = '#ff8800';
        ctx.fillStyle  = '#ffdd22';
        ctx.font       = `bold ${Math.min(62, W * 0.12)}px Segoe UI`;
        ctx.fillText('CRAZY DRIVER', W / 2, H * 0.36);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#fff';
        ctx.font      = `${Math.min(20, W * 0.042)}px Segoe UI`;
        ctx.fillText('Drag your finger up and down to dodge the cars!', W / 2, H * 0.50);

        ctx.fillStyle = '#aaffaa';
        ctx.font      = `bold ${Math.min(26, W * 0.052)}px Segoe UI`;
        ctx.fillText('Tap anywhere to start', W / 2, H * 0.62);
      }

      // ── Game-over screen ───────────────────────────────────────────────
      if (state === STATE.DEAD) {
        ctx.fillStyle = 'rgba(0,0,0,0.60)';
        ctx.fillRect(0, 0, W, H);

        ctx.textAlign  = 'center';
        ctx.shadowBlur = 18; ctx.shadowColor = '#ff0000';
        ctx.fillStyle  = '#ff4444';
        ctx.font       = `bold ${Math.min(56, W * 0.10)}px Segoe UI`;
        ctx.fillText('GAME OVER', W / 2, H * 0.36);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#ffee44';
        ctx.font      = `${Math.min(28, W * 0.056)}px Segoe UI`;
        ctx.fillText(`Score: ${score}`, W / 2, H * 0.49);
        ctx.fillStyle = '#aaddff';
        ctx.fillText(`Best:  ${hiScore}`, W / 2, H * 0.58);

        ctx.fillStyle = '#aaffaa';
        ctx.font      = `bold ${Math.min(24, W * 0.048)}px Segoe UI`;
        ctx.fillText('Tap to play again', W / 2, H * 0.70);
      }
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
