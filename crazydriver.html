<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Crazy Driver</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow: hidden; overscroll-behavior: none; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; }

    /* ── Home button ── */
    #home-link {
      position: fixed; top: 12px; left: 12px; z-index: 300;
      color: #fff; text-decoration: none; font-size: 0.88rem; font-weight: 700;
      background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 14px; border-radius: 20px; letter-spacing: 1px;
    }

    /* ── Game canvas ── */
    #c { position: fixed; inset: 0; width: 100vw; height: 100vh; display: none; }

    /* ══════════════════════════════════════════════════════
       SHARED SCREEN STYLES
    ══════════════════════════════════════════════════════ */
    .screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      overflow-y: auto; overflow-x: hidden;
      z-index: 200;
      display: none; flex-direction: column; align-items: center;
      padding: 10px 12px 24px;
      gap: 10px;
    }
    .screen.active { display: flex; }

    .scr-title {
      font-size: clamp(1.3rem, 5vw, 2rem);
      font-weight: 900; letter-spacing: 3px;
      color: #ffdd33;
      text-shadow: 0 0 20px rgba(255,200,0,0.7);
      text-align: center;
      margin-top: 44px;
    }

    /* Step dots */
    .step-dots { display: flex; gap: 8px; align-items: center; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.2s, transform 0.2s;
    }
    .dot.active  { background: #ffdd33; transform: scale(1.4); }
    .dot.done    { background: rgba(255,220,50,0.45); }

    /* Section labels */
    .gar-label {
      font-size: 0.78rem; font-weight: 800;
      letter-spacing: 3px; color: rgba(255,255,255,0.55);
      text-align: center; width: 100%;
    }

    /* Car preview canvas */
    .preview-cv {
      border-radius: 16px;
      border: 3px solid rgba(255,255,255,0.18);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      cursor: crosshair;
      touch-action: none;
      max-width: 100%;
    }

    /* Color palette */
    .color-row {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 9px;
      width: 100%; max-width: 420px;
    }
    .col-swatch {
      width: 46px; height: 46px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.25);
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
      flex-shrink: 0;
    }
    .col-swatch.active {
      border-color: #fff;
      transform: scale(1.22);
      box-shadow: 0 0 14px rgba(255,255,255,0.6);
    }

    /* Tool buttons */
    .tool-row {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 8px;
      width: 100%; max-width: 420px;
    }
    .tool-btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.22);
      color: #fff; font-size: 0.9rem; font-weight: 700;
      padding: 10px 16px; border-radius: 30px;
      cursor: pointer; letter-spacing: 1px;
      transition: background 0.12s, transform 0.1s, border-color 0.12s;
      white-space: nowrap;
    }
    .tool-btn:active { transform: scale(0.94); }
    .tool-btn.active {
      background: rgba(255,220,50,0.22);
      border-color: #ffdd33; color: #ffdd33;
    }

    /* Sticker palette */
    .sticker-row {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 10px;
      width: 100%; max-width: 420px;
    }
    .sticker-btn {
      width: 58px; height: 58px; font-size: 1.9rem;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px; cursor: pointer;
      transition: transform 0.1s, background 0.12s, border-color 0.12s;
      display: flex; align-items: center; justify-content: center;
    }
    .sticker-btn:active { transform: scale(0.88); }
    .sticker-btn.active {
      background: rgba(255,220,50,0.22);
      border-color: #ffdd33; transform: scale(1.1);
    }

    /* Wheel row */
    .wheel-row {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 10px;
      width: 100%; max-width: 420px;
    }
    .wheel-btn {
      padding: 10px 16px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px; color: #fff;
      font-size: 0.85rem; font-weight: 700;
      cursor: pointer; letter-spacing: 1px;
      transition: transform 0.1s, background 0.12s, border-color 0.12s;
      text-align: center; min-width: 90px;
    }
    .wheel-btn:active { transform: scale(0.93); }
    .wheel-btn.active {
      background: rgba(100,200,255,0.22);
      border-color: #66ccff; color: #66ccff;
    }

    /* Car type cards */
    .car-cards {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 14px;
      width: 100%; max-width: 500px;
    }
    .car-card {
      background: rgba(255,255,255,0.06);
      border: 3px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 10px 10px 8px;
      cursor: pointer; min-width: 130px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    }
    .car-card canvas { border-radius: 10px; }
    .car-card .card-label {
      color: rgba(255,255,255,0.85); font-size: 0.82rem;
      font-weight: 800; letter-spacing: 2px;
    }
    .car-card.active {
      border-color: #ffdd33;
      box-shadow: 0 0 20px rgba(255,220,50,0.4);
      transform: scale(1.05);
    }

    /* Brush indicator */
    .brush-indicator {
      display: flex; align-items: center; gap: 10px;
      color: rgba(255,255,255,0.65); font-size: 0.82rem;
      font-weight: 800; letter-spacing: 2px;
    }
    #brush-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.45);
      background: #ff3355;
      transition: background 0.15s;
    }

    /* Nav / play buttons */
    .nav-btn {
      margin-top: 4px;
      padding: 16px 44px;
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(135deg, #33aaff, #1166dd);
      color: #fff; border: none; border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 26px rgba(50,150,255,0.5);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .nav-btn:active { transform: scale(0.95); }
    .nav-btn.red {
      background: linear-gradient(135deg, #ff6b35, #ff3355);
      box-shadow: 0 0 28px rgba(255,60,80,0.55);
    }
  </style>
  <script>
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    (function() {
      var lt = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lt < 300) e.preventDefault();
        lt = now;
      }, false);
    })();
    document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, false);
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, false);
    window.addEventListener('wheel', function(e) {
      if (e.ctrlKey) e.preventDefault();
    }, { passive: false });
  </script>
</head>
<body>

<a href="index.html" id="home-link">&#8592; Home</a>
<canvas id="c"></canvas>

<!-- ══════════ SCREEN 1: CAR SELECT ══════════ -->
<div class="screen active" id="screen-car">
  <div class="scr-title">🚗 PICK YOUR RIDE!</div>
  <div class="step-dots">
    <div class="dot active"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
  </div>
  <div class="gar-label">CHOOSE YOUR CAR</div>
  <div class="car-cards" id="car-cards"></div>
  <button class="nav-btn" id="next-car">NEXT →</button>
</div>

<!-- ══════════ SCREEN 2: PAINT ══════════ -->
<div class="screen" id="screen-paint">
  <div class="scr-title">🎨 PAINT IT!</div>
  <div class="step-dots">
    <div class="dot done"></div><div class="dot active"></div>
    <div class="dot"></div><div class="dot"></div>
  </div>
  <canvas class="preview-cv" id="gv"></canvas>
  <div class="brush-indicator">BRUSH: <div id="brush-dot"></div></div>
  <div class="gar-label">PICK BRUSH COLOR</div>
  <div class="color-row" id="color-row"></div>
  <div class="gar-label">BRUSH SIZE</div>
  <div class="tool-row" id="tool-row">
    <button class="tool-btn active" id="btn-thick">🖌️ THICK</button>
    <button class="tool-btn"        id="btn-thin" >✏️ THIN</button>
  </div>
  <button class="nav-btn" id="next-paint">NEXT →</button>
</div>

<!-- ══════════ SCREEN 3: STICKERS ══════════ -->
<div class="screen" id="screen-stickers">
  <div class="scr-title">⭐ STICKERS!</div>
  <div class="step-dots">
    <div class="dot done"></div><div class="dot done"></div>
    <div class="dot active"></div><div class="dot"></div>
  </div>
  <canvas class="preview-cv" id="sv"></canvas>
  <div class="gar-label">PICK A STICKER — TAP THE CAR TO PLACE</div>
  <div class="sticker-row" id="sticker-row"></div>
  <button class="nav-btn" id="next-stickers">NEXT →</button>
</div>

<!-- ══════════ SCREEN 4: WHEELS ══════════ -->
<div class="screen" id="screen-wheels">
  <div class="scr-title">🔧 CHOOSE WHEELS!</div>
  <div class="step-dots">
    <div class="dot done"></div><div class="dot done"></div>
    <div class="dot done"></div><div class="dot active"></div>
  </div>
  <canvas class="preview-cv" id="wv"></canvas>
  <div class="gar-label">WHEEL STYLE</div>
  <div class="wheel-row" id="wheel-row"></div>
  <button class="nav-btn red" id="play-btn">🚗 LET'S DRIVE!</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  GARAGE
// ═══════════════════════════════════════════════════════
const GAR_COLORS = [
  '#ff3355','#ff8c00','#ffdd00','#44cc44',
  '#33aaff','#cc44ff','#ff55bb','#00ddcc',
  '#ffffff','#222222'
];
const STAMPS = ['⭐','❤️','🌈','🌸','⚡','🦋','🍭','🎵'];
const WHEEL_OPTS = [
  { label:'🔵 NORMAL', style:0 },
  { label:'⚫ CHUNKY',  style:1 },
  { label:'⭐ STARS',   style:2 },
  { label:'🌈 RAINBOW', style:3 },
];

const BODY_COLOR = '#444444';  // fixed dark gray — painting goes on overlay
let brushColor   = '#ff3355';  // what the brush draws with
let selColor     = BODY_COLOR; // kept for game car render
let wheelStyle = 0;
let brushMode  = 'thick';
let selStamp   = '⭐';
let carType    = 'sedan';  // 'sedan' | 'hotrod' | 'monster'

const CAR_TYPES = [
  { id:'sedan',   label:'SEDAN'   },
  { id:'hotrod',  label:'HOT ROD' },
  { id:'monster', label:'MONSTER' },
];

const overlayCV  = document.createElement('canvas');
const overlayCtx = overlayCV.getContext('2d');
const gv         = document.getElementById('gv');
const gvCtx      = gv.getContext('2d');

// ── Resize preview canvas ──────────────────────────────────────────────────
function resizeGar() {
  const w = Math.min(window.innerWidth - 24, 400);
  const h = Math.round(w * 0.43);
  const tmp = document.createElement('canvas');
  tmp.width = overlayCV.width || w; tmp.height = overlayCV.height || h;
  tmp.getContext('2d').drawImage(overlayCV, 0, 0);
  gv.width = overlayCV.width = w;
  gv.height = overlayCV.height = h;
  if (tmp.width > 0) overlayCtx.drawImage(tmp, 0, 0, w, h);
  renderGar();
}

// ── Shared helpers ─────────────────────────────────────────────────────────
function shade(hex, amt) {
  return '#' + [1,3,5].map(i => {
    const v = Math.min(255, Math.max(0, parseInt(hex.slice(i,i+2),16)+amt));
    return v.toString(16).padStart(2,'0');
  }).join('');
}

function drawStar(tCtx, cx, cy, outerR, innerR, pts, color) {
  tCtx.fillStyle = color;
  tCtx.beginPath();
  for (let i = 0; i < pts*2; i++) {
    const r = i%2===0 ? outerR : innerR;
    const a = (i/(pts*2))*Math.PI*2 - Math.PI/2;
    i===0 ? tCtx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r)
           : tCtx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
  }
  tCtx.closePath(); tCtx.fill();
}

function drawWheel(tCtx, wx, wy, wr, wStyle) {
  if (wStyle === 0) {
    tCtx.fillStyle='#151515'; tCtx.beginPath(); tCtx.arc(wx,wy,wr,0,Math.PI*2); tCtx.fill();
    tCtx.fillStyle='#666';    tCtx.beginPath(); tCtx.arc(wx,wy,wr*.52,0,Math.PI*2); tCtx.fill();
    tCtx.fillStyle='#ccc';    tCtx.beginPath(); tCtx.arc(wx,wy,wr*.22,0,Math.PI*2); tCtx.fill();
  } else if (wStyle === 1) {
    tCtx.fillStyle='#111';    tCtx.beginPath(); tCtx.arc(wx,wy,wr*1.3,0,Math.PI*2); tCtx.fill();
    tCtx.fillStyle='#555';    tCtx.beginPath(); tCtx.arc(wx,wy,wr*.65,0,Math.PI*2); tCtx.fill();
    tCtx.strokeStyle='#333'; tCtx.lineWidth=3;
    for (let a=0; a<Math.PI*2; a+=Math.PI/4) {
      tCtx.beginPath();
      tCtx.moveTo(wx+Math.cos(a)*wr*.68, wy+Math.sin(a)*wr*.68);
      tCtx.lineTo(wx+Math.cos(a)*wr*1.25,wy+Math.sin(a)*wr*1.25);
      tCtx.stroke();
    }
    tCtx.fillStyle='#999'; tCtx.beginPath(); tCtx.arc(wx,wy,wr*.28,0,Math.PI*2); tCtx.fill();
  } else if (wStyle === 2) {
    tCtx.fillStyle='#111'; tCtx.beginPath(); tCtx.arc(wx,wy,wr,0,Math.PI*2); tCtx.fill();
    drawStar(tCtx,wx,wy,wr*.92,wr*.42,5,'#ffdd00');
    tCtx.fillStyle='#ff8800'; tCtx.beginPath(); tCtx.arc(wx,wy,wr*.24,0,Math.PI*2); tCtx.fill();
  } else {
    tCtx.fillStyle='#111'; tCtx.beginPath(); tCtx.arc(wx,wy,wr,0,Math.PI*2); tCtx.fill();
    ['#ff3355','#ff9900','#ffdd00','#44cc44','#3399ff','#cc44ff'].forEach((sc,i)=>{
      const a=(i/6)*Math.PI*2;
      tCtx.strokeStyle=sc; tCtx.lineWidth=2.5;
      tCtx.beginPath(); tCtx.moveTo(wx,wy);
      tCtx.lineTo(wx+Math.cos(a)*wr*.88, wy+Math.sin(a)*wr*.88); tCtx.stroke();
    });
    tCtx.fillStyle='#fff'; tCtx.beginPath(); tCtx.arc(wx,wy,wr*.28,0,Math.PI*2); tCtx.fill();
  }
}

// ── Shared drawCar (sedan | hotrod | monster) ──────────────────────────────
function drawCar(tCtx, cx, cy, cw, ch, color, dir, wStyle, overlay, cType) {
  cType = cType || 'sedan';
  const bx=cx-cw/2, by=cy-ch/2;

  if (cType === 'hotrod') {
    // Low sleek body, cabin at rear, spoiler at front
    tCtx.fillStyle='rgba(0,0,0,0.18)';
    tCtx.beginPath(); tCtx.ellipse(cx,by+ch+3,cw*.44,4,0,0,Math.PI*2); tCtx.fill();
    const bodyTop = by + ch*0.12;
    tCtx.fillStyle=color;
    tCtx.beginPath(); tCtx.roundRect(bx,bodyTop,cw,ch*0.86,[4,4,8,8]); tCtx.fill();
    if (overlay && overlay.width>0) {
      tCtx.save();
      tCtx.beginPath(); tCtx.roundRect(bx,bodyTop,cw,ch*0.86,[4,4,8,8]); tCtx.clip();
      tCtx.drawImage(overlay,bx,bodyTop,cw,ch*0.86);
      tCtx.restore();
    }
    // Cabin shifted toward rear (dir>0 means facing right, rear is left)
    const cabW=cw*.36, cabH=ch*.52;
    const cabX= dir>0 ? cx-cw*.28-cabW/2 : cx+cw*.28-cabW/2;
    tCtx.fillStyle=shade(color,-28);
    tCtx.beginPath(); tCtx.roundRect(cabX,bodyTop-cabH+ch*.24,cabW,cabH,[7,7,3,3]); tCtx.fill();
    tCtx.fillStyle='#cceeff'; tCtx.globalAlpha=0.88;
    tCtx.beginPath(); tCtx.roundRect(cabX+4,bodyTop-cabH+ch*.24+5,cabW-8,cabH-12,[5,5,2,2]); tCtx.fill();
    tCtx.globalAlpha=1;
    // Spoiler at rear
    const spX = dir>0 ? bx+2 : bx+cw-10;
    const spTop = bodyTop - ch*0.22;
    tCtx.fillStyle=shade(color,-45);
    tCtx.beginPath(); tCtx.roundRect(spX,spTop,8,ch*0.35,3); tCtx.fill();
    tCtx.beginPath(); tCtx.roundRect(spX-(dir>0?4:4),spTop-4,18,5,2); tCtx.fill();
    // Wheels
    [cx-cw*.30, cx+cw*.26].forEach(wx=>drawWheel(tCtx,wx,by+ch-2,ch*.28,wStyle));
    // Lights
    const fX=dir>0?bx+cw-5:bx, tX=dir>0?bx:bx+cw-5;
    tCtx.fillStyle=dir>0?'#ffee77':'#ff2200';
    tCtx.beginPath(); tCtx.roundRect(fX,bodyTop+4,5,8,2); tCtx.fill();
    tCtx.fillStyle=dir>0?'#cc1100':'#ffee77';
    tCtx.beginPath(); tCtx.roundRect(tX,bodyTop+4,5,8,2); tCtx.fill();

  } else if (cType === 'monster') {
    // Tall body, huge wheels that extend below
    const wr = ch*0.52;
    const wheelY = by+ch*0.78;
    tCtx.fillStyle='rgba(0,0,0,0.22)';
    tCtx.beginPath(); tCtx.ellipse(cx,wheelY+wr*0.9,cw*.52,7,0,0,Math.PI*2); tCtx.fill();
    // Body sits higher (raised over the big wheels)
    const bodyTop = by - ch*0.08;
    tCtx.fillStyle=color;
    tCtx.beginPath(); tCtx.roundRect(bx,bodyTop,cw,ch*0.82,10); tCtx.fill();
    if (overlay && overlay.width>0) {
      tCtx.save();
      tCtx.beginPath(); tCtx.roundRect(bx,bodyTop,cw,ch*0.82,10); tCtx.clip();
      tCtx.drawImage(overlay,bx,bodyTop,cw,ch*0.82);
      tCtx.restore();
    }
    // Cabin centered
    const cabW=cw*.52, cabH=ch*.50;
    const cabX=cx-cabW/2;
    tCtx.fillStyle=shade(color,-28);
    tCtx.beginPath(); tCtx.roundRect(cabX,bodyTop-cabH+ch*.22,cabW,cabH,[7,7,3,3]); tCtx.fill();
    tCtx.fillStyle='#cceeff'; tCtx.globalAlpha=0.88;
    tCtx.beginPath(); tCtx.roundRect(cabX+4,bodyTop-cabH+ch*.22+5,cabW-8,cabH-12,[5,5,2,2]); tCtx.fill();
    tCtx.globalAlpha=1;
    // Big wheels
    [cx-cw*.27, cx+cw*.27].forEach(wx=>drawWheel(tCtx,wx,wheelY,wr,wStyle));
    // Lights
    const fX=dir>0?bx+cw-5:bx, tX=dir>0?bx:bx+cw-5;
    tCtx.fillStyle=dir>0?'#ffee77':'#ff2200';
    tCtx.beginPath(); tCtx.roundRect(fX,bodyTop+4,5,8,2); tCtx.fill();
    tCtx.fillStyle=dir>0?'#cc1100':'#ffee77';
    tCtx.beginPath(); tCtx.roundRect(tX,bodyTop+4,5,8,2); tCtx.fill();

  } else {
    // Sedan (original logic)
    tCtx.fillStyle='rgba(0,0,0,0.18)';
    tCtx.beginPath(); tCtx.ellipse(cx,by+ch+4,cw*.44,5,0,0,Math.PI*2); tCtx.fill();
    tCtx.fillStyle=color;
    tCtx.beginPath(); tCtx.roundRect(bx,by,cw,ch,8); tCtx.fill();
    if (overlay && overlay.width>0) {
      tCtx.save();
      tCtx.beginPath(); tCtx.roundRect(bx,by,cw,ch,8); tCtx.clip();
      tCtx.drawImage(overlay,bx,by,cw,ch);
      tCtx.restore();
    }
    const cabW=cw*.50, cabH=ch*.55;
    const cabX=dir>0?cx-cw*.08-cabW/2:cx+cw*.08-cabW/2;
    tCtx.fillStyle=shade(color,-28);
    tCtx.beginPath(); tCtx.roundRect(cabX,by-cabH+ch*.18,cabW,cabH,[7,7,3,3]); tCtx.fill();
    tCtx.fillStyle='#cceeff'; tCtx.globalAlpha=0.88;
    tCtx.beginPath(); tCtx.roundRect(cabX+4,by-cabH+ch*.18+5,cabW-8,cabH-12,[5,5,2,2]); tCtx.fill();
    tCtx.globalAlpha=1;
    [cx-cw*.27,cx+cw*.27].forEach(wx=>drawWheel(tCtx,wx,by+ch-2,ch*.30,wStyle));
    const fX=dir>0?bx+cw-5:bx, tX=dir>0?bx:bx+cw-5;
    tCtx.fillStyle=dir>0?'#ffee77':'#ff2200';
    tCtx.beginPath(); tCtx.roundRect(fX,by+4,5,8,2); tCtx.fill();
    tCtx.beginPath(); tCtx.roundRect(fX,by+ch-12,5,8,2); tCtx.fill();
    tCtx.fillStyle=dir>0?'#cc1100':'#ffee77';
    tCtx.beginPath(); tCtx.roundRect(tX,by+4,5,8,2); tCtx.fill();
    tCtx.beginPath(); tCtx.roundRect(tX,by+ch-12,5,8,2); tCtx.fill();
  }
}

// ── Shared preview renderer ────────────────────────────────────────────────
function renderPreview(canvas, pCtx, bodyCol, overlay, wStyle, cType) {
  const W=canvas.width, H=canvas.height;
  pCtx.clearRect(0,0,W,H);
  const bg=pCtx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#5bbaf0'); bg.addColorStop(1,'#b8dff5');
  pCtx.fillStyle=bg; pCtx.fillRect(0,0,W,H);
  pCtx.fillStyle='#5cc45c'; pCtx.fillRect(0,H*.82,W,H*.18);
  pCtx.fillStyle='#3da83d'; pCtx.fillRect(0,H*.82,W,4);
  drawCar(pCtx,W/2,H/2-4,W*.82,H*.65,bodyCol,1,wStyle,overlay,cType);
}

// ── Render garage (paint screen) preview ───────────────────────────────────
function renderGar() {
  renderPreview(gv,gvCtx,BODY_COLOR,overlayCV,wheelStyle,carType);
}

// ── Car-select screen ──────────────────────────────────────────────────────
(function buildCarSelect() {
  const container = document.getElementById('car-cards');
  const cw = Math.min(Math.floor((window.innerWidth - 60) / 3), 150);
  const ch = Math.round(cw * 0.52);
  CAR_TYPES.forEach((ct, i) => {
    const card = document.createElement('div');
    card.className = 'car-card' + (i===0 ? ' active' : '');
    card.dataset.type = ct.id;
    const cv = document.createElement('canvas');
    cv.width = cw; cv.height = ch;
    renderPreview(cv, cv.getContext('2d'), '#444444', null, 0, ct.id);
    const lbl = document.createElement('div');
    lbl.className = 'card-label'; lbl.textContent = ct.label;
    card.appendChild(cv); card.appendChild(lbl);
    card.addEventListener('pointerdown', () => {
      carType = ct.id;
      document.querySelectorAll('.car-card').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
    });
    container.appendChild(card);
  });
})();

// ── Screen navigation ──────────────────────────────────────────────────────
const SCREENS = ['screen-car','screen-paint','screen-stickers','screen-wheels'];
function showScreen(id) {
  SCREENS.forEach(s => {
    const el = document.getElementById(s);
    if (el) el.classList.remove('active');
  });
  document.getElementById('c').style.display = 'none';
  if (id === 'game') {
    document.getElementById('c').style.display = 'block';
  } else {
    document.getElementById(id).classList.add('active');
  }
}

// ── Build paint UI ─────────────────────────────────────────────────────────
(function buildPaintUI() {
  const cr = document.getElementById('color-row');
  GAR_COLORS.forEach((c,i) => {
    const b = document.createElement('div');
    b.className = 'col-swatch' + (i===0 ? ' active' : '');
    b.style.background = c;
    if (c==='#ffffff') b.style.borderColor = 'rgba(200,200,200,0.5)';
    b.addEventListener('pointerdown', () => {
      brushColor = c;  // only brush color changes — car body stays dark gray
      document.getElementById('brush-dot').style.background = c;
      document.querySelectorAll('.col-swatch').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    });
    cr.appendChild(b);
  });
})();

// ── Brush size buttons ─────────────────────────────────────────────────────
function setMode(m) {
  brushMode = m;
  document.getElementById('btn-thick').classList.toggle('active', m==='thick');
  document.getElementById('btn-thin' ).classList.toggle('active', m==='thin');
}
document.getElementById('btn-thick').addEventListener('pointerdown', ()=>setMode('thick'));
document.getElementById('btn-thin' ).addEventListener('pointerdown', ()=>setMode('thin'));

// ── Screen nav buttons ─────────────────────────────────────────────────────
document.getElementById('next-car').addEventListener('click', () => { showScreen('screen-paint'); resizeGar(); });
document.getElementById('next-paint').addEventListener('click', () => { showScreen('screen-stickers'); initStickerScreen(); });
document.getElementById('next-stickers').addEventListener('click', () => showScreen('screen-wheels'));

// ── Sticker screen ─────────────────────────────────────────────────────────
const STICKERS = ['⭐','❤️','🌈','🌸','⚡','🦋','🍭','🎵','🔥','💎'];
const sv    = document.getElementById('sv');
const svCtx = sv.getContext('2d');

function initStickerScreen() {
  const w = Math.min(window.innerWidth-24,400);
  sv.width = w; sv.height = Math.round(w*0.43);
  renderPreview(sv,svCtx,BODY_COLOR,overlayCV,wheelStyle,carType);
}

(function buildStickerUI() {
  const row = document.getElementById('sticker-row');
  STICKERS.forEach((s,i) => {
    const b = document.createElement('button');
    b.className = 'sticker-btn' + (i===0?' active':'');
    b.textContent = s;
    b.addEventListener('pointerdown', () => {
      selStamp = s;
      document.querySelectorAll('.sticker-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    });
    row.appendChild(b);
  });
})();

function stickerPos(e) {
  const rect = sv.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x:(src.clientX-rect.left)*(sv.width/rect.width),
    y:(src.clientY-rect.top)*(sv.height/rect.height)
  };
}

sv.addEventListener('pointerdown', e => {
  e.preventDefault();
  const pos = stickerPos(e);
  const fs = Math.round(sv.height*0.3);
  overlayCtx.font = fs+'px serif';
  overlayCtx.textAlign = 'center'; overlayCtx.textBaseline = 'middle';
  overlayCtx.fillText(selStamp, pos.x, pos.y);
  renderPreview(sv,svCtx,BODY_COLOR,overlayCV,wheelStyle,carType);
});

// ── Garage painting input ──────────────────────────────────────────────────
let garPainting=false, garLastPos=null;

function garPos(e) {
  const rect=gv.getBoundingClientRect();
  const scX=gv.width/rect.width, scY=gv.height/rect.height;
  const src=e.touches?e.touches[0]:e;
  return { x:(src.clientX-rect.left)*scX, y:(src.clientY-rect.top)*scY };
}

function garPaintAt(pos, isFirst) {
  const r = brushMode==='thin' ? 4 : 13;
  overlayCtx.globalCompositeOperation = 'source-over';
  overlayCtx.fillStyle = brushColor;
  if (!isFirst && garLastPos) {
    const dx=pos.x-garLastPos.x, dy=pos.y-garLastPos.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const steps=Math.max(1,Math.ceil(dist/(r*.5)));
    for(let i=0;i<=steps;i++){
      const t=i/steps;
      overlayCtx.beginPath();
      overlayCtx.arc(garLastPos.x+dx*t, garLastPos.y+dy*t, r, 0, Math.PI*2);
      overlayCtx.fill();
    }
  } else {
    overlayCtx.beginPath(); overlayCtx.arc(pos.x,pos.y,r,0,Math.PI*2); overlayCtx.fill();
  }
  overlayCtx.globalCompositeOperation='source-over';
  garLastPos=pos; renderGar();
}

function garStampAt(pos) {
  const fs=Math.round(gv.height*.28);
  overlayCtx.font=fs+'px serif';
  overlayCtx.textAlign='center'; overlayCtx.textBaseline='middle';
  overlayCtx.fillText(selStamp, pos.x, pos.y);
  renderGar();
}

gv.addEventListener('pointerdown', e=>{
  e.preventDefault(); garPainting=true; garLastPos=null;
  garPaintAt(garPos(e), true);
  gv.setPointerCapture(e.pointerId);
});
gv.addEventListener('pointermove', e=>{
  e.preventDefault();
  if (!garPainting) return;
  garPaintAt(garPos(e), false);
});
gv.addEventListener('pointerup',   e=>{ e.preventDefault(); garPainting=false; garLastPos=null; });
gv.addEventListener('pointercancel',e=>{ garPainting=false; garLastPos=null; });

// ── Play button → start game ───────────────────────────────────────────────
document.getElementById('play-btn').addEventListener('click', ()=>{
  showScreen('game');
  startGame();
});

// Init
resizeGar();

</script>
<script>
// ═══════════════════════════════════════════════════════
//  GAME
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, roadTop, roadBot, roadH, lane1, lane2, lane3;
function resize() {
  W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;
  roadTop=Math.round(H*.22); roadBot=Math.round(H*.85);
  roadH=roadBot-roadTop;
  lane1=roadTop+roadH*.17; lane2=roadTop+roadH*.50; lane3=roadTop+roadH*.83;
}
resize();
window.addEventListener('resize', ()=>{ resize(); resizeGar(); });

const STATE={TITLE:0,PLAYING:1,DEAD:2};
let state=STATE.TITLE;
let score,hiScore,lives,speed,frameCount,spawnIn,invincible,shakeFrames;
const P_W=90,P_H=42;
let playerY,targetY;
const playerX=()=>W*.18;
const OB_W=88,OB_H=40;
const OB_COLORS=['#2288ff','#ff9900','#22cc44','#cc44ff','#ff6644','#00bbcc','#ffdd00'];
let obstacles=[];

const TREES=Array.from({length:14},(_,i)=>({
  xRatio:i/14+Math.random()*.04,
  top:Math.random()<.5,
  trunk:Math.random()*6+8,
  crown:Math.random()*18+16,
}));
const CLOUDS=Array.from({length:6},(_,i)=>({
  xRatio:i/6+Math.random()*.08,
  yRatio:.03+Math.random()*.12,
  w:Math.random()*90+55,
  h:Math.random()*28+18,
}));
let dashOffset=0, treeOffset=0, cloudOffset=0;
hiScore=+(localStorage.getItem('cdHi')||0);

// ── Input ──────────────────────────────────────────────────────────────────
let pointerActive=false;
function applyPointer(clientY) {
  const rect=canvas.getBoundingClientRect();
  const py=(clientY-rect.top)*(H/rect.height);
  targetY=Math.max(roadTop+P_H/2+4, Math.min(roadBot-P_H/2-4, py));
}
function onDown(cy) {
  pointerActive=true; applyPointer(cy);
  if (state===STATE.TITLE||state===STATE.DEAD) beginGame();
}
canvas.addEventListener('mousedown', e=>onDown(e.clientY));
canvas.addEventListener('mousemove', e=>{ if(pointerActive) applyPointer(e.clientY); });
canvas.addEventListener('mouseup',   ()=>{ pointerActive=false; });
canvas.addEventListener('mouseleave',()=>{ pointerActive=false; });
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); onDown(e.touches[0].clientY); },{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(pointerActive) applyPointer(e.touches[0].clientY); },{passive:false});
canvas.addEventListener('touchend',  e=>{ e.preventDefault(); pointerActive=false; },{passive:false});

// ── Begin game ─────────────────────────────────────────────────────────────
function beginGame() {
  state=STATE.PLAYING; score=0; lives=3; speed=4.5;
  frameCount=0; spawnIn=80; invincible=0; shakeFrames=0;
  obstacles=[]; playerY=lane2; targetY=lane2;
}
function startGame() { state=STATE.TITLE; loop(); }

// ── Drawing helpers ────────────────────────────────────────────────────────
function drawTree(cx, baseY, trunkW, crownR) {
  // Always upright: trunk root at baseY, growing up
  const th=crownR*.55;
  ctx.fillStyle='#7a4e2d';
  ctx.fillRect(cx-trunkW/2, baseY-th, trunkW, th);
  ctx.fillStyle='#2a8a2a';
  ctx.beginPath();
  ctx.moveTo(cx-crownR, baseY-th);
  ctx.lineTo(cx+crownR, baseY-th);
  ctx.lineTo(cx,        baseY-th-crownR*1.5);
  ctx.closePath(); ctx.fill();
  // second tier for fullness
  ctx.fillStyle='#33aa33';
  ctx.beginPath();
  ctx.moveTo(cx-crownR*.75, baseY-th-crownR*.7);
  ctx.lineTo(cx+crownR*.75, baseY-th-crownR*.7);
  ctx.lineTo(cx,             baseY-th-crownR*2.0);
  ctx.closePath(); ctx.fill();
}

function drawCloud(cx,cy,w,h) {
  ctx.fillStyle='rgba(255,255,255,0.82)';
  ctx.beginPath(); ctx.ellipse(cx,cy,w/2,h/2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx-w*.26,cy+h*.08,w*.36,h*.44,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+w*.26,cy+h*.08,w*.36,h*.44,0,0,Math.PI*2); ctx.fill();
}

function drawHeart(cx,cy,r,filled) {
  ctx.fillStyle=filled?'#ff3355':'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.moveTo(cx,cy+r*.4);
  ctx.bezierCurveTo(cx,cy,          cx-r*1.1,cy,       cx-r*1.1,cy+r*.5);
  ctx.bezierCurveTo(cx-r*1.1,cy+r*1.2,cx,cy+r*1.6, cx,cy+r*1.6);
  ctx.bezierCurveTo(cx,cy+r*1.6, cx+r*1.1,cy+r*1.2, cx+r*1.1,cy+r*.5);
  ctx.bezierCurveTo(cx+r*1.1,cy, cx,cy, cx,cy+r*.4);
  ctx.fill();
}

// ── Main loop ──────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  let shaking=shakeFrames>0;
  ctx.clearRect(0,0,W,H);
  if(shaking){ ctx.save(); ctx.translate((Math.random()-.5)*9,(Math.random()-.5)*7); shakeFrames--; }

  // Sky
  const skyG=ctx.createLinearGradient(0,0,0,roadTop);
  skyG.addColorStop(0,'#5bbaf0'); skyG.addColorStop(1,'#b8dff5');
  ctx.fillStyle=skyG; ctx.fillRect(0,0,W,roadTop);

  // Clouds
  if(state===STATE.PLAYING) cloudOffset=(cloudOffset+speed*.12)%W;
  CLOUDS.forEach(c=>{
    const cx=((c.xRatio*W-cloudOffset%W+W*2)%(W+c.w+60))-c.w/2;
    drawCloud(cx,c.yRatio*H,c.w,c.h);
  });

  // Grass
  ctx.fillStyle='#5cc45c'; ctx.fillRect(0,roadTop-20,W,20); ctx.fillRect(0,roadBot,W,H-roadBot);
  ctx.fillStyle='#3da83d'; ctx.fillRect(0,roadTop-20,W,8);  ctx.fillRect(0,roadBot,W,9);

  // Road
  const roadG=ctx.createLinearGradient(0,roadTop,0,roadBot);
  roadG.addColorStop(0,'#686868'); roadG.addColorStop(1,'#525252');
  ctx.fillStyle=roadG; ctx.fillRect(0,roadTop,W,roadH);

  // Road edges
  ctx.strokeStyle='#ffffbb'; ctx.lineWidth=3; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(0,roadTop+2); ctx.lineTo(W,roadTop+2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,roadBot-2); ctx.lineTo(W,roadBot-2); ctx.stroke();

  // Lane dividers
  if(state===STATE.PLAYING) dashOffset=(dashOffset+speed)%80;
  ctx.strokeStyle='rgba(255,255,230,.55)'; ctx.lineWidth=2;
  ctx.setLineDash([38,42]); ctx.lineDashOffset=-dashOffset;
  [roadTop+roadH/3, roadTop+2*roadH/3].forEach(dy=>{
    ctx.beginPath(); ctx.moveTo(0,dy); ctx.lineTo(W,dy); ctx.stroke();
  });
  ctx.setLineDash([]); ctx.lineDashOffset=0;

  // Trees — all upright; top trees root at roadTop, bottom at roadBot
  if(state===STATE.PLAYING) treeOffset=(treeOffset+speed*.85)%(W*2/TREES.length);
  TREES.forEach(t=>{
    const bx=((t.xRatio*W*2-treeOffset+W*4)%(W+80))-40;
    // top trees: baseY=roadTop so trunk grows up into top grass strip
    // bottom trees: baseY=roadBot so trunk grows up from bottom grass
    const baseY = t.top ? roadTop : roadBot;
    drawTree(bx, baseY, t.trunk, t.crown);
  });

  // Update
  if(state===STATE.PLAYING) {
    frameCount++; score=Math.floor(frameCount/6);
    speed=Math.min(16,4.5+Math.floor(frameCount/360)*.7);
    const interval=Math.max(32,80-Math.floor(frameCount/360)*6);
    spawnIn--;
    if(spawnIn<=0){
      const lanes=[lane1,lane2,lane3];
      obstacles.push({ x:W+OB_W, y:lanes[Math.floor(Math.random()*3)],
        color:OB_COLORS[Math.floor(Math.random()*OB_COLORS.length)] });
      spawnIn=interval+Math.floor(Math.random()*20);
    }
    obstacles=obstacles.filter(o=>{ o.x-=speed; return o.x+OB_W>-10; });
    playerY+=(targetY-playerY)*.16;
    if(invincible>0) invincible--;
    if(invincible===0){
      for(const o of obstacles){
        if(Math.abs(o.x-playerX())<(P_W+OB_W)/2-10 && Math.abs(o.y-playerY)<(P_H+OB_H)/2-8){
          lives--; invincible=80; shakeFrames=14;
          if(lives<=0){
            state=STATE.DEAD;
            if(score>hiScore){ hiScore=score; localStorage.setItem('cdHi',hiScore); }
          }
          break;
        }
      }
    }
  }

  // Obstacle cars
  obstacles.forEach(o=>drawCar(ctx,o.x,o.y,OB_W,OB_H,o.color,-1,0,null));

  // Player car (with custom paint)
  const showP=state!==STATE.DEAD&&(invincible===0||Math.floor(invincible/6)%2===0);
  if(showP){
    drawCar(ctx,playerX(),playerY,P_W,P_H,BODY_COLOR,1,wheelStyle,overlayCV,carType);
    if(state===STATE.PLAYING&&speed>9){
      const alpha=Math.min(.6,(speed-9)/10);
      ctx.strokeStyle=`rgba(255,255,255,${alpha})`; ctx.lineWidth=1.5;
      for(let i=0;i<4;i++){
        const ly=playerY-10+i*7, len=18+Math.random()*28;
        ctx.beginPath();
        ctx.moveTo(playerX()-P_W/2-8,ly);
        ctx.lineTo(playerX()-P_W/2-8-len,ly);
        ctx.stroke();
      }
    }
  }

  if(shaking) ctx.restore();

  // HUD
  if(state===STATE.PLAYING||state===STATE.DEAD){
    ctx.textAlign='center'; ctx.fillStyle='#fff';
    ctx.shadowBlur=5; ctx.shadowColor='rgba(0,0,0,.8)';
    ctx.font=`bold ${Math.min(24,W*.045)}px Segoe UI`;
    ctx.fillText(`SCORE  ${score}`,W/2,30);
    ctx.font=`${Math.min(14,W*.028)}px Segoe UI`;
    ctx.fillText(`BEST  ${hiScore}`,W/2,50);
    ctx.shadowBlur=0;
    const hr=Math.min(11,W*.018);
    for(let i=0;i<3;i++) drawHeart(W-22-(2-i)*(hr*2.8),14,hr,i<lives);
  }

  // Title
  if(state===STATE.TITLE){
    ctx.fillStyle='rgba(0,0,0,.48)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.shadowBlur=22; ctx.shadowColor='#ff8800';
    ctx.fillStyle='#ffdd22';
    ctx.font=`bold ${Math.min(62,W*.12)}px Segoe UI`;
    ctx.fillText('CRAZY DRIVER',W/2,H*.36);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';
    ctx.font=`${Math.min(20,W*.042)}px Segoe UI`;
    ctx.fillText('Drag your finger up and down to dodge the cars!',W/2,H*.50);
    ctx.fillStyle='#aaffaa';
    ctx.font=`bold ${Math.min(26,W*.052)}px Segoe UI`;
    ctx.fillText('Tap anywhere to start',W/2,H*.62);
  }

  // Game over
  if(state===STATE.DEAD){
    ctx.fillStyle='rgba(0,0,0,.60)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.shadowBlur=18; ctx.shadowColor='#ff0000';
    ctx.fillStyle='#ff4444';
    ctx.font=`bold ${Math.min(56,W*.10)}px Segoe UI`;
    ctx.fillText('GAME OVER',W/2,H*.36);
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffee44';
    ctx.font=`${Math.min(28,W*.056)}px Segoe UI`;
    ctx.fillText(`Score: ${score}`,W/2,H*.49);
    ctx.fillStyle='#aaddff';
    ctx.fillText(`Best:  ${hiScore}`,W/2,H*.58);
    ctx.fillStyle='#aaffaa';
    ctx.font=`bold ${Math.min(24,W*.048)}px Segoe UI`;
    ctx.fillText('Tap to play again',W/2,H*.70);
  }
}

</script>
