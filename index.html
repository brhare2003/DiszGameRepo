<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000018;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
      color: #e94560;
      text-shadow: 0 0 18px #e94560, 0 0 40px rgba(233, 69, 96, 0.5);
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 24px;
      min-height: 1.5em;
      color: #a8dadc;
      text-shadow: 0 0 10px rgba(168, 218, 220, 0.8);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 6px;
    }

    .cell {
      background: rgba(22, 33, 62, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(15, 52, 96, 0.9);
      border-radius: 8px;
      font-size: 3.2rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
      user-select: none;
      box-shadow: 0 0 12px rgba(15, 52, 96, 0.6), inset 0 0 18px rgba(15, 52, 96, 0.2);
    }

    .cell:hover:not(.taken) {
      background: rgba(15, 52, 96, 0.75);
      box-shadow: 0 0 20px rgba(168, 218, 220, 0.45), inset 0 0 18px rgba(15, 52, 96, 0.4);
      border-color: rgba(168, 218, 220, 0.5);
    }

    /* ── X symbol ────────────────────────────────────────────────────── */
    .cell.x {
      color: #ff3060;
      border-color: rgba(255, 48, 96, 0.55);
      box-shadow:
        0 0 18px rgba(255, 48, 96, 0.45),
        inset 0 0 22px rgba(255, 48, 96, 0.12);
      text-shadow:
        0 0 6px  #ff3060,
        0 0 14px #ff3060,
        0 0 28px #e94560,
        0 0 55px rgba(233, 69, 96, 0.55),
        0 0 90px rgba(233, 69, 96, 0.25);
      animation:
        symbolPop  0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both,
        xPulse     2.4s 0.28s ease-in-out infinite alternate;
    }

    /* ── O symbol ────────────────────────────────────────────────────── */
    .cell.o {
      color: #a8dadc;
      border-color: rgba(168, 218, 220, 0.55);
      box-shadow:
        0 0 18px rgba(168, 218, 220, 0.45),
        inset 0 0 22px rgba(168, 218, 220, 0.12);
      text-shadow:
        0 0 6px  #a8dadc,
        0 0 14px #a8dadc,
        0 0 28px #7ecbcf,
        0 0 55px rgba(168, 218, 220, 0.55),
        0 0 90px rgba(168, 218, 220, 0.25);
      animation:
        symbolPop  0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both,
        oPulse     2.4s 0.28s ease-in-out infinite alternate;
    }

    /* Pop-in when a symbol is first placed */
    @keyframes symbolPop {
      0%   { transform: scale(0.2); opacity: 0; }
      65%  { transform: scale(1.18); }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* Breathing glow for X */
    @keyframes xPulse {
      from {
        text-shadow:
          0 0 6px  #ff3060,
          0 0 14px #ff3060,
          0 0 28px #e94560,
          0 0 55px rgba(233, 69, 96, 0.55),
          0 0 90px rgba(233, 69, 96, 0.25);
      }
      to {
        text-shadow:
          0 0 8px  #ff3060,
          0 0 22px #ff3060,
          0 0 46px #e94560,
          0 0 80px rgba(233, 69, 96, 0.75),
          0 0 120px rgba(233, 69, 96, 0.35);
      }
    }

    /* Breathing glow for O */
    @keyframes oPulse {
      from {
        text-shadow:
          0 0 6px  #a8dadc,
          0 0 14px #a8dadc,
          0 0 28px #7ecbcf,
          0 0 55px rgba(168, 218, 220, 0.55),
          0 0 90px rgba(168, 218, 220, 0.25);
      }
      to {
        text-shadow:
          0 0 8px  #a8dadc,
          0 0 22px #a8dadc,
          0 0 46px #7ecbcf,
          0 0 80px rgba(168, 218, 220, 0.75),
          0 0 120px rgba(168, 218, 220, 0.35);
      }
    }

    .cell.win {
      background: rgba(15, 52, 96, 0.85);
      animation:
        winPulse   0.4s ease-in-out,
        xPulse     2.4s ease-in-out infinite alternate;
      box-shadow: 0 0 30px rgba(168, 218, 220, 0.7), inset 0 0 22px rgba(15, 52, 96, 0.5);
      border-color: rgba(168, 218, 220, 0.75);
    }

    .cell.win.x { animation: winPulse 0.4s ease-in-out, xPulse 2.4s ease-in-out infinite alternate; }
    .cell.win.o { animation: winPulse 0.4s ease-in-out, oPulse 2.4s ease-in-out infinite alternate; }

    @keyframes winPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #restart-btn {
      background: #e94560;
      color: #fff;
      box-shadow: 0 0 14px rgba(233, 69, 96, 0.6);
    }

    #restart-btn:hover {
      box-shadow: 0 0 24px rgba(233, 69, 96, 0.9);
    }

    #mode-btn {
      background: rgba(15, 52, 96, 0.7);
      color: #a8dadc;
      border: 2px solid #a8dadc;
      box-shadow: 0 0 10px rgba(168, 218, 220, 0.3);
      backdrop-filter: blur(6px);
    }

    #mode-btn:hover {
      box-shadow: 0 0 22px rgba(168, 218, 220, 0.6);
    }

    #score {
      display: flex;
      gap: 32px;
      margin-top: 24px;
      font-size: 1rem;
    }

    .score-item { text-align: center; }

    .score-item span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-item.x-score span {
      color: #ff3060;
      text-shadow: 0 0 12px rgba(255, 48, 96, 0.8);
    }
    .score-item.o-score span {
      color: #a8dadc;
      text-shadow: 0 0 12px rgba(168, 218, 220, 0.8);
    }
    .score-item.draw-score span { color: #888; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div id="controls">
    <button id="mode-btn">vs CPU</button>
    <button id="restart-btn">Restart</button>
  </div>

  <div id="score">
    <div class="score-item x-score">X <span id="x-wins">0</span></div>
    <div class="score-item draw-score">Draws <span id="draws">0</span></div>
    <div class="score-item o-score">O <span id="o-wins">0</span></div>
  </div>

  <script>
    // ── Static colorful background ────────────────────────────────────────
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx    = canvas.getContext('2d');

      // Bright palette for a fun, kid-friendly scene
      const COLORS = ['#FFE033','#FF3CAC','#00E5FF','#FF8C00','#B2FF59','#CE93D8','#FFFFFF','#FF6B6B'];

      // Pre-generate positions once so they're stable on resize
      const bigStars = Array.from({ length: 26 }, () => ({
        rx:    Math.random(),
        ry:    Math.random(),
        r:     Math.random() * 22 + 10,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        rot:   Math.random() * Math.PI * 2
      }));

      const smallDots = Array.from({ length: 80 }, () => ({
        rx:    Math.random(),
        ry:    Math.random(),
        r:     Math.random() * 3 + 1,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: Math.random() * 0.5 + 0.4
      }));

      // Draw a 5-pointed star
      function star5(cx, cy, R, r, color, rot) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rot);
        ctx.fillStyle   = color;
        ctx.shadowBlur  = 20;
        ctx.shadowColor = color;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const a   = (i * Math.PI) / 5 - Math.PI / 2;
          const rad = i % 2 === 0 ? R : r;
          i === 0
            ? ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad)
            : ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      // Draw a rainbow semicircle centred at (cx, cy) with given outer radius
      function rainbow(cx, cy, maxR) {
        const bands = ['#FF0000','#FF8800','#FFee00','#00DD00','#0099FF','#5500CC','#CC00BB'];
        const bw = Math.max(4, maxR * 0.068);
        ctx.save();
        ctx.globalAlpha = 0.78;
        for (let i = 0; i < bands.length; i++) {
          const R = maxR - i * bw * 0.87;
          if (R <= 0) continue;
          ctx.strokeStyle = bands[i];
          ctx.lineWidth   = bw;
          ctx.shadowBlur  = 7;
          ctx.shadowColor = bands[i];
          ctx.beginPath();
          ctx.arc(cx, cy, R, Math.PI, 2 * Math.PI);
          ctx.stroke();
        }
        ctx.restore();
      }

      function draw() {
        const W = canvas.width  = window.innerWidth;
        const H = canvas.height = window.innerHeight;

        // Deep space background — dark enough for the frosted cells to pop
        const bg = ctx.createRadialGradient(W / 2, H * 0.4, 0, W / 2, H * 0.4, Math.max(W, H));
        bg.addColorStop(0,   '#18004a');
        bg.addColorStop(0.5, '#0a0030');
        bg.addColorStop(1,   '#000018');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Subtle colour clouds / glow blobs for depth
        const blobs = [
          { rx: 0.15, ry: 0.25, r: W * 0.28, c: 'rgba(180,0,255,0.07)' },
          { rx: 0.85, ry: 0.20, r: W * 0.24, c: 'rgba(0,180,255,0.07)' },
          { rx: 0.50, ry: 0.75, r: W * 0.30, c: 'rgba(255,80,160,0.06)' },
        ];
        blobs.forEach(b => {
          const g = ctx.createRadialGradient(b.rx*W, b.ry*H, 0, b.rx*W, b.ry*H, b.r);
          g.addColorStop(0, b.c);
          g.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, W, H);
        });

        // Rainbows — one large centred at the bottom, two small at the corners
        rainbow(W / 2,    H * 0.92,  Math.min(W * 0.70, H * 0.82));
        rainbow(W * 0.03, H * 0.68,  W * 0.30);
        rainbow(W * 0.97, H * 0.64,  W * 0.26);

        ctx.shadowBlur = 0;

        // Small glowing dots scattered everywhere
        smallDots.forEach(d => {
          ctx.globalAlpha = d.alpha;
          ctx.fillStyle   = d.color;
          ctx.shadowBlur  = 6;
          ctx.shadowColor = d.color;
          ctx.beginPath();
          ctx.arc(d.rx * W, d.ry * H, d.r, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur  = 0;

        // Large colourful 5-pointed stars
        bigStars.forEach(s => {
          star5(s.rx * W, s.ry * H, s.r, s.r * 0.42, s.color, s.rot);
        });

        ctx.shadowBlur = 0;
      }

      draw();
      window.addEventListener('resize', draw);
    })();

    // ── Game logic ─────────────────────────────────────────────────────────
    const WINNING_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;
    let vsComputer = false;
    let scores = { X: 0, O: 0, draw: 0 };
    let nextFirst = 'X'; // alternates each CPU-mode game

    const cells     = document.querySelectorAll('.cell');
    const statusEl  = document.getElementById('status');
    const modeBtnEl = document.getElementById('mode-btn');
    const xWinsEl   = document.getElementById('x-wins');
    const oWinsEl   = document.getElementById('o-wins');
    const drawsEl   = document.getElementById('draws');

    cells.forEach(cell => cell.addEventListener('click', onCellClick));
    document.getElementById('restart-btn').addEventListener('click', restart);
    modeBtnEl.addEventListener('click', toggleMode);

    function onCellClick(e) {
      const idx = +e.target.dataset.index;
      if (gameOver || board[idx]) return;
      makeMove(idx, currentPlayer);
      if (!gameOver && vsComputer && currentPlayer === 'O') {
        setTimeout(cpuMove, 300);
      }
    }

    function makeMove(idx, player) {
      board[idx] = player;
      const cell = cells[idx];
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase());

      const winLine = getWinner();
      if (winLine) {
        winLine.forEach(i => cells[i].classList.add('win'));
        statusEl.textContent = `Player ${player} wins!`;
        scores[player]++;
        updateScores();
        gameOver = true;
        return;
      }
      if (board.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        scores.draw++;
        updateScores();
        gameOver = true;
        return;
      }
      currentPlayer = player === 'X' ? 'O' : 'X';
      statusEl.textContent = vsComputer && currentPlayer === 'O'
        ? 'CPU is thinking...'
        : `Player ${currentPlayer}'s turn`;
    }

    function getWinner() {
      for (const line of WINNING_LINES) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
      }
      return null;
    }

    function cpuMove() {
      if (gameOver) return;
      makeMove(bestMove(), 'O');
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > best) { best = score; move = i; }
        }
      }
      return move;
    }

    function minimax(b, depth, isMax) {
      const win = minimaxWinner(b);
      if (win === 'O') return 10 - depth;
      if (win === 'X') return depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=null; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=null; }
        }
        return best;
      }
    }

    function minimaxWinner(b) {
      for (const [a,c,d] of WINNING_LINES) {
        if (b[a] && b[a]===b[c] && b[a]===b[d]) return b[a];
      }
      return null;
    }

    function restart() {
      board = Array(9).fill(null);
      gameOver = false;

      if (vsComputer) {
        currentPlayer = nextFirst;
        nextFirst = nextFirst === 'X' ? 'O' : 'X'; // flip for the game after this one
      } else {
        currentPlayer = 'X';
      }

      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });

      if (vsComputer && currentPlayer === 'O') {
        statusEl.textContent = 'CPU is thinking...';
        setTimeout(cpuMove, 400);
      } else {
        statusEl.textContent = `Player ${currentPlayer}'s turn`;
      }
    }

    function toggleMode() {
      vsComputer = !vsComputer;
      nextFirst  = 'X'; // reset alternation when switching modes
      modeBtnEl.textContent       = vsComputer ? 'vs Human' : 'vs CPU';
      modeBtnEl.style.color       = vsComputer ? '#e94560' : '#a8dadc';
      modeBtnEl.style.borderColor = vsComputer ? '#e94560' : '#a8dadc';
      restart();
    }

    function updateScores() {
      xWinsEl.textContent = scores.X;
      oWinsEl.textContent = scores.O;
      drawsEl.textContent = scores.draw;
    }
  </script>
</body>
</html>
