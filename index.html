<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #020010;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
      color: #e94560;
      text-shadow: 0 0 18px #e94560, 0 0 40px rgba(233, 69, 96, 0.5);
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 24px;
      min-height: 1.5em;
      color: #a8dadc;
      text-shadow: 0 0 10px rgba(168, 218, 220, 0.8);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 6px;
    }

    .cell {
      background: rgba(22, 33, 62, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(15, 52, 96, 0.9);
      border-radius: 8px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      user-select: none;
      box-shadow: 0 0 12px rgba(15, 52, 96, 0.6), inset 0 0 18px rgba(15, 52, 96, 0.2);
    }

    .cell:hover:not(.taken) {
      background: rgba(15, 52, 96, 0.75);
      transform: scale(1.04);
      box-shadow: 0 0 20px rgba(168, 218, 220, 0.45), inset 0 0 18px rgba(15, 52, 96, 0.4);
      border-color: rgba(168, 218, 220, 0.5);
    }

    .cell.x {
      color: #e94560;
      text-shadow: 0 0 14px #e94560, 0 0 28px rgba(233, 69, 96, 0.5);
    }

    .cell.o {
      color: #a8dadc;
      text-shadow: 0 0 14px #a8dadc, 0 0 28px rgba(168, 218, 220, 0.5);
    }

    .cell.win {
      background: rgba(15, 52, 96, 0.85);
      animation: pulse 0.4s ease-in-out;
      box-shadow: 0 0 28px rgba(168, 218, 220, 0.65), inset 0 0 22px rgba(15, 52, 96, 0.5);
      border-color: rgba(168, 218, 220, 0.7);
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #restart-btn {
      background: #e94560;
      color: #fff;
      box-shadow: 0 0 14px rgba(233, 69, 96, 0.6);
    }

    #restart-btn:hover {
      box-shadow: 0 0 22px rgba(233, 69, 96, 0.9);
    }

    #mode-btn {
      background: rgba(15, 52, 96, 0.7);
      color: #a8dadc;
      border: 2px solid #a8dadc;
      box-shadow: 0 0 10px rgba(168, 218, 220, 0.3);
      backdrop-filter: blur(6px);
    }

    #mode-btn:hover {
      box-shadow: 0 0 20px rgba(168, 218, 220, 0.6);
    }

    #score {
      display: flex;
      gap: 32px;
      margin-top: 24px;
      font-size: 1rem;
    }

    .score-item {
      text-align: center;
    }

    .score-item span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-item.x-score span {
      color: #e94560;
      text-shadow: 0 0 10px rgba(233, 69, 96, 0.7);
    }
    .score-item.o-score span {
      color: #a8dadc;
      text-shadow: 0 0 10px rgba(168, 218, 220, 0.7);
    }
    .score-item.draw-score span { color: #888; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div id="controls">
    <button id="mode-btn">vs CPU</button>
    <button id="restart-btn">Restart</button>
  </div>

  <div id="score">
    <div class="score-item x-score">X <span id="x-wins">0</span></div>
    <div class="score-item draw-score">Draws <span id="draws">0</span></div>
    <div class="score-item o-score">O <span id="o-wins">0</span></div>
  </div>

  <script>
    // ── Neon background animation ──────────────────────────────────────────
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Twinkling stars in the upper sky region
      const STAR_COUNT = 110;
      const stars = Array.from({ length: STAR_COUNT }, () => ({
        x:      Math.random(),
        y:      Math.random() * 0.56,
        r:      Math.random() * 1.4 + 0.3,
        phase:  Math.random() * Math.PI * 2,
        speed:  Math.random() * 1.2 + 0.6
      }));

      // Occasional shooting stars
      const shoots = [];
      function spawnShoot() {
        shoots.push({
          x:   Math.random() * 0.8 + 0.1,
          y:   Math.random() * 0.35,
          len: Math.random() * 0.12 + 0.06,
          age: 0, life: Math.random() * 0.6 + 0.4
        });
      }
      let nextShoot = 2;

      function drawFrame(ts) {
        const t = ts / 1000;

        ctx.clearRect(0, 0, W, H);

        const horizon = H * 0.56;

        // ── Backgrounds ──────────────────────────────────────────────────
        // Sky
        const skyGrad = ctx.createLinearGradient(0, 0, 0, horizon);
        skyGrad.addColorStop(0, '#010008');
        skyGrad.addColorStop(1, '#0c0028');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, horizon);

        // Ground
        const groundGrad = ctx.createLinearGradient(0, horizon, 0, H);
        groundGrad.addColorStop(0, '#07001a');
        groundGrad.addColorStop(1, '#020008');
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, horizon, W, H - horizon);

        // ── Horizon ambient glow ─────────────────────────────────────────
        const hGlow = ctx.createRadialGradient(W / 2, horizon, 0, W / 2, horizon, W * 0.65);
        hGlow.addColorStop(0,   'rgba(233,69,96,0.45)');
        hGlow.addColorStop(0.25,'rgba(168,80,220,0.20)');
        hGlow.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = hGlow;
        ctx.fillRect(0, horizon - H * 0.45, W, H * 0.9);

        // ── Retro sun ────────────────────────────────────────────────────
        const sunCX = W / 2;
        const sunCY = horizon - 28;
        const sunR  = Math.min(W, H) * 0.09;

        // Outer glow
        const sunOuter = ctx.createRadialGradient(sunCX, sunCY, sunR * 0.4, sunCX, sunCY, sunR * 2.2);
        sunOuter.addColorStop(0, 'rgba(233,69,96,0.25)');
        sunOuter.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sunOuter;
        ctx.beginPath();
        ctx.arc(sunCX, sunCY, sunR * 2.2, 0, Math.PI * 2);
        ctx.fill();

        // Sun body gradient
        const sunBody = ctx.createLinearGradient(sunCX, sunCY - sunR, sunCX, sunCY + sunR);
        sunBody.addColorStop(0,   '#ffb3c6');
        sunBody.addColorStop(0.35,'#e94560');
        sunBody.addColorStop(1,   '#a020a0');
        ctx.fillStyle = sunBody;
        ctx.beginPath();
        ctx.arc(sunCX, sunCY, sunR, 0, Math.PI * 2);
        ctx.fill();

        // Horizontal stripe mask on lower half of sun (classic synthwave look)
        ctx.save();
        ctx.beginPath();
        ctx.arc(sunCX, sunCY, sunR - 1, 0, Math.PI * 2);
        ctx.clip();
        const stripes = 8;
        for (let i = 0; i < stripes; i++) {
          const bandH = (sunR / stripes) * 1.05;
          const bandY = sunCY + (i / stripes) * sunR;
          const darkness = 0.55 + (i / stripes) * 0.35;
          ctx.fillStyle = `rgba(5,0,18,${darkness})`;
          ctx.fillRect(sunCX - sunR, bandY, sunR * 2, bandH * 0.52);
        }
        ctx.restore();

        // ── Stars ────────────────────────────────────────────────────────
        ctx.save();
        stars.forEach(s => {
          const tw = Math.sin(t * s.speed + s.phase);
          const alpha = 0.35 + tw * 0.35;
          const r     = s.r * (0.82 + tw * 0.18);
          ctx.shadowBlur  = 4 + tw * 4;
          ctx.shadowColor = '#ffffff';
          ctx.fillStyle   = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(s.x * W, s.y * H, r, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();

        // ── Shooting stars ───────────────────────────────────────────────
        if (t > nextShoot) {
          spawnShoot();
          nextShoot = t + Math.random() * 4 + 3;
        }
        ctx.save();
        for (let i = shoots.length - 1; i >= 0; i--) {
          const sh = shoots[i];
          sh.age += 0.016;
          const frac = sh.age / sh.life;
          if (frac >= 1) { shoots.splice(i, 1); continue; }
          const alpha = frac < 0.3 ? frac / 0.3 : (1 - frac) / 0.7;
          ctx.strokeStyle = `rgba(255,220,240,${alpha * 0.9})`;
          ctx.lineWidth = 1.5;
          ctx.shadowBlur  = 6;
          ctx.shadowColor = '#ffaacc';
          ctx.beginPath();
          ctx.moveTo(sh.x * W, sh.y * H);
          ctx.lineTo((sh.x + sh.len * frac) * W, (sh.y + sh.len * 0.3 * frac) * H);
          ctx.stroke();
        }
        ctx.restore();

        // ── Perspective grid ─────────────────────────────────────────────
        const vpX  = W / 2;
        const scroll = (t * 0.38) % 1;

        ctx.save();

        // Vertical lines converging to vanishing point
        const numV = 22;
        for (let i = 0; i <= numV; i++) {
          const frac = i / numV;                        // 0..1
          const spread = 2.6;
          const bx   = vpX + (frac - 0.5) * spread * W; // bottom x
          const dist  = Math.abs(frac - 0.5);
          const alpha = Math.max(0, (0.5 - dist) * 1.6) * 0.75;
          if (alpha < 0.02) continue;
          ctx.strokeStyle = `rgba(233,69,96,${alpha})`;
          ctx.lineWidth   = 1;
          ctx.shadowBlur  = 8;
          ctx.shadowColor = '#e94560';
          ctx.beginPath();
          ctx.moveTo(vpX, horizon);
          ctx.lineTo(bx, H + 10);
          ctx.stroke();
        }

        // Horizontal lines scrolling toward viewer
        const numH = 28;
        for (let i = 0; i < numH; i++) {
          // Depth in [0,1]: 0 = far/horizon, 1 = near/bottom
          const depth = (i / numH + scroll) % 1.0;
          const screenY = horizon + (H + 20 - horizon) * depth * depth;
          if (screenY < horizon || screenY > H + 5) continue;
          const alpha = depth * 0.72 + 0.06;
          ctx.strokeStyle = `rgba(168,218,220,${alpha})`;
          ctx.lineWidth   = depth > 0.6 ? 1.4 : 1;
          ctx.shadowBlur  = 4 + depth * 6;
          ctx.shadowColor = '#a8dadc';
          ctx.beginPath();
          ctx.moveTo(0, screenY);
          ctx.lineTo(W, screenY);
          ctx.stroke();
        }

        ctx.restore();

        requestAnimationFrame(drawFrame);
      }

      requestAnimationFrame(drawFrame);
    })();

    // ── Game logic ─────────────────────────────────────────────────────────
    const WINNING_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;
    let vsComputer = false;
    let scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const modeBtnEl = document.getElementById('mode-btn');
    const xWinsEl = document.getElementById('x-wins');
    const oWinsEl = document.getElementById('o-wins');
    const drawsEl = document.getElementById('draws');

    cells.forEach(cell => cell.addEventListener('click', onCellClick));
    document.getElementById('restart-btn').addEventListener('click', restart);
    modeBtnEl.addEventListener('click', toggleMode);

    function onCellClick(e) {
      const idx = +e.target.dataset.index;
      if (gameOver || board[idx]) return;
      makeMove(idx, currentPlayer);
      if (!gameOver && vsComputer && currentPlayer === 'O') {
        setTimeout(cpuMove, 300);
      }
    }

    function makeMove(idx, player) {
      board[idx] = player;
      const cell = cells[idx];
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase());

      const winLine = getWinner();
      if (winLine) {
        winLine.forEach(i => cells[i].classList.add('win'));
        statusEl.textContent = `Player ${player} wins!`;
        scores[player]++;
        updateScores();
        gameOver = true;
        return;
      }
      if (board.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        scores.draw++;
        updateScores();
        gameOver = true;
        return;
      }
      currentPlayer = player === 'X' ? 'O' : 'X';
      statusEl.textContent = vsComputer && currentPlayer === 'O'
        ? 'CPU is thinking...'
        : `Player ${currentPlayer}'s turn`;
    }

    function getWinner() {
      for (const line of WINNING_LINES) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
      }
      return null;
    }

    // Minimax AI for unbeatable CPU
    function cpuMove() {
      if (gameOver) return;
      const idx = bestMove();
      makeMove(idx, 'O');
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > best) { best = score; move = i; }
        }
      }
      return move;
    }

    function minimax(b, depth, isMax) {
      const win = minimaxWinner(b);
      if (win === 'O') return 10 - depth;
      if (win === 'X') return depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=null; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=null; }
        }
        return best;
      }
    }

    function minimaxWinner(b) {
      for (const [a,c,d] of WINNING_LINES) {
        if (b[a] && b[a]===b[c] && b[a]===b[d]) return b[a];
      }
      return null;
    }

    function restart() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
      statusEl.textContent = `Player X's turn`;
    }

    function toggleMode() {
      vsComputer = !vsComputer;
      modeBtnEl.textContent = vsComputer ? 'vs Human' : 'vs CPU';
      modeBtnEl.style.color = vsComputer ? '#e94560' : '#a8dadc';
      modeBtnEl.style.borderColor = vsComputer ? '#e94560' : '#a8dadc';
      restart();
    }

    function updateScores() {
      xWinsEl.textContent = scores.X;
      oWinsEl.textContent = scores.O;
      drawsEl.textContent = scores.draw;
    }
  </script>
</body>
</html>
