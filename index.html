<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 24px;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 6px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    #restart-btn {
      background: #e94560;
      color: #fff;
    }

    #mode-btn {
      background: #0f3460;
      color: #a8dadc;
      border: 2px solid #a8dadc;
    }

    #score {
      display: flex;
      gap: 32px;
      margin-top: 24px;
      font-size: 1rem;
    }

    .score-item {
      text-align: center;
    }

    .score-item span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-item.x-score span { color: #e94560; }
    .score-item.o-score span { color: #a8dadc; }
    .score-item.draw-score span { color: #888; }
  </style>
</head>
<body>

  <h1>TIC TAC TOE</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div id="controls">
    <button id="mode-btn">vs CPU</button>
    <button id="restart-btn">Restart</button>
  </div>

  <div id="score">
    <div class="score-item x-score">X <span id="x-wins">0</span></div>
    <div class="score-item draw-score">Draws <span id="draws">0</span></div>
    <div class="score-item o-score">O <span id="o-wins">0</span></div>
  </div>

  <script>
    const WINNING_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;
    let vsComputer = false;
    let scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const modeBtnEl = document.getElementById('mode-btn');
    const xWinsEl = document.getElementById('x-wins');
    const oWinsEl = document.getElementById('o-wins');
    const drawsEl = document.getElementById('draws');

    cells.forEach(cell => cell.addEventListener('click', onCellClick));
    document.getElementById('restart-btn').addEventListener('click', restart);
    modeBtnEl.addEventListener('click', toggleMode);

    function onCellClick(e) {
      const idx = +e.target.dataset.index;
      if (gameOver || board[idx]) return;
      makeMove(idx, currentPlayer);
      if (!gameOver && vsComputer && currentPlayer === 'O') {
        setTimeout(cpuMove, 300);
      }
    }

    function makeMove(idx, player) {
      board[idx] = player;
      const cell = cells[idx];
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase());

      const winLine = getWinner();
      if (winLine) {
        winLine.forEach(i => cells[i].classList.add('win'));
        statusEl.textContent = `Player ${player} wins!`;
        scores[player]++;
        updateScores();
        gameOver = true;
        return;
      }
      if (board.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        scores.draw++;
        updateScores();
        gameOver = true;
        return;
      }
      currentPlayer = player === 'X' ? 'O' : 'X';
      statusEl.textContent = vsComputer && currentPlayer === 'O'
        ? 'CPU is thinking...'
        : `Player ${currentPlayer}'s turn`;
    }

    function getWinner() {
      for (const line of WINNING_LINES) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
      }
      return null;
    }

    // Minimax AI for unbeatable CPU
    function cpuMove() {
      if (gameOver) return;
      const idx = bestMove();
      makeMove(idx, 'O');
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > best) { best = score; move = i; }
        }
      }
      return move;
    }

    function minimax(b, depth, isMax) {
      const win = minimaxWinner(b);
      if (win === 'O') return 10 - depth;
      if (win === 'X') return depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=null; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=null; }
        }
        return best;
      }
    }

    function minimaxWinner(b) {
      for (const [a,c,d] of WINNING_LINES) {
        if (b[a] && b[a]===b[c] && b[a]===b[d]) return b[a];
      }
      return null;
    }

    function restart() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
      statusEl.textContent = `Player X's turn`;
    }

    function toggleMode() {
      vsComputer = !vsComputer;
      modeBtnEl.textContent = vsComputer ? 'vs Human' : 'vs CPU';
      modeBtnEl.style.color = vsComputer ? '#e94560' : '#a8dadc';
      modeBtnEl.style.borderColor = vsComputer ? '#e94560' : '#a8dadc';
      restart();
    }

    function updateScores() {
      xWinsEl.textContent = scores.X;
      oWinsEl.textContent = scores.O;
      drawsEl.textContent = scores.draw;
    }
  </script>
</body>
</html>
