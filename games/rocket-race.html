<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rocket Race</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      touch-action: none; user-select: none; -webkit-user-select: none;
      overscroll-behavior: none;
    }
    canvas { display: block; }
    #home-btn {
      position: fixed; top: 12px; left: 12px; z-index: 300;
      color: #2B2140; text-decoration: none; font-size: 0.88rem; font-weight: 700;
      background: rgba(255,246,228,0.92); border: 2px solid #2B2140;
      padding: 6px 14px; border-radius: 20px; letter-spacing: 1px;
    }
    #start-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: radial-gradient(ellipse at center, #1a0040 0%, #000010 100%);
    }
    #start-overlay h1 {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(2rem, 9vw, 4rem); font-weight: 900;
      color: #fff; letter-spacing: 4px; text-align: center;
      text-shadow: 0 0 30px #ff9a00, 0 0 60px rgba(255,154,0,0.4);
    }
    #start-overlay p {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(1rem, 4vw, 1.5rem); color: #ccc; text-align: center;
    }
    #start-btn {
      padding: 18px 50px; font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 900; font-family: 'Segoe UI', sans-serif;
      color: #fff; background: linear-gradient(135deg, #ff9a00, #ff5500);
      border: none; border-radius: 50px; cursor: pointer; letter-spacing: 3px;
      box-shadow: 0 0 30px rgba(255,100,0,0.6);
      transition: transform 0.1s;
    }
    #start-btn:active { transform: scale(0.95); }
    #hi-disp {
      font-family: 'Segoe UI', sans-serif;
      font-size: 1rem; color: rgba(255,255,255,0.5); letter-spacing: 2px;
    }
    #gameover-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: rgba(0,0,16,0.82);
    }
    #gameover-overlay h1 {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(2rem, 9vw, 4rem); font-weight: 900;
      color: #ff4444; letter-spacing: 4px; text-align: center;
      text-shadow: 0 0 30px rgba(255,68,68,0.7);
    }
    .go-stat {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(1rem, 4vw, 1.6rem); color: #fff; text-align: center;
    }
    .go-stat span { color: #FFD53E; font-weight: 900; }
    #play-again-btn {
      padding: 18px 50px; font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 900; font-family: 'Segoe UI', sans-serif;
      color: #fff; background: linear-gradient(135deg, #ff9a00, #ff5500);
      border: none; border-radius: 50px; cursor: pointer; letter-spacing: 3px;
      box-shadow: 0 0 30px rgba(255,100,0,0.6); margin-top: 8px;
      transition: transform 0.1s;
    }
    #play-again-btn:active { transform: scale(0.95); }
  </style>
  <script>
    document.addEventListener('touchmove', e => { if(e.touches.length>1) e.preventDefault(); }, {passive:false});
    document.addEventListener('gesturestart', e => e.preventDefault(), false);
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <a href="../index.html" id="home-btn">&#8592; Home</a>
  <div id="start-overlay">
    <h1>🚀 ROCKET RACE</h1>
    <p>Collect stars and gems!</p>
    <button id="start-btn">🚀 LAUNCH!</button>
    <div id="hi-disp"></div>
  </div>
  <div id="gameover-overlay">
    <h1>💥 GAME OVER</h1>
    <p class="go-stat">Score: <span id="go-score-val">0</span></p>
    <p class="go-stat">Best: <span id="go-best-val">0</span></p>
    <button id="play-again-btn">🚀 PLAY AGAIN</button>
  </div>
  <script>
  (function () {
    // ── Canvas & state ──────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const startOverlay   = document.getElementById('start-overlay');
    const startBtn       = document.getElementById('start-btn');
    const hiDisp         = document.getElementById('hi-disp');
    const gameoverOverlay= document.getElementById('gameover-overlay');
    const goScoreVal     = document.getElementById('go-score-val');
    const goBestVal      = document.getElementById('go-best-val');
    const playAgainBtn   = document.getElementById('play-again-btn');

    let W, H;
    let state = 'start'; // 'start' | 'playing' | 'gameover'
    let score = 0, hiScore = +localStorage.getItem('rocketHi') || 0;
    let lives = 5;
    let frame = 0, lastMilestone = 0;
    let spawnTimer = 0, spawnInterval = 80;

    // Rocket
    let rocketX, rocketY, targetX;
    let rocketSpin = 0, rocketSpinV = 0;
    let trailParticles = [];

    // Items & effects
    let items = [], floats = [], confetti = [];

    // Enemies
    let enemies = [], enemySpawnTimer = 0, enemySpawnInterval = 180;
    let lasers = [];

    // Power-ups
    let magnetActive = false, magnetTimer = 0;
    let rainbowActive = false, rainbowTimer = 0;

    // Party
    let partyActive = false, partyTimer = 0, partyColorIdx = 0;
    const PARTY_COLS = ['#ff3333','#ff9900','#ffee00','#33cc44','#3399ff','#cc33ff'];

    // Static background stars
    const BG_STARS = Array.from({length:80}, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random()*2+0.5, a: Math.random()*0.6+0.4
    }));

    // ── Resize ───────────────────────────────────────────────────────────────
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      rocketX = W/2; rocketY = H*0.82;
      if (!targetX) targetX = rocketX;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Input ────────────────────────────────────────────────────────────────
    function handleMove(x) {
      if (state !== 'playing') return;
      targetX = Math.max(30, Math.min(W-30, x));
    }
    canvas.addEventListener('mousemove', e => handleMove(e.clientX));
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); handleMove(e.touches[0].clientX); }, {passive:false});
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleMove(e.touches[0].clientX); }, {passive:false});

    // ── Audio ────────────────────────────────────────────────────────────────
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playSound(type) {
      if (!audioCtx) return;
      const ac = audioCtx, t = ac.currentTime;
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      if (type==='star') {
        o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1320,t+0.12);
        g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
        o.start(t); o.stop(t+0.18);
      } else if (type==='gem') {
        o.type='sine';
        [660,880,1100].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*0.06));
        g.gain.setValueAtTime(0.28,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        o.start(t); o.stop(t+0.35);
      } else if (type==='cloud') {
        o.type='square'; o.frequency.setValueAtTime(180,t);
        o.frequency.setValueAtTime(120,t+0.08); o.frequency.setValueAtTime(200,t+0.16);
        g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o.start(t); o.stop(t+0.3);
      } else if (type==='whoosh') {
        o.type='sawtooth'; o.frequency.setValueAtTime(500,t);
        o.frequency.exponentialRampToValueAtTime(80,t+0.4);
        g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o.start(t); o.stop(t+0.4);
      } else if (type==='party') {
        [523,659,784,1047].forEach((f,i) => {
          const o2=ac.createOscillator(), g2=ac.createGain();
          o2.connect(g2); g2.connect(ac.destination);
          o2.frequency.setValueAtTime(f,t+i*0.08);
          g2.gain.setValueAtTime(0.18,t+i*0.08);
          g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.25);
          o2.start(t+i*0.08); o2.stop(t+i*0.08+0.25);
        });
        return;
      }
    }
    // ── Background ───────────────────────────────────────────────────────────
    function drawBackground() {
      if (partyActive) {
        const c1=PARTY_COLS[partyColorIdx%PARTY_COLS.length];
        const c2=PARTY_COLS[(partyColorIdx+3)%PARTY_COLS.length];
        const gr=ctx.createLinearGradient(0,0,0,H);
        gr.addColorStop(0,c1+'66'); gr.addColorStop(1,c2+'33');
        ctx.fillStyle=gr;
      } else {
        const gr=ctx.createLinearGradient(0,0,0,H);
        gr.addColorStop(0,'#050014'); gr.addColorStop(0.55,'#0a0030'); gr.addColorStop(1,'#000818');
        ctx.fillStyle=gr;
      }
      ctx.fillRect(0,0,W,H);
      BG_STARS.forEach(s => {
        ctx.globalAlpha = s.a*(0.5+0.5*Math.sin(frame*0.025+s.x*100));
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
    }

    // ── Rocket ───────────────────────────────────────────────────────────────
    function drawRocket(x, y, spin) {
      ctx.save();
      ctx.translate(x, y); ctx.rotate(spin);
      const rw=Math.min(W*0.08,48), rh=rw*1.8;

      // Flame
      if (!rainbowActive) {
        const fh=rh*0.5*(0.8+0.2*Math.sin(frame*0.3));
        const fg=ctx.createLinearGradient(0,rh*0.5,0,rh*0.5+fh);
        fg.addColorStop(0,'#ffee44'); fg.addColorStop(0.5,'#ff7700'); fg.addColorStop(1,'rgba(255,50,0,0)');
        ctx.fillStyle=fg;
        ctx.beginPath();
        ctx.moveTo(-rw*0.25,rh*0.5);
        ctx.quadraticCurveTo(0,rh*0.5+fh*1.1,rw*0.25,rh*0.5);
        ctx.fill();
      }
      // Wings
      ctx.fillStyle='#FF9A4D'; ctx.strokeStyle='#2B2140'; ctx.lineWidth=2;
      [[-1],[1]].forEach(([d])=>{
        ctx.beginPath();
        ctx.moveTo(d*rw*0.5, rh*0.1);
        ctx.lineTo(d*rw*0.9, rh*0.5);
        ctx.lineTo(d*rw*0.5, rh*0.4);
        ctx.closePath(); ctx.fill(); ctx.stroke();
      });
      // Body
      const bg2=ctx.createLinearGradient(-rw*0.5,0,rw*0.5,0);
      bg2.addColorStop(0,'#d8e4ff'); bg2.addColorStop(0.5,'#ffffff'); bg2.addColorStop(1,'#b8cce0');
      ctx.fillStyle=bg2; ctx.strokeStyle='#2B2140'; ctx.lineWidth=2.5;
      ctx.beginPath();
      ctx.roundRect(-rw*0.5,-rh*0.3,rw,rh*0.8,[rw*0.5,rw*0.5,rw*0.2,rw*0.2]);
      ctx.fill(); ctx.stroke();
      // Window
      ctx.fillStyle='#5BB8FF'; ctx.strokeStyle='#2B2140'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,-rh*0.05,rw*0.28,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.arc(-rw*0.08,-rh*0.1,rw*0.1,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // ── Trail ────────────────────────────────────────────────────────────────
    const RAINBOW=['#ff3333','#ff9900','#ffee00','#33cc33','#3399ff','#cc33ff'];
    function addTrail() {
      const rw=Math.min(W*0.08,48), rh=rw*1.8;
      if (rainbowActive) {
        for(let i=0;i<5;i++) trailParticles.push({
          x:rocketX+(Math.random()-0.5)*rw*0.5, y:rocketY+rh*0.5,
          vx:(Math.random()-0.5)*3, vy:Math.random()*4+2,
          r:Math.random()*9+4, color:RAINBOW[i%6], life:1, decay:0.025
        });
      } else {
        trailParticles.push({
          x:rocketX+(Math.random()-0.5)*rw*0.3, y:rocketY+rh*0.5,
          vx:(Math.random()-0.5)*0.8, vy:Math.random()*1.5+0.5,
          r:Math.random()*4+2, color:Math.random()>0.5?'#ffaa00':'#ff5500', life:1, decay:0.06
        });
      }
    }
    function updateTrail() {
      if (state==='playing') addTrail();
      trailParticles=trailParticles.filter(p=>{ p.x+=p.vx;p.y+=p.vy;p.life-=p.decay; return p.life>0; });
    }
    function drawTrail() {
      trailParticles.forEach(p=>{
        ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
    }
    // ── Item drawing helpers ────────────────────────────────────────────────
    function drawStar5(tCtx, cx, cy, outerR, innerR, color) {
      tCtx.fillStyle = color; tCtx.strokeStyle = '#2B2140'; tCtx.lineWidth = 2;
      tCtx.beginPath();
      for (let i = 0; i < 10; i++) {
        const r = i%2===0 ? outerR : innerR;
        const a = (i/10)*Math.PI*2 - Math.PI/2;
        i===0 ? tCtx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r)
               : tCtx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      }
      tCtx.closePath(); tCtx.fill(); tCtx.stroke();
    }
    function drawGem(tCtx, cx, cy, r) {
      tCtx.fillStyle='#ff55cc'; tCtx.strokeStyle='#2B2140'; tCtx.lineWidth=2;
      tCtx.beginPath();
      tCtx.moveTo(cx, cy-r);
      tCtx.lineTo(cx+r*0.7, cy-r*0.2); tCtx.lineTo(cx+r*0.7, cy+r*0.3);
      tCtx.lineTo(cx, cy+r);
      tCtx.lineTo(cx-r*0.7, cy+r*0.3); tCtx.lineTo(cx-r*0.7, cy-r*0.2);
      tCtx.closePath(); tCtx.fill(); tCtx.stroke();
      tCtx.fillStyle='rgba(255,255,255,0.5)';
      tCtx.beginPath();
      tCtx.moveTo(cx-r*0.1, cy-r*0.75); tCtx.lineTo(cx+r*0.38, cy-r*0.05); tCtx.lineTo(cx-r*0.1, cy-r*0.05);
      tCtx.closePath(); tCtx.fill();
    }
    function drawAsteroid(tCtx, cx, cy, r) {
      const pts = 9;
      tCtx.fillStyle='#887766'; tCtx.strokeStyle='#2B2140'; tCtx.lineWidth=2;
      tCtx.beginPath();
      for (let i=0;i<pts;i++) {
        const a=(i/pts)*Math.PI*2;
        const jitter = r*(0.75+0.25*Math.sin(i*3.7+cx));
        const px2=cx+Math.cos(a)*jitter, py2=cy+Math.sin(a)*jitter;
        i===0 ? tCtx.moveTo(px2,py2) : tCtx.lineTo(px2,py2);
      }
      tCtx.closePath(); tCtx.fill(); tCtx.stroke();
      tCtx.fillStyle='rgba(0,0,0,0.18)';
      tCtx.beginPath(); tCtx.arc(cx-r*0.18, cy-r*0.15, r*0.22, 0, Math.PI*2); tCtx.fill();
      tCtx.beginPath(); tCtx.arc(cx+r*0.25, cy+r*0.2,  r*0.14, 0, Math.PI*2); tCtx.fill();
    }

    // ── Enemy ship (flying saucer) ───────────────────────────────────────────
    function drawEnemy(x, y, w, h) {
      ctx.save(); ctx.translate(x, y);
      const rx = w * 0.5, ry = h * 0.22; // disc radii

      // Glow underneath
      const glow = ctx.createRadialGradient(0, ry*0.6, 0, 0, ry*0.6, rx*0.9);
      glow.addColorStop(0,'rgba(0,255,120,0.35)'); glow.addColorStop(1,'rgba(0,255,120,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.ellipse(0, ry*0.7, rx*0.9, ry*0.7, 0, 0, Math.PI*2); ctx.fill();

      // Bottom disc shadow
      ctx.fillStyle='#1a4a1a'; ctx.strokeStyle='#2B2140'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(0, ry*0.3, rx, ry*0.55, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

      // Main disc body
      const discGrad = ctx.createLinearGradient(0,-ry,0,ry);
      discGrad.addColorStop(0,'#b0e8b0'); discGrad.addColorStop(0.4,'#78d878'); discGrad.addColorStop(1,'#3a9a3a');
      ctx.fillStyle = discGrad; ctx.strokeStyle='#2B2140'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

      // Rim lights
      const rimColors = ['#ff4444','#ffcc00','#44ccff','#ff44ff','#44ff88'];
      for (let i = 0; i < 7; i++) {
        const a = (i / 7) * Math.PI * 2;
        const lx = Math.cos(a) * rx * 0.75, ly = Math.sin(a) * ry * 0.7;
        ctx.fillStyle = rimColors[i % rimColors.length];
        ctx.beginPath(); ctx.arc(lx, ly, w*0.045, 0, Math.PI*2); ctx.fill();
      }

      // Glass dome
      const domeRx = rx*0.42, domeRy = h*0.3;
      const domeGrad = ctx.createLinearGradient(0,-h*0.5,0,-ry);
      domeGrad.addColorStop(0,'rgba(180,255,220,0.9)'); domeGrad.addColorStop(1,'rgba(80,200,140,0.5)');
      ctx.fillStyle = domeGrad; ctx.strokeStyle='#2B2140'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(0, -ry*0.1, domeRx, domeRy, 0, Math.PI, 0); ctx.fill(); ctx.stroke();

      // Alien face in dome
      ctx.fillStyle='#55dd55';
      ctx.beginPath(); ctx.ellipse(0, -ry*0.55, domeRx*0.52, domeRy*0.55, 0, 0, Math.PI*2); ctx.fill();
      // Eyes
      [[-1],[1]].forEach(([d])=>{
        ctx.fillStyle='#111';
        ctx.beginPath(); ctx.ellipse(d*domeRx*0.25, -ry*0.62, domeRx*0.14, domeRy*0.2, d*0.3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.6)';
        ctx.beginPath(); ctx.arc(d*domeRx*0.2, -ry*0.67, domeRx*0.05, 0, Math.PI*2); ctx.fill();
      });

      // Dome shine
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.ellipse(-domeRx*0.25, -ry*0.85, domeRx*0.22, domeRy*0.18, -0.4, 0, Math.PI*2); ctx.fill();

      ctx.restore();
    }

    function spawnEnemy() {
      const w=Math.min(W*0.13,58), h=w*0.75;
      const x=Math.random()*(W-80)+40;
      enemies.push({
        x, y:-h, w, h,
        vy:0.8+Math.random()*0.6,
        vx:(Math.random()-0.5)*2.5,
        shootTimer: Math.floor(Math.random()*120)+60
      });
    }

    function updateEnemies() {
      if (score < 25) return;
      if (++enemySpawnTimer >= enemySpawnInterval) {
        enemySpawnTimer=0;
        enemySpawnInterval = Math.max(80, 180 - Math.floor((score-25)/5)*8);
        spawnEnemy();
      }
      const speedMult = (magnetActive||rainbowActive) ? 2 : 1;
      enemies = enemies.filter(e => {
        e.y += e.vy * speedMult;
        e.x += e.vx;
        if (e.x < e.w*0.5)   { e.x=e.w*0.5;   e.vx=Math.abs(e.vx); }
        if (e.x > W-e.w*0.5) { e.x=W-e.w*0.5; e.vx=-Math.abs(e.vx); }
        // Shoot laser at 50+ points
        if (score >= 50 && e.y > 0) {
          e.shootTimer -= speedMult;
          if (e.shootTimer <= 0) {
            e.shootTimer = Math.floor(Math.random()*80)+60;
            lasers.push({ x:e.x, y:e.y+e.h*0.7, vy:5+Math.random()*2, life:1 });
            playSound('whoosh');
          }
        }
        return e.y < H+e.h;
      });
      // Move lasers
      lasers = lasers.filter(l => { l.y+=l.vy; return l.y < H+20; });
    }

    function drawEnemies() {
      // Draw lasers
      lasers.forEach(l => {
        ctx.save();
        ctx.shadowColor='#ff0000'; ctx.shadowBlur=10;
        const grad=ctx.createLinearGradient(l.x,l.y-16,l.x,l.y+4);
        grad.addColorStop(0,'rgba(255,0,80,0)');
        grad.addColorStop(0.4,'#ff2244');
        grad.addColorStop(1,'#ffaacc');
        ctx.fillStyle=grad;
        ctx.beginPath(); ctx.roundRect(l.x-3,l.y-16,6,20,3); ctx.fill();
        ctx.restore();
      });
      enemies.forEach(e => drawEnemy(e.x, e.y, e.w, e.h));
    }

    function checkEnemyCollisions() {
      const rw=Math.min(W*0.08,48), rh=rw*1.8;
      const noseY=rocketY-rh*0.3; // front tip of rocket
      enemies.forEach(e => {
        const dx=rocketX-e.x, dy=noseY-e.y;
        if (Math.abs(dx)<e.w*0.5+rw*0.35 && Math.abs(dy)<e.h*0.5+rw*0.08) {
          lives--;
          playSound('cloud');
          addFloat(e.x, e.y-22, lives>0?'💥 -1 ❤️':'💀 GAME OVER','#ff4444');
          rocketSpinV += (Math.random()>0.5?1:-1)*0.3;
          spawnConfetti(e.x, e.y, 10);
          e.y = H+100;
          if (lives<=0) { state='gameover'; showGameOver(); }
        }
      });
      // Laser hits nose
      lasers = lasers.filter(l => {
        const dx=rocketX-l.x, dy=noseY-l.y;
        if (Math.sqrt(dx*dx+dy*dy) < rw*0.48) {
          lives--;
          playSound('cloud');
          addFloat(l.x, l.y-22, lives>0?'🔴 -1 ❤️':'💀 GAME OVER','#ff4444');
          rocketSpinV += (Math.random()>0.5?1:-1)*0.25;
          spawnConfetti(l.x, l.y, 6);
          if (lives<=0) { state='gameover'; showGameOver(); }
          return false;
        }
        return true;
      });
    }

    // ── Item spawn/update/draw ──────────────────────────────────────────────
    function spawnItem() {
      const x = Math.random()*(W-80)+40;
      const roll = Math.random();
      let type, r;
      if      (roll < 0.025) { type='magnet';  r=15; }
      else if (roll < 0.05)  { type='rainbow'; r=15; }
      else if (roll < 0.22)  { type='asteroid'; r=26; }
      else if (roll < 0.44)  { type='gem';     r=13; }
      else                   { type='star';    r=12; }
      items.push({ x, y:-40, type, r, vy:1.8+Math.random()*1.6, pulse:Math.random()*Math.PI*2 });
    }

    function drawItems() {
      items.forEach(it => {
        it.pulse += 0.08;
        const sc = 1 + 0.07*Math.sin(it.pulse);
        ctx.save(); ctx.translate(it.x, it.y); ctx.scale(sc, sc);
        if (it.type==='star') {
          drawStar5(ctx, 0, 0, it.r, it.r*0.44, rainbowActive ? RAINBOW[Math.floor(frame/4)%6] : '#FFD53E');
        } else if (it.type==='gem') {
          drawGem(ctx, 0, 0, it.r);
        } else if (it.type==='asteroid') {
          drawAsteroid(ctx, 0, 0, it.r);
        } else {
          ctx.beginPath(); ctx.arc(0,0,it.r,0,Math.PI*2);
          ctx.fillStyle = it.type==='magnet' ? '#ff3366' : '#aa33ff';
          ctx.strokeStyle='#2B2140'; ctx.lineWidth=2;
          ctx.fill(); ctx.stroke();
          ctx.font=`bold ${Math.round(it.r*1.25)}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(it.type==='magnet'?'🧲':'🌈', 0, 1);
        }
        ctx.restore();
      });
    }

    // ── Floating score text & confetti ──────────────────────────────────────
    function addFloat(x, y, text, color) {
      floats.push({ x, y, text, color: color||'#FFD53E', life:1, vy:-1.6 });
    }
    function spawnConfetti(x, y, n) {
      for (let i=0;i<n;i++) confetti.push({
        x, y,
        vx:(Math.random()-0.5)*7, vy:-(Math.random()*5+1.5),
        r:Math.random()*5+2,
        color:PARTY_COLS[Math.floor(Math.random()*PARTY_COLS.length)],
        life:1, decay:0.018+Math.random()*0.018,
        rot:Math.random()*Math.PI, rotV:(Math.random()-0.5)*0.18
      });
    }

    // ── Collision & scoring ─────────────────────────────────────────────────
    function checkCollisions() {
      const rw = Math.min(W*0.08,48), rh=rw*1.8;
      const noseY = rocketY-rh*0.3; // front tip of rocket
      const bodyHitR = rw*0.6;      // generous collect radius for stars/gems
      const hazardHitR = rw*0.42;   // tight radius at nose for hazards
      items = items.filter(it => {
        if (magnetActive && it.type!=='asteroid') {
          const dx=rocketX-it.x, dy=rocketY-it.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if (d < W*0.42 && d > 1) { it.x+=dx/d*5; it.y+=dy/d*5; }
        }
        // hazards collide at nose; collectibles collide with body center
        const isHazard = it.type==='asteroid';
        const cx=rocketX, cy=isHazard ? noseY : rocketY;
        const hitR=isHazard ? hazardHitR : bodyHitR;
        const dx=cx-it.x, dy=cy-it.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if (dist < hitR+it.r) {
          if (it.type==='star') {
            const pts=rainbowActive?2:1; score+=pts; playSound('star');
            addFloat(it.x, it.y-22, rainbowActive?'+2 ✨':'+1', '#FFD53E');
            spawnConfetti(it.x, it.y, 6);
          } else if (it.type==='gem') {
            const pts=rainbowActive?6:3; score+=pts; playSound('gem');
            addFloat(it.x, it.y-22, rainbowActive?'+6 💎💎':'+3 💎', '#ff55cc');
            spawnConfetti(it.x, it.y, 14);
          } else if (it.type==='asteroid') {
            lives--; playSound('cloud');
            addFloat(it.x, it.y-22, lives>0?'💥 -1 ❤️':'💀 GAME OVER', '#ff4444');
            rocketSpinV += (Math.random()>0.5?1:-1)*0.28;
            spawnConfetti(it.x, it.y, 8);
            if (lives<=0) { state='gameover'; showGameOver(); }
          } else if (it.type==='magnet') {
            magnetActive=true; magnetTimer=320; playSound('whoosh');
            addFloat(it.x, it.y-22, '🧲 MAGNET!', '#ff3366');
          } else if (it.type==='rainbow') {
            rainbowActive=true; rainbowTimer=320; playSound('party');
            addFloat(it.x, it.y-22, '🌈 RAINBOW!', '#aa33ff');
          }
          return false;
        }
        return it.y < H+60;
      });
    }

    // ── HUD ─────────────────────────────────────────────────────────────────
    function drawHUD() {
      ctx.save();
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.font=`900 ${Math.round(Math.min(H*0.065,46))}px 'Segoe UI',sans-serif`;
      ctx.fillStyle = partyActive ? PARTY_COLS[partyColorIdx%PARTY_COLS.length] : '#ffffff';
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=4;
      ctx.strokeText(score, W/2, 14); ctx.fillText(score, W/2, 14);

      // Hearts
      ctx.font='22px sans-serif'; ctx.textAlign='left'; ctx.globalAlpha=1;
      for(let i=0;i<5;i++) {
        ctx.globalAlpha = i<lives ? 1 : 0.2;
        ctx.fillText('❤️', W-14-26*(4-i), 10);
      }
      ctx.globalAlpha=1;

      // Power-up bars
      let px=W-14;
      if (magnetActive) {
        ctx.font='22px sans-serif'; ctx.textAlign='right';
        ctx.globalAlpha=0.9; ctx.fillText('🧲',px,12);
        ctx.globalAlpha=0.55; ctx.fillStyle='#ff3366';
        ctx.fillRect(px-20,36, 20*(magnetTimer/320),5);
        ctx.globalAlpha=1; px-=32;
      }
      if (rainbowActive) {
        ctx.font='22px sans-serif'; ctx.textAlign='right';
        ctx.globalAlpha=0.9; ctx.fillText('🌈',px,12);
        ctx.globalAlpha=0.55; ctx.fillStyle='#aa33ff';
        ctx.fillRect(px-20,36, 20*(rainbowTimer/320),5);
        ctx.globalAlpha=1;
      }
      ctx.restore();

      // Float texts
      floats.forEach(f=>{
        ctx.save(); ctx.globalAlpha=f.life;
        ctx.font="bold 18px 'Segoe UI',sans-serif";
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.strokeStyle='#2B2140'; ctx.lineWidth=3.5;
        ctx.strokeText(f.text,f.x,f.y); ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y);
        ctx.restore();
      });

      // Confetti
      confetti.forEach(c=>{
        ctx.save(); ctx.globalAlpha=c.life; ctx.fillStyle=c.color;
        ctx.translate(c.x,c.y); ctx.rotate(c.rot);
        ctx.fillRect(-c.r,-c.r*0.5,c.r*2,c.r);
        ctx.restore();
      });
    }

    // ── Per-frame update ────────────────────────────────────────────────────
    function updateSystems() {
      // Rocket
      const dx=targetX-rocketX;
      rocketX += dx*0.1;
      rocketSpinV += dx*0.00028 - rocketSpin*0.08;
      rocketSpinV *= 0.84;
      rocketSpin  += rocketSpinV;

      // Spawn
      if (++spawnTimer >= spawnInterval) {
        spawnTimer=0;
        spawnItem();
        spawnInterval = Math.max(28, 80 - Math.floor(score/8));
      }
      const speedMult = (magnetActive || rainbowActive) ? 2 : 1;
      items.forEach(it=>{ it.y+=it.vy*speedMult; });

      // Power-up timers
      if (magnetActive  && --magnetTimer  <=0) magnetActive=false;
      if (rainbowActive && --rainbowTimer <=0) rainbowActive=false;

      // Party mode
      if (score>0 && score%10===0 && score!==lastMilestone) {
        lastMilestone=score; partyActive=true; partyTimer=130;
        playSound('party'); spawnConfetti(rocketX, rocketY, 35);
      }
      if (partyActive) { partyColorIdx=Math.floor(frame/5); if(--partyTimer<=0) partyActive=false; }

      // Particles
      confetti=confetti.filter(c=>{ c.x+=c.vx;c.y+=c.vy;c.vy+=0.13;c.rot+=c.rotV;c.life-=c.decay; return c.life>0; });
      floats  =floats.filter(f=>{ f.y+=f.vy;f.life-=0.022; return f.life>0; });

    }

    // ── Game Over ────────────────────────────────────────────────────────────
    function showGameOver() {
      if (score>hiScore) { hiScore=score; localStorage.setItem('rocketHi',hiScore); }
      goScoreVal.textContent = score;
      goBestVal.textContent  = hiScore;
      gameoverOverlay.style.display = 'flex';
    }

    // ── Main loop ───────────────────────────────────────────────────────────
    function loop() {
      requestAnimationFrame(loop);
      frame++;
      drawBackground();
      updateTrail();
      drawTrail();
      if (state==='playing') { updateSystems(); checkCollisions(); updateEnemies(); checkEnemyCollisions(); }
      drawItems();
      drawEnemies();
      drawRocket(rocketX, rocketY, rocketSpin);
      if (state==='playing' || state==='gameover') drawHUD();
    }

    function startGame() {
      initAudio();
      score=0; frame=0; lastMilestone=0; lives=5;
      items=[]; floats=[]; confetti=[]; trailParticles=[]; enemies=[]; lasers=[];
      magnetActive=false; rainbowActive=false; partyActive=false;
      spawnTimer=0; spawnInterval=80; enemySpawnTimer=0; enemySpawnInterval=180;
      rocketSpin=0; rocketSpinV=0;
      resize();
      startOverlay.style.display='none';
      state='playing';
    }

    startBtn.addEventListener('click', startGame);
    playAgainBtn.addEventListener('click', ()=>{
      gameoverOverlay.style.display = 'none';
      startGame();
    });

    hiDisp.textContent = hiScore>0 ? `🏆 BEST: ${hiScore}` : '';
    loop();
  })();
  </script>
</body>
