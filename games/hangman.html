<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hangman</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;}
body{background:#f5e8d0;font-family:'Segoe UI',sans-serif;overflow:hidden;user-select:none;color:#2B2140;}
.screen{display:none;width:100vw;height:100dvh;flex-direction:column;align-items:center;justify-content:center;background:#f5e8d0;}
.screen.active{display:flex;}
#home-btn{position:fixed;top:12px;left:12px;z-index:300;color:#2B2140;text-decoration:none;font-size:0.88rem;font-weight:700;background:rgba(255,246,228,0.92);border:2px solid #2B2140;padding:6px 14px;border-radius:20px;letter-spacing:1px;}
.big-btn{background:#7b5ea7;color:#fff;border:3px solid #2B2140;border-radius:18px;padding:14px 32px;font-size:1.2rem;font-weight:700;cursor:pointer;margin:8px;transition:transform .1s,background .1s;}
.big-btn:hover{transform:scale(1.05);background:#9b7ec7;}
.big-btn.green{background:#3a9a3a;} .big-btn.green:hover{background:#4dbb4d;}
.big-btn.red{background:#c0392b;} .big-btn.red:hover{background:#e74c3c;}
h1{color:#5a3200;font-size:2rem;margin-bottom:16px;}
h2{color:#5a3200;font-size:1.4rem;margin-bottom:12px;}
.tool-btn{width:38px;height:38px;background:rgba(0,0,0,0.08);border:2px solid rgba(0,0,0,0.2);border-radius:8px;color:#2B2140;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tool-btn:hover,.tool-btn.active{background:rgba(123,63,0,0.15);border-color:#7b3f00;}
.color-swatch{width:26px;height:26px;border-radius:50%;border:3px solid rgba(0,0,0,0.2);cursor:pointer;flex-shrink:0;}
.color-swatch.active{border-color:#7b3f00;transform:scale(1.2);}
#draw-parts-list .color-swatch{width:28px;height:28px;}
/* drawing screen layout */
#draw-main{flex:1;display:flex;min-height:0;width:100%;}
#draw-left{flex:1;display:flex;flex-direction:column;min-width:0;}
#draw-area{flex:1;position:relative;background:#f5e8d0;overflow:hidden;}
#draw-backdrop,#draw-canvas{position:absolute;inset:0;width:100%;height:100%;}
#draw-backdrop{pointer-events:none;}
#draw-canvas{cursor:crosshair;touch-action:none;background:transparent;}
#draw-parts-list{width:120px;background:#e8d5b5;overflow-y:auto;flex-shrink:0;padding:6px 4px;display:flex;flex-direction:column;gap:3px;border-left:2px solid #d4b896;}
.part-row{display:flex;align-items:center;gap:4px;padding:5px 4px;border-radius:8px;cursor:pointer;transition:background .12s;}
.part-row.current{background:rgba(123,63,0,0.12);border:1px solid #7b3f00;}
.part-row:not(.current){border:1px solid transparent;}
.part-arrow{color:#7b3f00;font-size:14px;width:14px;flex-shrink:0;visibility:hidden;}
.part-row.current .part-arrow{visibility:visible;}
.part-check{width:15px;height:15px;flex-shrink:0;accent-color:#3a9a3a;pointer-events:none;}
.part-name{font-size:11px;color:#6b5740;flex:1;line-height:1.2;}
.part-row.done .part-name{color:#3a7a2a;}
#draw-toolbar{display:flex;align-items:center;gap:6px;padding:8px 10px;padding-bottom:calc(env(safe-area-inset-bottom,8px) + 8px);background:#e8d5b5;border-top:2px solid #d4b896;flex-shrink:0;}
#draw-parts-list #color-swatches{border-top:1px solid rgba(0,0,0,0.12);}
</style>
</head>
<body>
<a href="../index.html" id="home-btn">&#8592; Home</a>

<!-- INTRO -->
<div id="screen-intro" class="screen active">
  <h1>🪢 Hangman</h1>
  <p style="color:#6b5740;margin-bottom:28px;font-size:1.1rem;">A drawing word-guessing game for 2 players</p>
  <button class="big-btn green" onclick="show('screen-choose')">▶ Start Game</button>
</div>

<!-- CHOOSE PERSON -->
<div id="screen-choose" class="screen" style="gap:12px;">
  <h1>👤 Your Hangman Person</h1>
  <p style="color:#6b5740;text-align:center;max-width:320px;margin-bottom:8px;">
    Draw your own person part by part, or use a default stick figure.
  </p>
  <button class="big-btn" id="btn-draw-person" onclick="startDrawing()">✏️ Draw My Person</button>
  <button class="big-btn green" onclick="useDefault()">🙂 Use Default</button>
</div>
<!-- DRAWING SCREEN -->
<div id="screen-draw" class="screen" style="flex-direction:column;padding:0;">
  <div id="draw-header" style="display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 12px;padding-right:calc(120px + 12px);background:#e8d5b5;border-bottom:2px solid #d4b896;flex-shrink:0;">
    <span id="draw-part-label" style="color:#5a3200;font-weight:700;font-size:1rem;"></span>
    <button class="big-btn green" id="btn-part-done" style="padding:8px 18px;font-size:0.95rem;margin:0;flex-shrink:0;">✔ Done</button>
  </div>
  <div id="draw-main">
    <div id="draw-left">
      <div id="draw-area">
        <canvas id="draw-backdrop"></canvas>
        <canvas id="draw-canvas"></canvas>
      </div>
      <div id="draw-toolbar">
        <button class="tool-btn" id="btn-thin"  title="Thin">─</button>
        <button class="tool-btn" id="btn-thick" title="Thick">━</button>
        <div style="width:1px;height:32px;background:#fff3;margin:0 6px;flex-shrink:0;"></div>
        <button class="tool-btn" id="btn-rainbow" title="Rainbow">🌈</button>
        <button class="tool-btn" id="btn-eraser"  title="Eraser">⬜</button>
        <button class="tool-btn" id="btn-clear"   title="Clear" style="color:#f55;">🗑</button>
      </div>
    </div>
    <div id="draw-parts-list">
      <div id="color-swatches" style="display:flex;flex-direction:column;gap:5px;align-items:center;padding-top:8px;border-top:1px solid #fff2;margin-top:4px;"></div>
    </div>
  </div>
</div>
<!-- WORD ENTRY -->
<div id="screen-word" class="screen" style="gap:16px;">
  <h1>🔤 Enter a Word</h1>
  <p style="color:#6b5740;text-align:center;max-width:300px;">Type a word for the other player to guess. Make sure they look away!</p>
  <input id="word-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
    style="font-size:1.6rem;padding:12px 20px;border-radius:14px;border:3px solid #7b5ea7;background:#fff;color:#2B2140;text-align:center;letter-spacing:4px;width:90%;max-width:360px;text-transform:uppercase;"
    placeholder="TYPE WORD HERE"/>
  <button class="big-btn green" id="btn-word-done">✔ Ready to Play!</button>
  <p id="word-err" style="color:#c0392b;font-size:0.9rem;display:none;">Please enter at least 2 letters.</p>
</div>
<!-- PLAY SCREEN -->
<div id="screen-play" class="screen" style="flex-direction:column;padding:8px;gap:8px;">
  <div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:480px;">
    <span id="play-wrong-label" style="color:#c0392b;font-weight:700;font-size:1rem;"></span>
    <span style="color:#6b5740;font-size:0.85rem;">Guess the word!</span>
  </div>
  <canvas id="gallows-canvas" style="border-radius:12px;border:2px solid #d4b896;max-width:480px;width:100%;"></canvas>
  <!-- word/keyboard section — overlay lives here so canvas stays visible -->
  <div style="position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:520px;">
    <div id="play-word-display" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;"></div>
    <div id="play-guessed" style="color:#6b5740;font-size:0.85rem;min-height:20px;"></div>
    <div id="play-keyboard" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:520px;width:100%;"></div>
    <!-- result overlay (only covers word+keyboard, not the canvas above) -->
    <div id="result-overlay" style="display:none;position:absolute;inset:0;background:rgba(245,232,208,0.96);flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:8px;padding:12px;">
      <div id="result-emoji" style="font-size:3.5rem;"></div>
      <h1 id="result-title" style="font-size:1.9rem;"></h1>
      <p id="result-word" style="color:#6b5740;font-size:1rem;"></p>
      <button class="big-btn green" id="btn-play-again">▶ Play Again</button>
      <button class="big-btn" id="btn-new-drawing">✏️ New Drawing + New Word</button>
      <button class="big-btn red" id="btn-main-menu" onclick="show('screen-intro')">🏠 Main Menu</button>
    </div>
  </div>
</div>

<script>
/* ── shared state ── */
const PARTS = ['Head','Torso','Left Arm','Right Arm','Left Hand','Right Hand','Left Leg','Right Leg','Left Foot','Right Foot'];
let partCanvases = {};   // partName → offscreen canvas (drawn art)
let currentPartIdx = 0;
let useDefaultPerson = false;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function useDefault(){
  useDefaultPerson = true;
  partCanvases = {};
  show('screen-word');
}

/* ══════════════════════════════════════
   DRAWING SCREEN
══════════════════════════════════════ */
const COLORS = ['#000000','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#ff69b4','#fff'];
let drawTool = { color: COLORS[0], size: 6, mode: 'draw' };
let rainbowHue = 0;
let isDrawing = false;
let lastX = 0, lastY = 0;

const drawCanvas   = document.getElementById('draw-canvas');
const drawCtx      = drawCanvas.getContext('2d');
const drawBackdrop = document.getElementById('draw-backdrop');
const bdCtx        = drawBackdrop.getContext('2d');

/* build color swatches */
const swatchRow = document.getElementById('color-swatches');
COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'color-swatch' + (c === COLORS[0] ? ' active' : '');
  s.style.background = c; if(c==='#fff') s.style.border='3px solid #888';
  s.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));
    s.classList.add('active');
    drawTool.color = c; drawTool.mode = 'draw';
    document.querySelectorAll('.tool-btn').forEach(x=>x.classList.remove('active'));
  });
  swatchRow.appendChild(s);
});

function setToolActive(id){ document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); }
document.getElementById('btn-thin').addEventListener('click',()=>{ drawTool.size=3; });
document.getElementById('btn-thick').addEventListener('click',()=>{ drawTool.size=14; });
document.getElementById('btn-rainbow').addEventListener('click',()=>{ drawTool.mode='rainbow'; setToolActive('btn-rainbow'); });
document.getElementById('btn-eraser').addEventListener('click',()=>{ drawTool.mode='erase'; setToolActive('btn-eraser'); });
document.getElementById('btn-clear').addEventListener('click',()=>{ drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height); });

function resizeDrawCanvas(){
  const area = document.getElementById('draw-area');
  const w = area.clientWidth, h = area.clientHeight;
  // preserve current strokes
  const tmp = document.createElement('canvas');
  tmp.width=drawCanvas.width; tmp.height=drawCanvas.height;
  tmp.getContext('2d').drawImage(drawCanvas,0,0);
  drawCanvas.width = drawBackdrop.width = w;
  drawCanvas.height = drawBackdrop.height = h;
  drawCtx.drawImage(tmp,0,0,w,h);
  refreshBackdrop();
}

/* backdrop: all saved parts except current, at 0.22 opacity */
function refreshBackdrop(){
  const w=drawBackdrop.width, h=drawBackdrop.height;
  bdCtx.clearRect(0,0,w,h);
  bdCtx.globalAlpha = 0.22;
  PARTS.forEach((p,i)=>{
    if(i===currentPartIdx) return;
    const pc=partCanvases[p];
    if(pc) bdCtx.drawImage(pc,0,0,w,h);
  });
  bdCtx.globalAlpha = 1;
  // Faint rope guide: shows where the noose bottom sits so the player
  // knows to draw the head top touching the top-center of this canvas.
  const gx = w * 0.5;
  bdCtx.save();
  bdCtx.globalAlpha = 0.38;
  bdCtx.strokeStyle = '#b89050';
  bdCtx.lineCap = 'round';
  bdCtx.lineWidth = Math.max(8, w * 0.022);
  bdCtx.beginPath(); bdCtx.moveTo(gx, 0); bdCtx.lineTo(gx, h * 0.055); bdCtx.stroke();
  bdCtx.lineWidth = Math.max(6, w * 0.016);
  bdCtx.beginPath(); bdCtx.moveTo(gx - w*0.055, 0); bdCtx.lineTo(gx + w*0.055, 0); bdCtx.stroke();
  bdCtx.restore();
}

function getPos(e){
  const r = drawCanvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - r.left, src.clientY - r.top];
}

function startStroke(e){ e.preventDefault(); [lastX,lastY]=getPos(e); isDrawing=true; }
function moveStroke(e){
  if(!isDrawing) return; e.preventDefault();
  const [x,y]=getPos(e);
  drawCtx.lineCap='round'; drawCtx.lineJoin='round';
  if(drawTool.mode==='erase'){
    drawCtx.globalCompositeOperation='destination-out';
    drawCtx.lineWidth=28; drawCtx.strokeStyle='rgba(0,0,0,1)';
  } else {
    drawCtx.globalCompositeOperation='source-over';
    drawCtx.lineWidth=drawTool.size;
    drawCtx.strokeStyle=drawTool.mode==='rainbow'
      ? `hsl(${rainbowHue=(rainbowHue+4)%360},100%,55%)`
      : drawTool.color;
  }
  drawCtx.beginPath(); drawCtx.moveTo(lastX,lastY); drawCtx.lineTo(x,y); drawCtx.stroke();
  [lastX,lastY]=[x,y];
}
function endStroke(){ isDrawing=false; drawCtx.globalCompositeOperation='source-over'; }

drawCanvas.addEventListener('pointerdown', startStroke);
drawCanvas.addEventListener('pointermove', moveStroke);
drawCanvas.addEventListener('pointerup',   endStroke);
drawCanvas.addEventListener('pointerleave',endStroke);

/* right-side parts list */
const partsList = document.getElementById('draw-parts-list');
PARTS.forEach((p,i)=>{
  const row = document.createElement('div');
  row.className='part-row'; row.dataset.idx=i;
  row.innerHTML=`<span class="part-arrow">▶</span><input type="checkbox" class="part-check" disabled/><span class="part-name">${p}</span>`;
  row.addEventListener('click',()=>{ saveCurrentPart(); loadPart(i); });
  partsList.appendChild(row);
});

function updatePartsList(){
  document.querySelectorAll('.part-row').forEach((row,i)=>{
    const done = !!partCanvases[PARTS[i]];
    row.classList.toggle('current', i===currentPartIdx);
    row.classList.toggle('done', done);
    row.querySelector('.part-check').checked = done;
  });
  document.getElementById('draw-part-label').textContent = 'Drawing: '+PARTS[currentPartIdx];
}

function saveCurrentPart(){
  const off=document.createElement('canvas');
  off.width=drawCanvas.width; off.height=drawCanvas.height;
  off.getContext('2d').drawImage(drawCanvas,0,0);
  partCanvases[PARTS[currentPartIdx]]=off;
}

function loadPart(idx){
  currentPartIdx=idx;
  drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  const saved=partCanvases[PARTS[idx]];
  if(saved) drawCtx.drawImage(saved,0,0,drawCanvas.width,drawCanvas.height);
  refreshBackdrop();
  updatePartsList();
}

document.getElementById('btn-part-done').addEventListener('click',()=>{
  saveCurrentPart();
  const next=currentPartIdx+1;
  if(next<PARTS.length){ loadPart(next); }
  else { show('screen-word'); }
});

/* ══════════════════════════════════════
   WORD ENTRY
══════════════════════════════════════ */
let secretWord = '';

document.getElementById('btn-word-done').addEventListener('click', submitWord);
document.getElementById('word-input').addEventListener('keydown', e=>{ if(e.key==='Enter') submitWord(); });

function submitWord(){
  const val = document.getElementById('word-input').value.trim().toUpperCase().replace(/[^A-Z]/g,'');
  const err = document.getElementById('word-err');
  if (val.length < 2){ err.style.display='block'; return; }
  err.style.display='none';
  secretWord = val;
  document.getElementById('word-input').value = '';
  startGame();
}

/* ══════════════════════════════════════
   GAME LOGIC
══════════════════════════════════════ */
const MAX_WRONG = PARTS.length; // 10 wrong guesses
let wrongGuesses = 0;
let guessedLetters = new Set();

const gallows = document.getElementById('gallows-canvas');
const gCtx    = gallows.getContext('2d');

function startGame(){
  wrongGuesses = 0;
  guessedLetters = new Set();
  show('screen-play');
  setTimeout(()=>{
    gallows.width  = gallows.clientWidth;
    gallows.height = gallows.clientWidth * 0.7;
    buildKeyboard();
    renderGame();
  }, 50);
}

function drawDefaultCharacter(shown, cx, headR, w, h){
  const g = gCtx;
  g.save();
  g.lineCap = 'round'; g.lineJoin = 'round';

  // ── Key positions (headR-based so proportions scale with canvas) ──────────
  const hcy      = h*0.26;
  const neck     = hcy + headR;
  const shoulder = neck  + headR*0.5;
  const hip      = shoulder + headR*2.6;

  // Arms: upper arm + forearm together in parts 2/3; hand alone in parts 4/5
  const shldrL   = cx - headR*1.1,  shldrR  = cx + headR*1.1;
  const elbowLX  = cx - headR*2.0,  elbowRX = cx + headR*2.0;
  const elbowY   = shoulder + headR*1.4;
  const wristLX  = cx - headR*2.6,  wristRX = cx + headR*2.6;
  const wristY   = elbowY + headR*1.2;

  // Legs: thigh + shin together in parts 6/7; shoe alone in parts 8/9
  const hipLX    = cx - headR*0.5,  hipRX   = cx + headR*0.5;
  const kneeLX   = cx - headR*0.8,  kneeRX  = cx + headR*0.8;
  const kneeY    = hip  + headR*1.4;
  const ankleLX  = cx - headR*0.9,  ankleRX = cx + headR*0.9;
  const ankleY   = kneeY + headR*1.3;

  const lw    = headR * 0.32;
  const skin  = '#F5C18A';
  const hair  = '#7B4020';
  const shirt = '#4A90D9';
  const pants = '#808080';
  const shoe  = '#111111';

  // ── Part 0 – Head ──────────────────────────────────────────────────────────
  if(shown >= 1){
    // neck
    g.fillStyle = skin;
    g.fillRect(cx - headR*0.2, neck - 1, headR*0.4, headR*0.5);
    // face
    g.fillStyle = skin;
    g.beginPath(); g.arc(cx, hcy, headR, 0, Math.PI*2); g.fill();
    // hair cap
    g.fillStyle = hair;
    g.beginPath(); g.arc(cx, hcy, headR, Math.PI*1.08, -0.08); g.closePath(); g.fill();
    // head outline
    g.strokeStyle = 'rgba(0,0,0,0.22)'; g.lineWidth = headR*0.09;
    g.beginPath(); g.arc(cx, hcy, headR, 0, Math.PI*2); g.stroke();
    // eye whites
    g.fillStyle = '#fff';
    g.beginPath(); g.ellipse(cx - headR*0.32, hcy - headR*0.07, headR*0.19, headR*0.17, 0, 0, Math.PI*2); g.fill();
    g.beginPath(); g.ellipse(cx + headR*0.32, hcy - headR*0.07, headR*0.19, headR*0.17, 0, 0, Math.PI*2); g.fill();
    // pupils
    const worried = shown >= 7;
    g.fillStyle = '#2a2a2a';
    g.beginPath(); g.arc(cx - headR*0.30, hcy - headR*0.07, headR*0.09, 0, Math.PI*2); g.fill();
    g.beginPath(); g.arc(cx + headR*0.30, hcy - headR*0.07, headR*0.09, 0, Math.PI*2); g.fill();
    // eyebrows
    g.strokeStyle = hair; g.lineWidth = headR*0.1;
    if(worried){
      g.beginPath(); g.moveTo(cx - headR*0.50, hcy - headR*0.34); g.lineTo(cx - headR*0.14, hcy - headR*0.27); g.stroke();
      g.beginPath(); g.moveTo(cx + headR*0.50, hcy - headR*0.34); g.lineTo(cx + headR*0.14, hcy - headR*0.27); g.stroke();
    } else {
      g.beginPath(); g.moveTo(cx - headR*0.50, hcy - headR*0.30); g.lineTo(cx - headR*0.14, hcy - headR*0.30); g.stroke();
      g.beginPath(); g.moveTo(cx + headR*0.50, hcy - headR*0.30); g.lineTo(cx + headR*0.14, hcy - headR*0.30); g.stroke();
    }
    // mouth
    g.strokeStyle = 'rgba(0,0,0,0.42)'; g.lineWidth = headR*0.1;
    g.beginPath();
    if(worried){
      g.arc(cx, hcy + headR*0.50, headR*0.26, Math.PI*0.15, Math.PI*0.85, true);
    } else {
      g.arc(cx, hcy + headR*0.28, headR*0.26, 0.2, Math.PI - 0.2);
    }
    g.stroke();
  }

  // ── Part 1 – Torso ─────────────────────────────────────────────────────────
  if(shown >= 2){
    g.strokeStyle = shirt; g.lineWidth = headR*1.1;
    g.beginPath(); g.moveTo(cx, neck + headR*0.2); g.lineTo(cx, hip); g.stroke();
    g.lineWidth = headR*0.8;
    g.beginPath(); g.moveTo(shldrL, shoulder); g.lineTo(shldrR, shoulder); g.stroke();
  }

  // ── Part 2 – Left Arm (upper arm + forearm — hand drawn separately) ────────
  if(shown >= 3){
    g.strokeStyle = shirt; g.lineWidth = lw*1.5;
    g.beginPath(); g.moveTo(shldrL, shoulder); g.lineTo(elbowLX, elbowY); g.stroke();
    g.strokeStyle = skin; g.lineWidth = lw*1.3;
    g.beginPath(); g.moveTo(elbowLX, elbowY); g.lineTo(wristLX, wristY); g.stroke();
  }

  // ── Part 3 – Right Arm (upper arm + forearm) ───────────────────────────────
  if(shown >= 4){
    g.strokeStyle = shirt; g.lineWidth = lw*1.5;
    g.beginPath(); g.moveTo(shldrR, shoulder); g.lineTo(elbowRX, elbowY); g.stroke();
    g.strokeStyle = skin; g.lineWidth = lw*1.3;
    g.beginPath(); g.moveTo(elbowRX, elbowY); g.lineTo(wristRX, wristY); g.stroke();
  }

  // ── Part 4 – Left Hand ONLY ────────────────────────────────────────────────
  if(shown >= 5){
    g.fillStyle = skin;
    g.strokeStyle = 'rgba(0,0,0,0.18)'; g.lineWidth = headR*0.07;
    g.beginPath(); g.arc(wristLX, wristY, headR*0.22, 0, Math.PI*2); g.fill(); g.stroke();
  }

  // ── Part 5 – Right Hand ONLY ───────────────────────────────────────────────
  if(shown >= 6){
    g.fillStyle = skin;
    g.strokeStyle = 'rgba(0,0,0,0.18)'; g.lineWidth = headR*0.07;
    g.beginPath(); g.arc(wristRX, wristY, headR*0.22, 0, Math.PI*2); g.fill(); g.stroke();
  }

  // ── Part 6 – Left Leg (thigh + shin — shoe drawn separately) ──────────────
  if(shown >= 7){
    g.strokeStyle = pants; g.lineWidth = lw*1.7;
    g.beginPath(); g.moveTo(hipLX, hip); g.lineTo(kneeLX, kneeY); g.stroke();
    g.lineWidth = lw*1.5;
    g.beginPath(); g.moveTo(kneeLX, kneeY); g.lineTo(ankleLX, ankleY); g.stroke();
  }

  // ── Part 7 – Right Leg (thigh + shin) ─────────────────────────────────────
  if(shown >= 8){
    g.strokeStyle = pants; g.lineWidth = lw*1.7;
    g.beginPath(); g.moveTo(hipRX, hip); g.lineTo(kneeRX, kneeY); g.stroke();
    g.lineWidth = lw*1.5;
    g.beginPath(); g.moveTo(kneeRX, kneeY); g.lineTo(ankleRX, ankleY); g.stroke();
  }

  // ── Part 8 – Left Shoe ONLY ────────────────────────────────────────────────
  if(shown >= 9){
    g.fillStyle = shoe;
    g.beginPath(); g.ellipse(ankleLX - headR*0.2, ankleY + headR*0.12, headR*0.44, headR*0.17, 0, 0, Math.PI*2); g.fill();
  }

  // ── Part 9 – Right Shoe ONLY ───────────────────────────────────────────────
  if(shown >= 10){
    g.fillStyle = shoe;
    g.beginPath(); g.ellipse(ankleRX + headR*0.2, ankleY + headR*0.12, headR*0.44, headR*0.17, 0, 0, Math.PI*2); g.fill();
  }

  g.restore();
}

/* draw gallows + body parts revealed so far */
function drawGallows(){
  const w = gallows.width, h = gallows.height;
  gCtx.clearRect(0,0,w,h);

  // ── Sky gradient ──────────────────────────────────────────────────────────
  const sky = gCtx.createLinearGradient(0,0,0,h*0.72);
  sky.addColorStop(0,'#5bb8f5');
  sky.addColorStop(1,'#c9eaff');
  gCtx.fillStyle = sky;
  gCtx.fillRect(0,0,w,h);

  // ── Sun ───────────────────────────────────────────────────────────────────
  const sunX=w*0.88, sunY=h*0.10, sunR=h*0.075;
  // glow
  const sunGlow = gCtx.createRadialGradient(sunX,sunY,sunR*0.4,sunX,sunY,sunR*2.2);
  sunGlow.addColorStop(0,'rgba(255,240,80,0.55)');
  sunGlow.addColorStop(1,'rgba(255,240,80,0)');
  gCtx.fillStyle=sunGlow; gCtx.beginPath(); gCtx.arc(sunX,sunY,sunR*2.2,0,Math.PI*2); gCtx.fill();
  // disc
  gCtx.fillStyle='#FFE033';
  gCtx.beginPath(); gCtx.arc(sunX,sunY,sunR,0,Math.PI*2); gCtx.fill();
  gCtx.fillStyle='#FFD000';
  gCtx.beginPath(); gCtx.arc(sunX,sunY,sunR*0.72,0,Math.PI*2); gCtx.fill();
  // rays
  gCtx.strokeStyle='#FFD000'; gCtx.lineWidth=Math.max(1.5,h*0.012); gCtx.lineCap='round';
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4, r1=sunR*1.18, r2=sunR*1.68;
    gCtx.beginPath(); gCtx.moveTo(sunX+Math.cos(a)*r1,sunY+Math.sin(a)*r1);
    gCtx.lineTo(sunX+Math.cos(a)*r2,sunY+Math.sin(a)*r2); gCtx.stroke();
  }

  // ── Hill ─────────────────────────────────────────────────────────────────
  const hillY = h*0.74; // where hill apex is (left side higher → gentle slope right)
  gCtx.beginPath();
  gCtx.moveTo(0, h*0.70);
  gCtx.bezierCurveTo(w*0.25, h*0.64, w*0.55, h*0.78, w, h*0.82);
  gCtx.lineTo(w,h); gCtx.lineTo(0,h); gCtx.closePath();
  const grass = gCtx.createLinearGradient(0,hillY,0,h);
  grass.addColorStop(0,'#6ec96e');
  grass.addColorStop(0.35,'#4db34d');
  grass.addColorStop(1,'#2d7a2d');
  gCtx.fillStyle=grass; gCtx.fill();
  // darker grass edge strip
  gCtx.beginPath();
  gCtx.moveTo(0, h*0.70);
  gCtx.bezierCurveTo(w*0.25, h*0.64, w*0.55, h*0.78, w, h*0.82);
  gCtx.lineTo(w, h*0.82+h*0.025); gCtx.lineTo(w*0.55, h*0.78+h*0.025);
  gCtx.bezierCurveTo(w*0.25, h*0.64+h*0.025, 0, h*0.70+h*0.025, 0, h*0.70+h*0.025);
  gCtx.closePath();
  gCtx.fillStyle='#3da03d'; gCtx.fill();

  // ── Gallows (wooden timber) ───────────────────────────────────────────────
  gCtx.save();
  gCtx.translate(0, h*0.07); // shift gallows + character down
  gCtx.lineCap='round'; gCtx.lineJoin='round';
  // shadow under base
  gCtx.strokeStyle='rgba(0,0,0,0.18)'; gCtx.lineWidth=h*0.022;
  gCtx.beginPath(); gCtx.moveTo(w*0.09,h*0.755); gCtx.lineTo(w*0.54,h*0.755); gCtx.stroke();

  const woodFill = (x1,y1,x2,y2,thick)=>{
    const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
    const nx=-dy/len*thick/2, ny=dx/len*thick/2;
    // grain gradient across thickness
    const grd=gCtx.createLinearGradient(x1+nx,y1+ny,x1-nx,y1-ny);
    grd.addColorStop(0,'#c8843a'); grd.addColorStop(0.4,'#e8a54a'); grd.addColorStop(0.7,'#d4923e'); grd.addColorStop(1,'#b87030');
    gCtx.fillStyle=grd;
    gCtx.beginPath();
    gCtx.moveTo(x1+nx,y1+ny); gCtx.lineTo(x2+nx,y2+ny);
    gCtx.lineTo(x2-nx,y2-ny); gCtx.lineTo(x1-nx,y1-ny);
    gCtx.closePath(); gCtx.fill();
    gCtx.strokeStyle='#8B5520'; gCtx.lineWidth=1.2; gCtx.stroke();
  };

  const thick = h*0.038;
  // base
  woodFill(w*0.09,h*0.742,w*0.54,h*0.742,thick);
  // vertical pole
  woodFill(w*0.22,h*0.742,w*0.22,h*0.09,thick);
  // horizontal beam
  woodFill(w*0.22,h*0.09,w*0.52,h*0.09,thick);
  // diagonal brace
  woodFill(w*0.22,h*0.30,w*0.38,h*0.09,thick*0.75);
  // bolt circles at joints
  [
    [w*0.22,h*0.09],[w*0.52,h*0.09],[w*0.22,h*0.742]
  ].forEach(([bx,by])=>{
    gCtx.fillStyle='#5a3200'; gCtx.beginPath(); gCtx.arc(bx,by,thick*0.35,0,Math.PI*2); gCtx.fill();
    gCtx.fillStyle='#c8a060'; gCtx.beginPath(); gCtx.arc(bx,by,thick*0.18,0,Math.PI*2); gCtx.fill();
  });
  // rope
  gCtx.strokeStyle='#c8a060'; gCtx.lineWidth=Math.max(2,h*0.014); gCtx.lineCap='round';
  gCtx.beginPath(); gCtx.moveTo(w*0.52,h*0.09+thick/2); gCtx.lineTo(w*0.52,h*0.18); gCtx.stroke();
  gCtx.strokeStyle='#a07840'; gCtx.lineWidth=Math.max(1,h*0.005);
  for(let i=0;i<6;i++){
    const ry=h*0.09+thick/2+i*(h*0.09/6);
    gCtx.beginPath(); gCtx.moveTo(w*0.52-h*0.006,ry); gCtx.lineTo(w*0.52+h*0.006,ry+h*0.012); gCtx.stroke();
  }

  const cx=w*0.52, headR=h*0.08;
  const torsoY1=h*0.26+headR, torsoY2=h*0.55;

  if (useDefaultPerson){
    drawDefaultCharacter(wrongGuesses, cx, headR, w, h);
  } else {
    // composite of drawn part canvases
    const partW=w*0.35, partH=h*0.71;
    const offX=cx-partW/2, offY=h*0.18;
    for(let i=0;i<wrongGuesses;i++){
      const pc=partCanvases[PARTS[i]];
      if(pc) gCtx.drawImage(pc,offX,offY,partW,partH);
    }
  }
  gCtx.restore();
}

function renderGame(){
  drawGallows();
  // word display
  const wd = document.getElementById('play-word-display');
  wd.innerHTML='';
  [...secretWord].forEach(ch=>{
    const box=document.createElement('div');
    box.style.cssText='width:36px;height:44px;border-bottom:3px solid #2B2140;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#5a3200;';
    box.textContent = guessedLetters.has(ch) ? ch : '';
    wd.appendChild(box);
  });
  // wrong count
  document.getElementById('play-wrong-label').textContent=`Wrong: ${wrongGuesses}/${MAX_WRONG}`;
  // guessed letters
  document.getElementById('play-guessed').textContent = guessedLetters.size ? 'Tried: '+[...guessedLetters].join(' ') : '';
  // keyboard state
  document.querySelectorAll('.key-btn').forEach(btn=>{
    const l=btn.dataset.letter;
    const used=guessedLetters.has(l);
    const correct=used&&secretWord.includes(l);
    btn.disabled=used;
    btn.style.background=used?(correct?'#2ecc71':'#c0392b'):'rgba(255,255,255,0.12)';
    btn.style.opacity=used?'0.5':'1';
  });
}

function buildKeyboard(){
  const kb=document.getElementById('play-keyboard');
  kb.innerHTML='';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l=>{
    const btn=document.createElement('button');
    btn.className='key-btn';
    btn.dataset.letter=l;
    btn.textContent=l;
    btn.style.cssText='width:48px;height:48px;border-radius:10px;border:2px solid rgba(0,0,0,0.2);background:#fff;color:#2B2140;font-weight:700;font-size:1.2rem;cursor:pointer;';
    btn.addEventListener('click',()=>guessLetter(l));
    kb.appendChild(btn);
  });
  // also handle physical keyboard
  document.onkeydown = e=>{
    const l=e.key.toUpperCase();
    if(/^[A-Z]$/.test(l)&&!guessedLetters.has(l)) guessLetter(l);
  };
}

function guessLetter(l){
  guessedLetters.add(l);
  if(!secretWord.includes(l)) wrongGuesses++;
  renderGame();
  const won=[...secretWord].every(c=>guessedLetters.has(c));
  const lost=wrongGuesses>=MAX_WRONG;
  if(won||lost) setTimeout(()=>endGame(won),600);
}

/* ══════════════════════════════════════
   RESULT SCREEN
══════════════════════════════════════ */
function endGame(won){
  document.onkeydown = null;
  document.getElementById('result-emoji').textContent = won ? '🎉' : '💀';
  document.getElementById('result-title').textContent = won ? 'You Win!' : 'You Lose!';
  document.getElementById('result-word').textContent  = `The word was: ${secretWord}`;
  const overlay = document.getElementById('result-overlay');
  overlay.style.display = 'flex';
}

function hideOverlay(){ document.getElementById('result-overlay').style.display='none'; }
document.getElementById('btn-play-again').addEventListener('click',()=>{
  hideOverlay();
  document.getElementById('word-input').value='';
  show('screen-word');
});
document.getElementById('btn-new-drawing').addEventListener('click',()=>{
  hideOverlay();
  document.getElementById('word-input').value='';
  show('screen-choose');
});

function startDrawing(){
  useDefaultPerson = false;
  currentPartIdx = 0;
  partCanvases = {};
  show('screen-draw');
  setTimeout(()=>{
    resizeDrawCanvas();
    drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    refreshBackdrop();
    updatePartsList();
  },50);
}
