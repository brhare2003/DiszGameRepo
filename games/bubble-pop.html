<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bubble Pop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #FFF6E4;
      overflow: hidden;
      overscroll-behavior: none;
      height: 100vh;
      user-select: none;
      touch-action: none;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 22px;
      pointer-events: none;
    }

    #score-display {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      text-shadow: 0 0 14px rgba(255,255,255,0.5);
    }

    #score-label {
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    #home-btn {
      pointer-events: all;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: #ccc;
      font-size: 0.85rem;
      letter-spacing: 2px;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
    }

    #home-btn:hover {
      background: rgba(255,255,255,0.16);
      color: #fff;
    }

    #target-panel {
      text-align: center;
      pointer-events: none;
    }

    #target-label {
      font-size: 0.7rem;
      color: #aaa;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #target-swatches {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .target-swatch {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.35);
      animation: swatchPulse 1.4s ease-in-out infinite alternate;
    }

    @keyframes swatchPulse {
      from { transform: scale(0.93); }
      to   { transform: scale(1.07); }
    }

    /* ── Corner colour panels ── */
    #color-panel-left,
    #color-panel-right {
      position: fixed;
      top: 0;
      width: min(38vw, 320px);
      height: min(38vw, 320px);
      pointer-events: none;
      z-index: 1;
      transition: background 0.5s ease;
    }
    #color-panel-left  { left: 0;  border-radius: 0 0 100% 0; }
    #color-panel-right { right: 0; border-radius: 0 0 0 100%; }

    /* label inside each corner */
    .corner-label {
      position: absolute;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
      text-transform: uppercase;
      pointer-events: none;
    }
    #corner-label-left  { top: 78px; left: 18px; }
    #corner-label-right { top: 78px; right: 18px; text-align: right; }

    #target-change-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
    }
    #target-change-flash.flash {
      animation: bigFlash 0.75s ease-out forwards;
    }
    @keyframes bigFlash {
      0%   { opacity: 0.72; }
      100% { opacity: 0; }
    }
  </style>
  <script>
    // Block pinch-zoom, double-tap zoom, gesture zoom, ctrl+scroll zoom
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    (function() {
      var lt = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lt < 300) e.preventDefault();
        lt = now;
      }, false);
    })();
    document.addEventListener('gesturestart',  function(e) { e.preventDefault(); }, false);
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, false);
    window.addEventListener('wheel', function(e) {
      if (e.ctrlKey) e.preventDefault();
    }, { passive: false });
  </script>
</head>
<body>

  <canvas id="game-canvas"></canvas>

  <div id="color-panel-left"></div>
  <div id="color-panel-right"></div>
  <div id="corner-label-left"  class="corner-label">POP</div>
  <div id="corner-label-right" class="corner-label">POP</div>

  <div id="target-change-flash"></div>

  <div id="hud">
    <div>
      <div id="score-label">SCORE</div>
      <div id="score-display">0</div>
    </div>
    <div id="target-panel">
      <div id="target-label">POP THESE</div>
      <div id="target-swatches"></div>
    </div>
    <a href="../index.html" id="home-btn">&#8592; HOME</a>
  </div>

  <script>
  (function () {
    // ── Audio ──────────────────────────────────────────────────────────────
    let _ac = null;
    function ac() { if (!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)(); return _ac; }
    function playSound(type) {
      try {
        const a = ac(), t = a.currentTime;
        const o = a.createOscillator(), g = a.createGain();
        o.connect(g); g.connect(a.destination);
        if (type === 'good') {
          o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(1200, t+0.1);
          g.gain.setValueAtTime(0.22, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
          o.start(t); o.stop(t+0.18);
        } else if (type === 'bad') {
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(220, t); o.frequency.exponentialRampToValueAtTime(100, t+0.18);
          g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.2);
          o.start(t); o.stop(t+0.2);
        } else if (type === 'target') {
          [523,659,784].forEach((f,i)=>{
            const o2=a.createOscillator(), g2=a.createGain();
            o2.connect(g2); g2.connect(a.destination);
            o2.frequency.setValueAtTime(f, t+i*0.07);
            g2.gain.setValueAtTime(0.15, t+i*0.07); g2.gain.exponentialRampToValueAtTime(0.001, t+i*0.07+0.2);
            o2.start(t+i*0.07); o2.stop(t+i*0.07+0.2);
          });
        }
      } catch(e) {}
    }

    const canvas = document.getElementById('game-canvas');
    const ctx    = canvas.getContext('2d');
    const scoreEl      = document.getElementById('score-display');
    const flashEl      = document.getElementById('target-change-flash');
    const swatchesEl   = document.getElementById('target-swatches');
    const panelLeft    = document.getElementById('color-panel-left');
    const panelRight   = document.getElementById('color-panel-right');
    const labelLeft    = document.getElementById('corner-label-left');
    const labelRight   = document.getElementById('corner-label-right');

    // ── Palette of bright primary / secondary colours ─────────────────────
    const COLORS = [
      '#FF3333', // red
      '#FFE600', // yellow
      '#33CC33', // green
      '#3399FF', // blue
      '#CC33FF', // purple
    ];

    let W, H;
    let score = 0;
    const circles   = [];
    const particles = [];
    const floatingTexts = [];

    // ── Target colour logic ───────────────────────────────────────────────
    const TARGET_INTERVAL = 15000; // ms between target changes
    let targetColors = [];
    let lastTargetChange = -TARGET_INTERVAL; // fires immediately on first frame

    function pickTargets(ts) {
      const shuffled = [...COLORS].sort(() => Math.random() - 0.5);
      targetColors = shuffled.slice(0, 2);
      lastTargetChange = ts;
      playSound('target');
      renderSwatches();

      // dramatic two-colour flash across the whole screen
      flashEl.style.background =
        `linear-gradient(135deg, ${targetColors[0]}bb 0%, ${targetColors[0]}55 38%, ${targetColors[1]}55 62%, ${targetColors[1]}bb 100%)`;
      flashEl.classList.remove('flash');
      void flashEl.offsetWidth; // force reflow to restart animation
      flashEl.classList.add('flash');
    }

    function renderSwatches() {
      // small centre swatches (kept for accessibility)
      swatchesEl.innerHTML = '';
      targetColors.forEach(color => {
        const d = document.createElement('div');
        d.className = 'target-swatch';
        d.style.background = color;
        d.style.boxShadow = `0 0 14px 3px ${color}`;
        swatchesEl.appendChild(d);
      });

      // large corner panels
      const [c1, c2] = targetColors;
      panelLeft.style.background =
        `radial-gradient(circle at top left, ${c1}cc 0%, ${c1}88 25%, ${c1}33 55%, transparent 72%)`;
      panelRight.style.background =
        `radial-gradient(circle at top right, ${c2}cc 0%, ${c2}88 25%, ${c2}33 55%, transparent 72%)`;

      // update corner labels with colour names
      const nameOf = hex => COLORS.indexOf(hex) >= 0
        ? ['RED','YELLOW','GREEN','BLUE','PURPLE'][COLORS.indexOf(hex)]
        : '';
      labelLeft.textContent  = 'POP ' + nameOf(c1);
      labelLeft.style.color  = c1;
      labelLeft.style.textShadow = `0 0 10px ${c1}, 0 0 4px #000`;
      labelRight.textContent = 'POP ' + nameOf(c2);
      labelRight.style.color  = c2;
      labelRight.style.textShadow = `0 0 10px ${c2}, 0 0 4px #000`;
    }

    function spawnFloatingText(x, y, text, color) {
      floatingTexts.push({ x, y, text, color, alpha: 1, vy: -1.8, life: 1 });
    }

    // ── Resize ────────────────────────────────────────────────────────────
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Circle factory ────────────────────────────────────────────────────
    function spawnCircle() {
      const r     = Math.random() * 28 + 22;          // radius 22–50
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const x     = Math.random() * (W - r * 2) + r;
      const speed = Math.random() * 1.2 + 0.5;        // px / frame
      const wobbleAmp   = Math.random() * 1.2 + 0.4;
      const wobbleSpeed = Math.random() * 0.04 + 0.02;
      circles.push({
        x, y: H + r + 10,
        baseX: x,
        r, color, speed,
        wobbleAmp, wobbleSpeed,
        wobbleOffset: Math.random() * Math.PI * 2,
        age: 0,
        popped: false,
      });
    }

    // ── Pop particle factory ──────────────────────────────────────────────
    function popBurst(x, y, color) {
      const count = 14;
      for (let i = 0; i < count; i++) {
        const angle  = (i / count) * Math.PI * 2;
        const speed  = Math.random() * 5 + 2;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r:  Math.random() * 5 + 2,
          color,
          alpha: 1,
          life: 1,
          decay: Math.random() * 0.03 + 0.025,
        });
      }
      // A few bigger "ring" particles
      for (let i = 0; i < 6; i++) {
        const angle  = (i / 6) * Math.PI * 2;
        const speed  = Math.random() * 3 + 1.5;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r:  Math.random() * 8 + 4,
          color: '#ffffff',
          alpha: 0.85,
          life: 0.85,
          decay: Math.random() * 0.025 + 0.02,
        });
      }
    }

    // ── Hit detection ─────────────────────────────────────────────────────
    const HIT_BONUS = 14; // extra px added to radius for forgiving taps

    function hitTest(px, py) {
      // iterate forward — circles[0] is drawn last (on top), so check it first
      for (let i = 0; i < circles.length; i++) {
        const c = circles[i];
        if (c.popped) continue;
        const dx = px - c.x;
        const dy = py - c.y;
        const hr = c.r + HIT_BONUS;
        if (dx * dx + dy * dy <= hr * hr) {
          c.popped = true;
          if (targetColors.includes(c.color)) {
            score++;
            spawnFloatingText(c.x, c.y - c.r, '+1', c.color);
            playSound('good');
          } else {
            score = Math.max(0, score - 1);
            spawnFloatingText(c.x, c.y - c.r, '-1', '#ff4444');
            playSound('bad');
          }
          scoreEl.textContent = score;
          popBurst(c.x, c.y, c.color);
          return;
        }
      }
    }

    // Mouse: click and drag
    let mouseDown = false;
    canvas.addEventListener('mousedown',  e => { mouseDown = true;  hitTest(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup',    ()  => { mouseDown = false; });
    canvas.addEventListener('mouseleave', ()  => { mouseDown = false; });
    canvas.addEventListener('mousemove',  e => { if (mouseDown) hitTest(e.clientX, e.clientY); });

    // Touch: tap and drag
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(t => hitTest(t.clientX, t.clientY));
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(t => hitTest(t.clientX, t.clientY));
    }, { passive: false });

    // ── Spawn timer ───────────────────────────────────────────────────────
    let lastSpawn = 0;
    function spawnInterval() {
      // spawn every 700ms at start, ramps down to 350ms after 30 circles
      return Math.max(350, 700 - score * 5);
    }

    // ── Draw a single circle with sheen ───────────────────────────────────
    function drawCircle(c) {
      // body
      const grad = ctx.createRadialGradient(
        c.x - c.r * 0.3, c.y - c.r * 0.3, c.r * 0.05,
        c.x,              c.y,              c.r
      );
      grad.addColorStop(0,   '#ffffff');
      grad.addColorStop(0.2, c.color);
      grad.addColorStop(1,   shadeColor(c.color, -55));

      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.shadowBlur  = 18;
      ctx.shadowColor = c.color;
      ctx.fill();
      ctx.shadowBlur = 0;

      // sheen highlight
      ctx.beginPath();
      ctx.ellipse(
        c.x - c.r * 0.28, c.y - c.r * 0.32,
        c.r * 0.26, c.r * 0.16,
        -0.5, 0, Math.PI * 2
      );
      ctx.fillStyle = 'rgba(255,255,255,0.40)';
      ctx.fill();
    }

    // ── Darken hex colour for gradient stop ───────────────────────────────
    function shadeColor(hex, amt) {
      let n = parseInt(hex.slice(1), 16);
      let r = Math.min(255, Math.max(0, (n >> 16) + amt));
      let g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amt));
      let b = Math.min(255, Math.max(0, (n & 0xff) + amt));
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    // ── Draw background (dark gradient) ──────────────────────────────────
    function drawBackground() {
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, '#0a0a1e');
      bg.addColorStop(1, '#000010');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);
    }

    // ── Main loop ─────────────────────────────────────────────────────────
    let prevTime = 0;
    function loop(ts) {
      requestAnimationFrame(loop);

      const dt = ts - prevTime;
      prevTime = ts;

      drawBackground();

      // rotate target colours
      if (ts - lastTargetChange >= TARGET_INTERVAL) {
        pickTargets(ts);
      }

      // spawn
      if (ts - lastSpawn > spawnInterval()) {
        spawnCircle();
        lastSpawn = ts;
      }

      // update & draw circles
      for (let i = circles.length - 1; i >= 0; i--) {
        const c = circles[i];
        if (c.popped) {
          circles.splice(i, 1);
          continue;
        }
        c.age += 1;
        c.y   -= c.speed;
        c.x    = c.baseX + Math.sin(c.age * c.wobbleSpeed + c.wobbleOffset) * c.wobbleAmp * 12;

        if (c.y + c.r < 0) {
          circles.splice(i, 1);
          continue;
        }
        drawCircle(c);
      }

      // update & draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x    += p.vx;
        p.y    += p.vy;
        p.vy   += 0.12;          // mild gravity
        p.life -= p.decay;
        p.alpha = Math.max(0, p.life);

        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }

        ctx.globalAlpha = p.alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.shadowBlur  = 8;
        ctx.shadowColor = p.color;
        ctx.fill();
        ctx.shadowBlur  = 0;
        ctx.globalAlpha = 1;
      }

      // floating score texts
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.y    += t.vy;
        t.life -= 0.022;
        if (t.life <= 0) { floatingTexts.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = Math.max(0, t.life);
        ctx.font = 'bold 30px "Segoe UI", sans-serif';
        ctx.fillStyle   = t.color;
        ctx.shadowBlur  = 12;
        ctx.shadowColor = t.color;
        ctx.fillText(t.text, t.x, t.y);
        ctx.restore();
      }
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    requestAnimationFrame(loop);
  })();
  </script>

</body>
</html>
