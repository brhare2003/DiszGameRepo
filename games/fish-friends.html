<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fish Friends</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #001428; touch-action: none;
      user-select: none; -webkit-user-select: none;
      overscroll-behavior: none;
    }
    #home-btn {
      position: fixed; top: 12px; left: 12px; z-index: 500;
      color: #2B2140; text-decoration: none; font-size: 0.88rem; font-weight: 700;
      background: rgba(255,246,228,0.92); border: 2px solid #2B2140;
      padding: 6px 14px; border-radius: 20px; letter-spacing: 1px;
    }
    .screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .screen.active { display: flex; }

    /* ── Screen 1 ── */
    #s-select {
      background: radial-gradient(ellipse at 50% 60%, #002a4a 0%, #000c1a 100%);
    }
    #s-select h2 {
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #7EEDF4; letter-spacing: 3px; margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(126,237,244,0.5);
    }
    canvas { display: block; touch-action: none; }

    /* ── Icon buttons ── */
    .icon-btn {
      width: 68px; height: 68px; border-radius: 50%; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem; box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      transition: transform 0.1s; touch-action: manipulation;
    }
    .icon-btn:active { transform: scale(0.88); }
    .icon-btn.go   { background: #22cc66; }
    .icon-btn.nav  { background: rgba(255,255,255,0.15); color: #fff; font-size: 2rem; }
    .btn-row { display: flex; gap: 28px; align-items: center; margin-top: 22px; }

    /* ── Screen 2 ── */
    #s-paint { background: radial-gradient(ellipse at 50% 60%, #002a4a 0%, #000c1a 100%); }
    #palette {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      max-width: 360px; margin-top: 14px;
    }
    .pal-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; touch-action: manipulation; transition: transform 0.1s;
    }
    .pal-btn.active { border-color: #fff; transform: scale(1.18); }
    .pal-btn:active { transform: scale(0.88); }

    /* ── Screen 3 ── */
    #s-tank { background: #001428; }
    #cv-tank { display: block; touch-action: none; }
    #deco-bar {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      background: rgba(0,20,40,0.75); border-radius: 30px; padding: 8px 14px;
      z-index: 100;
    }
    .deco-pick {
      width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(126,237,244,0.4);
      background: rgba(0,40,80,0.7); font-size: 1.6rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; transition: transform 0.1s;
    }
    .deco-pick.selected { border-color: #7EEDF4; transform: scale(1.15); }
    .deco-pick:active { transform: scale(0.88); }
    .bar-divider { width: 1px; height: 36px; background: rgba(126,237,244,0.25); flex-shrink: 0; }
    #deco-bar { overflow-x: auto; max-width: 100vw; scrollbar-width: none; }
    #deco-bar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
<a href="../index.html" id="home-btn">&#8592; Home</a>

<!-- SCREEN 1: PICK YOUR FISH -->
<div class="screen active" id="s-select">
  <h2>🐠 PICK YOUR FISH!</h2>
  <canvas id="cv-sel"></canvas>
  <div class="btn-row">
    <button class="icon-btn nav" id="btn-prev">&#9664;</button>
    <button class="icon-btn go"  id="btn-go1">&#10003;</button>
    <button class="icon-btn nav" id="btn-next">&#9654;</button>
  </div>
</div>

<!-- SCREEN 2: PAINT -->
<div class="screen" id="s-paint">
  <canvas id="cv-paint"></canvas>
  <div id="palette"></div>
  <div class="btn-row">
    <button class="icon-btn nav" id="btn-back2">&#8592;</button>
    <button class="icon-btn go"  id="btn-go2">&#10003;</button>
  </div>
</div>
<!-- SCREEN 3: AQUARIUM -->
<div class="screen" id="s-tank">
  <canvas id="cv-tank"></canvas>
  <div id="deco-bar">
    <button class="deco-pick" data-tool="food"   id="tool-food"   title="Drop food">&#9679;</button>
    <button class="deco-pick" data-tool="bubble" id="tool-bubble" title="Blow bubble">&#9675;</button>
    <button class="deco-pick" data-tool="poke"   id="tool-poke"   title="Poke fish">&#128070;</button>
    <span class="bar-divider"></span>
    <button class="deco-pick" data-deco="seaweed" title="Seaweed">🌿</button>
    <button class="deco-pick" data-deco="kelp"    title="Kelp">&#10072;</button>
    <button class="deco-pick" data-deco="sand"    title="Sand">&#8776;</button>
    <button class="deco-pick" data-deco="shell"   title="Shell">🐚</button>
    <button class="deco-pick" data-deco="rock"    title="Rock">🪨</button>
    <button class="deco-pick" data-deco="star"    title="Star">&#11088;</button>
    <button class="deco-pick" data-deco="egg"     title="Egg">&#9711;</button>
    <span class="bar-divider"></span>
    <button class="deco-pick" id="btn-add-fish"  title="New fish">&#43;</button>
    <button class="deco-pick" id="btn-back3"     title="Back">&#8592;</button>
  </div>
</div>

<script>
(function () {
  // ── Audio ────────────────────────────────────────────────────────────────
  let _ac = null;
  function ac() { if (!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)(); return _ac; }
  function beep(f, d, t2) {
    try {
      const a = ac(), t = a.currentTime;
      const o = a.createOscillator(), g = a.createGain();
      o.type = t2||'sine'; o.connect(g); g.connect(a.destination);
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t+d);
      o.start(t); o.stop(t+d);
    } catch(e) {}
  }
  function playPop()   { beep(700, 0.1); }
  function playChime() { [523,659,784].forEach((f,i) => setTimeout(() => beep(f,0.18), i*80)); }
  function playPlop()  { beep(180, 0.18, 'sine'); setTimeout(() => beep(120, 0.12, 'sine'), 40); }
  function playHatch() { [400,600,900,1300].forEach((f,i) => setTimeout(() => beep(f,0.12,'sine'), i*60)); }
  function playGrow()  { [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f,0.14,'triangle'), i*70)); }

  // ── Fish shape paths (fins included in silhouette so paint covers everything) ─
  const SHAPES = [
    // 0: Classic Tropical — oval body + triangular dorsal fin + forked tail + anal fin
    function(ctx, cx, cy, r) {
      ctx.beginPath();
      ctx.moveTo(cx+r*.48, cy);                                               // tail fork center
      ctx.lineTo(cx+r*.88, cy-r*.52);                                         // upper tail tip
      ctx.quadraticCurveTo(cx+r*.66, cy-r*.16, cx+r*.42, cy-r*.22);          // upper tail root
      ctx.quadraticCurveTo(cx+r*.22, cy-r*.52, cx+r*.02, cy-r*.48);          // dorsal fin peak
      ctx.quadraticCurveTo(cx-r*.10, cy-r*.44, cx-r*.28, cy-r*.34);          // dorsal fin return
      ctx.quadraticCurveTo(cx-r*.52, cy-r*.18, cx-r*.64, cy);                // body top to nose
      ctx.quadraticCurveTo(cx-r*.52, cy+r*.18, cx-r*.24, cy+r*.36);          // nose to body bottom
      ctx.quadraticCurveTo(cx-r*.04, cy+r*.48, cx+r*.12, cy+r*.44);          // anal fin tip
      ctx.quadraticCurveTo(cx+r*.28, cy+r*.38, cx+r*.42, cy+r*.22);          // anal fin return
      ctx.quadraticCurveTo(cx+r*.66, cy+r*.16, cx+r*.88, cy+r*.52);          // lower tail tip
      ctx.closePath();
    },
    // 1: Angelfish — disc body + very long trailing top & bottom fins + small tail
    function(ctx, cx, cy, r) {
      ctx.beginPath();
      ctx.moveTo(cx+r*.38, cy);                                               // tail junction
      ctx.lineTo(cx+r*.58, cy-r*.18);                                         // upper tail tip
      ctx.quadraticCurveTo(cx+r*.44, cy-r*.08, cx+r*.22, cy-r*.32);          // upper tail root
      ctx.quadraticCurveTo(cx+r*.10, cy-r*.62, cx, cy-r*1.02);               // top fin rise
      ctx.quadraticCurveTo(cx-r*.08, cy-r*.78, cx-r*.16, cy-r*.56);          // top fin return
      ctx.quadraticCurveTo(cx-r*.36, cy-r*.30, cx-r*.54, cy);                // body top to nose
      ctx.quadraticCurveTo(cx-r*.36, cy+r*.30, cx-r*.16, cy+r*.56);          // nose to body bottom
      ctx.quadraticCurveTo(cx-r*.08, cy+r*.78, cx, cy+r*1.02);               // bottom fin drop
      ctx.quadraticCurveTo(cx+r*.10, cy+r*.62, cx+r*.22, cy+r*.32);          // bottom fin return
      ctx.quadraticCurveTo(cx+r*.44, cy+r*.08, cx+r*.58, cy+r*.18);          // lower tail root
      ctx.closePath();
    },
    // 2: Pufferfish — round body + small tail fan + dorsal nub + ventral nub
    function(ctx, cx, cy, r) {
      ctx.beginPath();
      ctx.moveTo(cx+r*.34, cy);                                               // tail junction
      ctx.lineTo(cx+r*.62, cy-r*.24);                                         // upper tail tip
      ctx.quadraticCurveTo(cx+r*.48, cy-r*.10, cx+r*.28, cy-r*.36);          // upper tail root
      ctx.quadraticCurveTo(cx+r*.16, cy-r*.52, cx, cy-r*.58);                // dorsal nub peak
      ctx.quadraticCurveTo(cx-r*.14, cy-r*.54, cx-r*.26, cy-r*.46);          // dorsal nub return
      ctx.bezierCurveTo(cx-r*.52, cy-r*.34, cx-r*.70, cy-r*.12, cx-r*.70, cy); // round body
      ctx.bezierCurveTo(cx-r*.70, cy+r*.12, cx-r*.52, cy+r*.34, cx-r*.26, cy+r*.46);
      ctx.quadraticCurveTo(cx-r*.14, cy+r*.54, cx, cy+r*.58);                // ventral nub peak
      ctx.quadraticCurveTo(cx+r*.16, cy+r*.52, cx+r*.28, cy+r*.36);          // ventral nub return
      ctx.quadraticCurveTo(cx+r*.48, cy+r*.10, cx+r*.62, cy+r*.24);          // lower tail tip
      ctx.closePath();
    },
    // 3: Needlefish — long torpedo body, small swept-back dorsal + anal fins, forked tail
    function(ctx, cx, cy, r) {
      ctx.beginPath();
      ctx.moveTo(cx+r*.54, cy);                                               // tail fork center
      ctx.lineTo(cx+r*.90, cy-r*.28);                                         // upper tail tip
      ctx.quadraticCurveTo(cx+r*.68, cy-r*.06, cx+r*.44, cy-r*.12);          // upper tail root
      ctx.quadraticCurveTo(cx+r*.24, cy-r*.22, cx+r*.12, cy-r*.22);          // dorsal fin peak
      ctx.quadraticCurveTo(cx+r*.02, cy-r*.20, cx-r*.16, cy-r*.18);          // dorsal fin return
      ctx.quadraticCurveTo(cx-r*.52, cy-r*.13, cx-r*.82, cy-r*.05);          // long body top
      ctx.quadraticCurveTo(cx-r*.88, cy, cx-r*.82, cy+r*.05);                // pointed nose
      ctx.quadraticCurveTo(cx-r*.52, cy+r*.13, cx-r*.16, cy+r*.18);          // long body bottom
      ctx.quadraticCurveTo(cx+r*.02, cy+r*.20, cx+r*.12, cy+r*.22);          // anal fin peak
      ctx.quadraticCurveTo(cx+r*.24, cy+r*.22, cx+r*.44, cy+r*.12);          // anal fin return
      ctx.quadraticCurveTo(cx+r*.68, cy+r*.06, cx+r*.90, cy+r*.28);          // lower tail tip
      ctx.closePath();
    },
    // 4: Fantail Goldfish — plump round body + dorsal fin + double butterfly tail
    function(ctx, cx, cy, r) {
      ctx.beginPath();
      ctx.moveTo(cx+r*.42, cy);                                               // body-tail junction
      ctx.bezierCurveTo(cx+r*.54, cy-r*.12, cx+r*.80, cy-r*.18, cx+r*.88, cy-r*.54); // outer tail
      ctx.bezierCurveTo(cx+r*.94, cy-r*.82, cx+r*.76, cy-r*.98, cx+r*.60, cy-r*.86); // tail tip
      ctx.quadraticCurveTo(cx+r*.52, cy-r*.60, cx+r*.46, cy-r*.26);          // inner tail notch
      ctx.quadraticCurveTo(cx+r*.26, cy-r*.54, cx+r*.08, cy-r*.56);          // dorsal fin peak
      ctx.quadraticCurveTo(cx-r*.06, cy-r*.54, cx-r*.20, cy-r*.46);          // dorsal return
      ctx.bezierCurveTo(cx-r*.52, cy-r*.32, cx-r*.68, cy-r*.10, cx-r*.68, cy); // round body
      ctx.bezierCurveTo(cx-r*.68, cy+r*.10, cx-r*.52, cy+r*.32, cx-r*.20, cy+r*.46);
      ctx.quadraticCurveTo(cx-r*.06, cy+r*.54, cx+r*.08, cy+r*.56);          // ventral fin
      ctx.quadraticCurveTo(cx+r*.26, cy+r*.54, cx+r*.46, cy+r*.26);          // inner tail notch
      ctx.quadraticCurveTo(cx+r*.52, cy+r*.60, cx+r*.60, cy+r*.86);          // lower tail tip
      ctx.bezierCurveTo(cx+r*.76, cy+r*.98, cx+r*.94, cy+r*.82, cx+r*.88, cy+r*.54);
      ctx.bezierCurveTo(cx+r*.80, cy+r*.18, cx+r*.54, cy+r*.12, cx+r*.42, cy);
      ctx.closePath();
    },
  ];
  const LABELS = ['CICHLID','ANGEL','PUFFER','NEEDLE','GOLDFISH'];

  // ── Internal markings only — all guaranteed inside the body silhouette ────
  const DETAILS = [
    // 0: Cichlid — gill arc, lateral line, pectoral ellipse
    function(ctx, cx, cy, r) {
      ctx.save();
      ctx.strokeStyle = 'rgba(126,237,244,0.75)'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx-r*.30, cy, r*.28, -1.05, 1.05); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(cx-r*.18, cy+r*.08, r*.11, r*.055, 0.3, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(126,237,244,0.22)'; ctx.lineWidth = r*.07;
      ctx.beginPath();
      ctx.moveTo(cx-r*.24, cy); ctx.quadraticCurveTo(cx+r*.08, cy-r*.04, cx+r*.36, cy-r*.02);
      ctx.stroke();
      ctx.restore();
    },
    // 1: Angelfish — gill arc, pectoral ellipse, fin rays (stay inside wings), body bar
    function(ctx, cx, cy, r) {
      ctx.save();
      ctx.strokeStyle = 'rgba(126,237,244,0.75)'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx-r*.26, cy, r*.24, -1.05, 1.05); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(cx-r*.14, cy+r*.08, r*.10, r*.05, 0.3, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(126,237,244,0.25)'; ctx.lineWidth = 1;
      for (let i=0; i<3; i++) {
        const t=i/2;
        ctx.beginPath(); ctx.moveTo(cx+r*(.16-t*.16), cy-r*(.28+t*.24));
        ctx.lineTo(cx+r*(.04-t*.10), cy-r*(.56+t*.12)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx+r*(.16-t*.16), cy+r*(.28+t*.24));
        ctx.lineTo(cx+r*(.04-t*.10), cy+r*(.56+t*.12)); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(126,237,244,0.18)'; ctx.lineWidth = r*.08;
      ctx.beginPath(); ctx.moveTo(cx-r*.14, cy-r*.22); ctx.lineTo(cx-r*.14, cy+r*.22); ctx.stroke();
      ctx.restore();
    },
    // 2: Pufferfish — gill arc, concentric inflation arcs, belly spots
    function(ctx, cx, cy, r) {
      ctx.save();
      ctx.strokeStyle = 'rgba(126,237,244,0.75)'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx-r*.28, cy, r*.26, -1.0, 1.0); ctx.stroke();
      ctx.strokeStyle = 'rgba(126,237,244,0.20)'; ctx.lineWidth = 1.2;
      [r*.16, r*.28, r*.38].forEach(rad => {
        ctx.beginPath(); ctx.arc(cx-r*.14, cy, rad, -Math.PI*.60, Math.PI*.60); ctx.stroke();
      });
      ctx.fillStyle = 'rgba(126,237,244,0.28)';
      [[cx-r*.18, cy+r*.20], [cx+r*.02, cy+r*.28], [cx+r*.16, cy+r*.20]].forEach(([bx,by]) => {
        ctx.beginPath(); ctx.arc(bx, by, r*.04, 0, Math.PI*2); ctx.fill();
      });
      ctx.restore();
    },
    // 3: Needlefish — gill arc, pectoral ellipse, prominent lateral line
    function(ctx, cx, cy, r) {
      ctx.save();
      ctx.strokeStyle = 'rgba(126,237,244,0.75)'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
      // Gill arc (small, placed at head-body join)
      ctx.beginPath(); ctx.arc(cx-r*.52, cy, r*.14, -0.85, 0.85); ctx.stroke();
      // Pectoral fin ellipse
      ctx.beginPath(); ctx.ellipse(cx-r*.44, cy+r*.08, r*.09, r*.045, 0.2, 0, Math.PI*2); ctx.stroke();
      // Lateral line — the defining mark of a streamlined fish
      ctx.strokeStyle = 'rgba(126,237,244,0.32)'; ctx.lineWidth = r*.055;
      ctx.beginPath();
      ctx.moveTo(cx-r*.44, cy-r*.02);
      ctx.quadraticCurveTo(cx+r*.06, cy-r*.04, cx+r*.46, cy-r*.02);
      ctx.stroke();
      ctx.restore();
    },
    // 4: Goldfish — gill arc, pectoral ellipse, scale arcs, tail rays inside butterfly
    function(ctx, cx, cy, r) {
      ctx.save();
      ctx.strokeStyle = 'rgba(126,237,244,0.75)'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx-r*.34, cy, r*.28, -1.1, 1.1); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(cx-r*.22, cy+r*.06, r*.12, r*.06, 0.3, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(126,237,244,0.18)'; ctx.lineWidth=1;
      [[-r*.28, r*.22], [-r*.10, r*.28], [r*.08, r*.22]].forEach(([dx,rad]) => {
        ctx.beginPath(); ctx.arc(cx+dx, cy, rad, -Math.PI*.55, Math.PI*.55); ctx.stroke();
      });
      const tx=cx+r*.42;
      ctx.strokeStyle='rgba(126,237,244,0.25)';
      [[cx+r*.62,cy-r*.38],[cx+r*.70,cy-r*.58],[cx+r*.62,cy+r*.38],[cx+r*.70,cy+r*.58]].forEach(([ex,ey]) => {
        ctx.beginPath(); ctx.moveTo(tx,cy); ctx.lineTo(ex,ey); ctx.stroke();
      });
      ctx.restore();
    },
  ];

  // ── Shared state ──────────────────────────────────────────────────────────
  let fishType = 0;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Screen 1: Select ─────────────────────────────────────────────────────
  const cvSel  = document.getElementById('cv-sel');
  const ctxSel = cvSel.getContext('2d');

  function resizeSel() {
    const sz = Math.min(window.innerWidth * 0.86, window.innerHeight * 0.52, 360);
    cvSel.width = sz; cvSel.height = Math.round(sz * 0.68);
    drawSelect();
  }

  function drawSelect() {
    const W = cvSel.width, H = cvSel.height;
    ctxSel.clearRect(0, 0, W, H);
    const r = Math.min(W, H) * 0.4;

    // Glow
    const grd = ctxSel.createRadialGradient(W/2,H/2,r*.1,W/2,H/2,r*1.3);
    grd.addColorStop(0,'rgba(100,220,255,0.15)');
    grd.addColorStop(1,'rgba(100,220,255,0)');
    ctxSel.fillStyle = grd; ctxSel.fillRect(0,0,W,H);

    // Fish body
    SHAPES[fishType](ctxSel, W/2, H/2, r);
    ctxSel.fillStyle = 'rgba(150,215,255,0.18)'; ctxSel.fill();
    ctxSel.strokeStyle = '#7EEDF4'; ctxSel.lineWidth = 3; ctxSel.stroke();

    // Detail fins/gills/markings
    DETAILS[fishType](ctxSel, W/2, H/2, r);

    // Eye
    ctxSel.fillStyle = '#7EEDF4';
    ctxSel.beginPath(); ctxSel.arc(W/2-r*.28, H/2-r*.1, r*.07, 0, Math.PI*2); ctxSel.fill();

    // Pagination dots
    for (let i = 0; i < SHAPES.length; i++) {
      const active = i === fishType;
      ctxSel.beginPath();
      ctxSel.arc(W/2 + (i-2)*22, H-10, active?7:5, 0, Math.PI*2);
      ctxSel.fillStyle = active ? '#7EEDF4' : 'rgba(126,237,244,0.3)';
      ctxSel.fill();
    }
  }

  document.getElementById('btn-prev').addEventListener('click', () => {
    fishType = (fishType - 1 + SHAPES.length) % SHAPES.length;
    playPop(); drawSelect();
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    fishType = (fishType + 1) % SHAPES.length;
    playPop(); drawSelect();
  });
  document.getElementById('btn-go1').addEventListener('click', () => {
    playChime();
    showScreen('s-paint'); // paint screen added next
  });

  // Swipe on canvas
  let swipeX = null;
  cvSel.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, {passive:true});
  cvSel.addEventListener('touchend', e => {
    if (swipeX === null) return;
    const dx = e.changedTouches[0].clientX - swipeX;
    if (Math.abs(dx) > 38) {
      fishType = dx < 0
        ? (fishType+1) % SHAPES.length
        : (fishType-1+SHAPES.length) % SHAPES.length;
      playPop(); drawSelect();
    }
    swipeX = null;
  }, {passive:true});

  window.addEventListener('resize', resizeSel);
  resizeSel();

  // expose for later screens
  window._ff = { SHAPES, DETAILS, ac, beep, playPop, playChime, playPlop, playHatch, playGrow, fishType: () => fishType, showScreen, savedFish: [] };
})();

// ── Screen 2: Paint ──────────────────────────────────────────────────────────
(function () {
  const PALETTE = [
    '#FF4D4D','#FF9A3C','#FFE24D','#7ED957','#4DC8FF',
    '#A04DFF','#FF79C6','#FFFFFF','#8B4513','#3333AA'
  ];
  let paintColor = PALETTE[0];

  const cvP  = document.getElementById('cv-paint');
  const ctxP = cvP.getContext('2d');
  // off-screen overlay that holds paint strokes
  const off  = document.createElement('canvas');
  const offC = off.getContext('2d');

  function resizePaint() {
    const sz = Math.min(window.innerWidth * 0.86, window.innerHeight * 0.52, 360);
    cvP.width  = sz; cvP.height = Math.round(sz * 0.68);
    off.width  = cvP.width; off.height = cvP.height;
    renderPaint();
  }

  function renderPaint() {
    const W = cvP.width, H = cvP.height;
    const r = Math.min(W, H) * 0.4;
    const ff = window._ff;

    ctxP.clearRect(0, 0, W, H);

    // Clip to fish shape, draw overlay
    ctxP.save();
    ff.SHAPES[ff.fishType()](ctxP, W/2, H/2, r);
    ctxP.clip();
    ctxP.drawImage(off, 0, 0);
    ctxP.restore();

    // Fish outline on top
    ff.SHAPES[ff.fishType()](ctxP, W/2, H/2, r);
    ctxP.strokeStyle = '#7EEDF4'; ctxP.lineWidth = 3; ctxP.stroke();

    // Detail fins/gills/markings
    ff.DETAILS[ff.fishType()](ctxP, W/2, H/2, r);

    // Eye
    ctxP.fillStyle = '#7EEDF4';
    ctxP.beginPath(); ctxP.arc(W/2-r*.28, H/2-r*.1, r*.07, 0, Math.PI*2); ctxP.fill();
  }

  // Build palette buttons
  const pal = document.getElementById('palette');
  PALETTE.forEach((col, i) => {
    const b = document.createElement('button');
    b.className = 'pal-btn' + (i === 0 ? ' active' : '');
    b.style.background = col;
    b.addEventListener('click', () => {
      document.querySelectorAll('.pal-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      paintColor = col;
      window._ff.playPop();
    });
    pal.appendChild(b);
  });

  function getPos(e) {
    const rect = cvP.getBoundingClientRect();
    const scaleX = cvP.width  / rect.width;
    const scaleY = cvP.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
  }

  let painting = false;
  function startPaint(e) {
    e.preventDefault(); painting = true;
    const p = getPos(e);
    offC.beginPath(); offC.moveTo(p.x, p.y);
    window._ff.beep(440 + Math.random()*200, 0.05);
  }
  function movePaint(e) {
    if (!painting) return; e.preventDefault();
    const p = getPos(e);
    offC.lineTo(p.x, p.y);
    offC.strokeStyle = paintColor; offC.lineWidth = 22;
    offC.lineCap = 'round'; offC.lineJoin = 'round';
    offC.stroke();
    offC.beginPath(); offC.moveTo(p.x, p.y);
    renderPaint();
  }
  function endPaint() { painting = false; }

  cvP.addEventListener('mousedown',  startPaint);
  cvP.addEventListener('mousemove',  movePaint);
  cvP.addEventListener('mouseup',    endPaint);
  cvP.addEventListener('touchstart', startPaint, {passive:false});
  cvP.addEventListener('touchmove',  movePaint,  {passive:false});
  cvP.addEventListener('touchend',   endPaint,   {passive:true});

  document.getElementById('btn-back2').addEventListener('click', () => {
    window._ff.playPop(); window._ff.showScreen('s-select');
  });
  document.getElementById('btn-go2').addEventListener('click', () => {
    window._ff.playChime();
    const saved = document.createElement('canvas');
    saved.width = off.width; saved.height = off.height;
    saved.getContext('2d').drawImage(off, 0, 0);
    window._ff.savedFish.push({ fishType: window._ff.fishType(), paintOffCanvas: saved });
    window._ff.paintedCanvas = saved;
    window._ff.showScreen('s-tank');
  });

  // Reset overlay when entering paint screen
  const origShow = window._ff.showScreen;
  window._ff.showScreen = function(id) {
    if (id === 's-paint') {
      off.width  = cvP.width  || 1;
      off.height = cvP.height || 1;
      offC.clearRect(0, 0, off.width, off.height);
    }
    origShow(id);
    if (id === 's-paint') { resizePaint(); renderPaint(); }
  };

  window.addEventListener('resize', () => { if (document.getElementById('s-paint').classList.contains('active')) resizePaint(); });
  // initial size in case screen is already shown
  resizePaint();
})();

// ── Screen 3: Aquarium ───────────────────────────────────────────────────────
(function () {
  const cvT  = document.getElementById('cv-tank');
  const ctxT = cvT.getContext('2d');

  const fishList   = [];  // all hatched fish
  const foods      = [];  // { x, y, vy }
  const bubbles    = [];  // { x, y, r, vy }
  const decos      = [];  // { type, x, y, hatchTimer? }
  let selectedDeco = null;
  let activeTool   = 'food';
  let dragDeco = null, dragActive = false, pDownX = 0, pDownY = 0;

  // Tool buttons
  document.querySelectorAll('[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tool],[data-deco]').forEach(b => b.classList.remove('selected'));
      activeTool = btn.dataset.tool;
      selectedDeco = null;
      btn.classList.add('selected');
      window._ff.playPop();
    });
  });

  // Deco buttons
  document.querySelectorAll('[data-deco]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tool],[data-deco]').forEach(b => b.classList.remove('selected'));
      if (selectedDeco === btn.dataset.deco) { selectedDeco = null; return; }
      selectedDeco = btn.dataset.deco;
      btn.classList.add('selected');
      window._ff.playPop();
    });
  });

  document.getElementById('btn-back3').addEventListener('click', () => {
    window._ff.playPop(); window._ff.showScreen('s-select');
  });

  document.getElementById('btn-add-fish').addEventListener('click', () => {
    window._ff.playPop(); window._ff.showScreen('s-select');
  });

  let W = 0, H = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cvT.width = W; cvT.height = H;
  }

  function drawBg() {
    const grd = ctxT.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#001428');
    grd.addColorStop(1, '#003060');
    ctxT.fillStyle = grd;
    ctxT.fillRect(0, 0, W, H);
  }

  function drawOneFish(fish) {
    const ff = window._ff;
    const r  = fish.size * 0.5;
    const cx = fish.x, cy = fish.y;
    const shapeIdx = fish.fishType != null ? fish.fishType : ff.fishType();
    const paintSrc = fish.paintOffCanvas || null;

    ctxT.save();
    ctxT.translate(cx, cy);
    if (fish.dir > 0) ctxT.scale(-1, 1);
    ctxT.translate(0, Math.sin(fish.wobble) * r * 0.08);
    ctxT.translate(-cx, -cy);

    if (paintSrc) {
      const pW = paintSrc.width, pH = paintSrc.height;
      ff.SHAPES[shapeIdx](ctxT, cx, cy, r);
      ctxT.clip();
      const scale = (r * 2) / Math.min(pW, pH);
      ctxT.drawImage(paintSrc, cx - pW*scale/2, cy - pH*scale/2, pW*scale, pH*scale);
      ctxT.restore();
      ctxT.save();
      ctxT.translate(cx, cy);
      if (fish.dir > 0) ctxT.scale(-1, 1);
      ctxT.translate(0, Math.sin(fish.wobble) * r * 0.08);
      ctxT.translate(-cx, -cy);
    }

    ff.SHAPES[shapeIdx](ctxT, cx, cy, r);
    ctxT.strokeStyle = '#7EEDF4'; ctxT.lineWidth = 2.5; ctxT.stroke();
    if (!paintSrc) { ctxT.fillStyle = 'rgba(100,200,255,0.25)'; ctxT.fill(); }

    // Detail fins/gills/markings
    ff.DETAILS[shapeIdx](ctxT, cx, cy, r);

    const eyeX = cx - r * 0.28;
    ctxT.fillStyle = '#7EEDF4';
    ctxT.beginPath(); ctxT.arc(eyeX, cy - r*0.1, r*0.1, 0, Math.PI*2); ctxT.fill();
    ctxT.fillStyle = '#001428';
    ctxT.beginPath(); ctxT.arc(eyeX, cy - r*0.1, r*0.05, 0, Math.PI*2); ctxT.fill();
    ctxT.restore();
  }

  function drawFish() { fishList.forEach(drawOneFish); }

  const DECO_EMOJI = { seaweed:'🌿', shell:'🐚', rock:'🪨', star:'⭐' };
  function drawDecos() {
    ctxT.font = '28px serif';
    ctxT.textAlign = 'center'; ctxT.textBaseline = 'bottom';
    decos.forEach(d => {
      if (d.type === 'egg') {
        const eg = ctxT.createRadialGradient(d.x-3, d.y-4, 2, d.x, d.y, 11);
        eg.addColorStop(0, 'rgba(255,255,255,0.95)');
        eg.addColorStop(0.5, 'rgba(220,200,160,0.8)');
        eg.addColorStop(1,   'rgba(180,140,80,0.3)');
        ctxT.beginPath(); ctxT.arc(d.x, d.y, 11, 0, Math.PI*2);
        ctxT.fillStyle = eg; ctxT.fill();
        ctxT.strokeStyle = 'rgba(180,140,80,0.5)'; ctxT.lineWidth = 1.2; ctxT.stroke();
        return;
      }
      if (d.type === 'sand') {
        const sg = ctxT.createRadialGradient(d.x, d.y, 0, d.x, d.y, 52);
        sg.addColorStop(0, 'rgba(194,164,107,0.85)');
        sg.addColorStop(1, 'rgba(194,164,107,0)');
        ctxT.fillStyle = sg;
        ctxT.beginPath(); ctxT.ellipse(d.x, d.y, 52, 18, 0, 0, Math.PI*2); ctxT.fill();
        return;
      }
      if (d.type === 'kelp') {
        let bx = d.x, by = d.y;
        for (let s = 0; s < 6; s++) {
          const ty = by - 28;
          ctxT.strokeStyle = `rgba(20,160,50,${0.85 - s*0.1})`;
          ctxT.lineWidth = 7 - s*0.7; ctxT.lineCap = 'round';
          ctxT.beginPath(); ctxT.moveTo(bx, by);
          ctxT.quadraticCurveTo(bx + (s%2===0 ? 18:-18), (by+ty)/2, bx, ty);
          ctxT.stroke(); by = ty;
        }
        return;
      }
      ctxT.fillText(DECO_EMOJI[d.type] || '?', d.x, d.y);
    });
  }

  function drawFoods() {
    foods.forEach(f => {
      ctxT.fillStyle = '#FFD700';
      ctxT.beginPath(); ctxT.arc(f.x, f.y, 5, 0, Math.PI * 2); ctxT.fill();
    });
  }

  function drawBubbles() {
    bubbles.forEach(b => {
      ctxT.strokeStyle = `rgba(126,237,244,${0.4 + b.r * 0.05})`;
      ctxT.lineWidth = 1.5;
      ctxT.beginPath(); ctxT.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctxT.stroke();
    });
  }

  function updateOneFish(fish, dt) {
    fish.wobble += dt * 3;
    let target = null, best = 9999;
    foods.forEach(f => {
      const d = Math.hypot(f.x - fish.x, f.y - fish.y);
      if (d < best) { best = d; target = f; }
    });
    if (target) {
      const dx = target.x - fish.x, dy = target.y - fish.y;
      fish.vx += (dx / best * 2.2 - fish.vx) * 0.06;
      fish.vy += (dy / best * 2.2 - fish.vy) * 0.06;
    } else {
      fish.vx += (Math.random() - 0.5) * 0.4;
      fish.vy += (Math.random() - 0.5) * 0.2;
      fish.vx *= 0.98; fish.vy *= 0.98;
      const spd = Math.hypot(fish.vx, fish.vy);
      if (spd > 1.5) { fish.vx = fish.vx/spd*1.5; fish.vy = fish.vy/spd*1.5; }
    }
    if (fish.vx > 0.2) fish.dir = 1; else if (fish.vx < -0.2) fish.dir = -1;
    if (fish.boostTimer > 0) { fish.boostTimer -= dt; fish.vx *= 2.5; fish.vy *= 2.5; }
    fish.x += fish.vx; fish.y += fish.vy;
    const r = fish.size * 0.5;
    if (fish.x < r) { fish.x = r; fish.vx = Math.abs(fish.vx); }
    if (fish.x > W - r) { fish.x = W - r; fish.vx = -Math.abs(fish.vx); }
    if (fish.y < r + 56) { fish.y = r + 56; fish.vy = Math.abs(fish.vy); }
    if (fish.y > H - 10 - r) { fish.y = H - 10 - r; fish.vy = -Math.abs(fish.vy); }
    // Eat food
    for (let i = foods.length - 1; i >= 0; i--) {
      if (Math.hypot(foods[i].x - fish.x, foods[i].y - fish.y) < r + 8) {
        const prevSize = fish.size;
        fish.size = Math.min(fish.size + 1.5, W * 0.25);
        foods.splice(i, 1);
        fish.eating = 0.4;
        window._ff.beep(700, 0.15, 'sine');
        if (Math.floor(fish.size/20) > Math.floor(prevSize/20)) window._ff.playGrow();
        for (let b = 0; b < 3; b++) bubbles.push({ x: fish.x+(Math.random()-0.5)*20, y: fish.y, r: 4+Math.random()*6, vy: -0.8-Math.random() });
      }
    }
    if (fish.eating > 0) fish.eating -= dt;
  }

  function update(dt) {
    fishList.forEach(f => updateOneFish(f, dt));

    // Advance food gravity
    for (let i = foods.length - 1; i >= 0; i--) {
      foods[i].y += foods[i].vy;
      if (foods[i].y > H - 10) foods.splice(i, 1);
    }

    // Update bubbles
    for (let i = bubbles.length - 1; i >= 0; i--) {
      bubbles[i].y += bubbles[i].vy;
      bubbles[i].x += (Math.random() - 0.5) * 0.6;
      if (bubbles[i].y < 0) bubbles.splice(i, 1);
    }
    if (Math.random() < 0.015) {
      bubbles.push({ x: Math.random()*W, y: H-30, r: 3+Math.random()*8, vy: -0.6-Math.random()*0.6 });
    }

    // Egg hatching
    for (let i = decos.length - 1; i >= 0; i--) {
      const d = decos[i];
      if (d.type !== 'egg' || d.hatchTimer == null) continue;
      d.hatchTimer -= dt;
      if (d.hatchTimer <= 0) {
        decos.splice(i, 1);
        const sf = window._ff.savedFish[d.fishIndex != null ? d.fishIndex : window._ff.savedFish.length-1];
        fishList.push({
          x: d.x, y: d.y - 20, vx: (Math.random()-0.5)*1.5, vy: -1,
          dir: 1, wobble: 0, size: 22, eating: 0, boostTimer: 0,
          fishType: sf ? sf.fishType : 0,
          paintOffCanvas: sf ? sf.paintOffCanvas : null
        });
        window._ff.playHatch();
        for (let b = 0; b < 6; b++) bubbles.push({ x: d.x+(Math.random()-0.5)*30, y: d.y, r: 3+Math.random()*5, vy: -1-Math.random() });
      }
    }
  }

  let last = 0;
  function loop(ts) {
    const dt = Math.min((ts - last) / 1000, 0.05);
    last = ts;
    if (!document.getElementById('s-tank').classList.contains('active')) { requestAnimationFrame(loop); return; }
    ctxT.clearRect(0, 0, W, H);
    drawBg();
    drawDecos();
    drawFoods();
    drawBubbles();
    drawFish();
    requestAnimationFrame(loop);
    update(dt);
  }

  function handleTap(cx, cy) {
    if (selectedDeco) {
      if (selectedDeco === 'egg' && window._ff.savedFish.length === 0) {
        const btn = document.getElementById('btn-add-fish');
        btn.style.boxShadow = '0 0 0 3px #FF4D4D';
        setTimeout(() => { btn.style.boxShadow = ''; }, 900);
        document.querySelectorAll('[data-deco]').forEach(b => b.classList.remove('selected'));
        selectedDeco = null;
        return;
      }
      const d = { type: selectedDeco, x: cx, y: cy };
      if (selectedDeco === 'egg') {
        d.hatchTimer = 5 + Math.random() * 5;
        d.fishIndex  = window._ff.savedFish.length - 1;
      }
      if (selectedDeco === 'kelp') d.hitH = 168;
      decos.push(d);
      window._ff.playChime();
      document.querySelectorAll('[data-deco]').forEach(b => b.classList.remove('selected'));
      selectedDeco = null;
      return;
    }
    if (activeTool === 'food') {
      foods.push({ x: cx, y: cy, vy: 1.5 });
      window._ff.playPlop();
    } else if (activeTool === 'bubble') {
      bubbles.push({ x: cx, y: cy, r: 6 + Math.random()*6, vy: -0.7 - Math.random()*0.5 });
      window._ff.playPop();
    } else if (activeTool === 'poke') {
      let best = 60, nearest = null;
      fishList.forEach(f => {
        const d = Math.hypot(f.x-cx, f.y-cy);
        if (d < best) { best = d; nearest = f; }
      });
      if (nearest) { nearest.boostTimer = 2.5; window._ff.beep(900, 0.12, 'sine'); }
    }
  }

  cvT.addEventListener('pointerdown', e => {
    e.preventDefault(); cvT.setPointerCapture(e.pointerId);
    const rect = cvT.getBoundingClientRect();
    const px = e.clientX - rect.left, py = e.clientY - rect.top;
    pDownX = px; pDownY = py; dragActive = false; dragDeco = null;
    let best = 40, found = null;
    decos.forEach(d => {
      const dist = d.type === 'kelp'
        ? Math.hypot(d.x - px, Math.max(0, py - (d.y - (d.hitH||168))))
        : Math.hypot(d.x - px, d.y - py);
      if (dist < best) { best = dist; found = d; }
    });
    dragDeco = found;
  }, { passive: false });

  cvT.addEventListener('pointermove', e => {
    if (!dragDeco) return;
    const rect = cvT.getBoundingClientRect();
    const px = e.clientX - rect.left, py = e.clientY - rect.top;
    if (Math.hypot(px - pDownX, py - pDownY) > 8) dragActive = true;
    if (dragActive) { dragDeco.x = px; dragDeco.y = py; }
  });

  cvT.addEventListener('pointerup', e => {
    const rect = cvT.getBoundingClientRect();
    if (!dragActive) handleTap(e.clientX - rect.left, e.clientY - rect.top);
    dragDeco = null; dragActive = false;
  });

  // Hook into showScreen to reset fish on each visit
  const origShow = window._ff.showScreen;
  window._ff.showScreen = function(id) {
    origShow(id);
    if (id === 's-tank') {
      resize();
      fishList.length = 0;
      foods.length = 0; bubbles.length = 0; decos.length = 0;
    }
  };

  document.getElementById('tool-food').classList.add('selected');

  window.addEventListener('resize', () => { if (document.getElementById('s-tank').classList.contains('active')) resize(); });
  resize();
  requestAnimationFrame(loop);
})();
</script>
